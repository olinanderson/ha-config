# ============================================================
# configuration.yaml - Olin's Van (Home Assistant)
# ============================================================
# Refactored: all config split into separate include files.
# Backup of the monolithic original: yaml_backups/configuration.yaml
# ============================================================

# --- Core ---
recorder:
  auto_purge: false

history:

media_source:

stream:

go2rtc:

frontend:
  themes: !include_dir_merge_named themes

# --- Lovelace dashboards ---
# mode: storage keeps the default Overview dashboard working.
lovelace:
  mode: storage

# --- Custom Panels (React dashboards + Vanlife) ---
panel_custom:
  - name: van-dashboard
    url_path: dashboard
    sidebar_title: Dashboard
    sidebar_icon: mdi:view-dashboard
    module_url: /local/react-dashboard/panel-loader.js?v=16
    embed_iframe: false
    trust_external_script: true
  - name: vanlife-panel
    url_path: vanlife
    sidebar_title: Vanlife
    sidebar_icon: mdi:map-marker-path
    module_url: /local/vanlife-panel/panel.js?v=12

# --- Includes ---
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
shell_command: !include shell_commands.yaml

conversation:
  intents: !include conversations.yaml
intent_script: !include intent_scripts.yaml

# --- Input helpers ---
input_boolean: !include input_boolean.yaml
input_number: !include input_number.yaml
input_text: !include input_text.yaml
input_select: !include input_select.yaml

# --- Template sensors & binary sensors ---
template: !include_dir_merge_list template/

# --- Integration sensors (Riemann, statistics, history) ---
sensor: !include integrations/sensor.yaml

# --- MQTT device tracker ---
mqtt:
  device_tracker: !include mqtt/device_tracker.yaml
