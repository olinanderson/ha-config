# ============================================================
# configuration.yaml - Olin's Van (Home Assistant)
# ============================================================
# Refactored: all config split into separate include files.
# Backup of the monolithic original: yaml_backups/configuration.yaml
# ============================================================

# --- Core ---
recorder:
  auto_purge: false

history:

media_source:

stream:

frontend:
  themes: !include_dir_merge_named themes

# --- Lovelace dashboards ---
# mode: storage keeps all existing dashboards working.
# Additional YAML-mode dashboards are defined below.
lovelace:
  mode: storage
  dashboards:
    yaml-home:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/home_v3.yaml
    yaml-van:
      mode: yaml
      title: Van
      icon: mdi:van-passenger
      show_in_sidebar: true
      filename: dashboards/van.yaml
    yaml-power:
      mode: yaml
      title: Power & Energy
      icon: mdi:lightning-bolt
      show_in_sidebar: true
      filename: dashboards/power_v2.yaml
    yaml-climate:
      mode: yaml
      title: Climate
      icon: mdi:thermostat
      show_in_sidebar: true
      filename: dashboards/climate_v2.yaml
    yaml-water:
      mode: yaml
      title: Water & Propane
      icon: mdi:water
      show_in_sidebar: true
      filename: dashboards/water_v2.yaml
    yaml-system:
      mode: yaml
      title: System
      icon: mdi:wrench
      show_in_sidebar: true
      filename: dashboards/system_v2.yaml
# --- Custom Panels ---
panel_custom:
  - name: vanlife-panel
    url_path: vanlife
    sidebar_title: Vanlife
    sidebar_icon: mdi:map-marker-path
    module_url: /local/vanlife-panel/panel.js?v=11

# --- Includes ---
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
shell_command: !include shell_commands.yaml

conversation:
  intents: !include conversations.yaml
intent_script: !include intent_scripts.yaml

# --- Input helpers ---
input_boolean: !include input_boolean.yaml
input_number: !include input_number.yaml
input_text: !include input_text.yaml
input_select: !include input_select.yaml

# --- Template sensors & binary sensors ---
template: !include_dir_merge_list template/

# --- Integration sensors (Riemann, statistics, history) ---
sensor: !include integrations/sensor.yaml

# --- MQTT sensors, binary sensors & device tracker ---
mqtt:
  sensor: !include mqtt/sensors.yaml
  binary_sensor: !include mqtt/binary_sensors.yaml
  device_tracker: !include mqtt/device_tracker.yaml
