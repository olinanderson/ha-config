###############################################################################
#  A8-PRO ESPHome firmware – roof-fan / IR hub
#  board: esp32dev  –  IR TX GPIO2  –  IR RX GPIO23
###############################################################################

esphome:
  name: ag-pro
  friendly_name: AG Pro
  # on_boot:
  #   priority: 200
  #   then:
  #     - script.execute: ac_reset_state

# Put substitutions early so they're available everywhere
substitutions:
  MAX_SPEED: "6"          # easy tweak later
  # Thresholds picked from your CSV (off ≲ ~4 W; on ≳ ~20 W)
  # Use a small gap (hysteresis) so we don't chatter at the boundary.
  AC_OFF_W: "8.0"         # <= this is considered OFF
  AC_ON_W:  "12.0"        # >= this is considered ON
  AC_POWER_DELAY_ON:  "8s"    # require sustained draw before saying ON
  AC_POWER_DELAY_OFF: "20s"   # require sustained ~0 before saying OFF

esp32:
  board: esp32dev
  framework:
    type: arduino

# ─────────────────────────────────────────────────────────────────────────────
# Core
# ─────────────────────────────────────────────────────────────────────────────
logger:
api:
  encryption:
    key: "eAfqYMbU14k/xiU515AOQpr2WZuqm863nUA/10X4MMg="
ota:
  - platform: esphome
    password: "bf7d55d33d30d31978cd24480bfebecf"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.10.61
    gateway: 192.168.10.1
    subnet: 255.255.255.0
  ap:
    ssid: "AG-Pro Fallback Hotspot"
    password: "c0N3J6gZyR1w"

captive_portal:

uart:
  - id: zigbee_uart
    tx_pin: GPIO33
    rx_pin: GPIO32
    baud_rate: 115200

# ─────────────────────────────────────────────────────────────────────────────
# IR
# ─────────────────────────────────────────────────────────────────────────────
remote_receiver:
  pin: GPIO23
  tolerance: 25%
  filter: 50us
  idle: 10000us
  dump: all

remote_transmitter:
  id: transmitter_main
  pin: GPIO2         # <- warning: strapping pin – use at your own risk
  carrier_duty_percent: 50%

# ─────────────────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────────────────
globals:
  - id: fan_output_float
    type: float
    restore_value: no
    initial_value: '0.0'

  # # ---- A/C shadow-state ------------------------------------------------------
  # - id: ac_power_on          # true = unit believed ON
  #   type: bool
  #   restore_value: no
  #   initial_value: 'false'

  # - id: ac_set_temp          # current set-point we *think* the unit has (°C)
  #   type: int
  #   restore_value: no
  #   initial_value: '26'      # the A/C boots at 26 °C

  # - id: ac_fan_speed         # 1 … 6 (A/C boots at speed 4)
  #   type: int
  #   restore_value: no
  #   initial_value: '4'

  # # 0 = idle, 1 = TEMP adjust mode, 2 = SPEED adjust mode
  # - id: ac_adjust_mode
