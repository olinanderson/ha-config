###############################################################################
# AC Climate Controller Scripts
#
#   These scripts bridge the climate entity ↔ IR commands.
#   They track assumed temp/fan state in globals and send the correct
#   number of temp_up/temp_down or speed_up/speed_down presses.
###############################################################################

  # ── Turn ON: send IR toggle, mark assumed on, sync to target ──
  - id: ac_turn_on
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(ac_shutdown_active);'
          then:
            - logger.log: "AC turn-on blocked — compressor shutdown in progress"
            - lambda: 'return;'
      - if:
          condition:
            lambda: 'return id(ac_assumed_on);'
          then:
            - logger.log: "AC already assumed on — skipping turn-on"
            - lambda: 'return;'
      - logger.log: "AC: sending ON toggle"
      - script.execute: air_conditioner_on_off
      - delay: 1500ms
      # After power-on the AC starts at default temp/fan
      - lambda: |-
          id(ac_assumed_on)   = true;
          id(ac_current_temp) = ${AC_DEFAULT_TEMP};
          id(ac_current_fan)  = ${AC_DEFAULT_FAN};
          // Read desired target from the climate entity
          id(ac_target_temp) = (int)id(ac_climate).target_temperature;
      - script.execute: ac_sync_temp
      - script.wait: ac_sync_temp
      - script.execute: ac_sync_fan
      - script.wait: ac_sync_fan

  # ── Turn OFF: send IR toggle, start shutdown timer ──
  - id: ac_turn_off
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(ac_assumed_on);'
          then:
            - logger.log: "AC already assumed off — skipping turn-off"
            - lambda: 'return;'
      - logger.log: "AC: sending OFF toggle"
      - script.execute: air_conditioner_on_off
      - lambda: |-
          id(ac_assumed_on)       = false;
          id(ac_shutdown_active)  = true;
      - delay: ${AC_SHUTDOWN_MS}ms
      - lambda: |-
          id(ac_shutdown_active) = false;
          ESP_LOGI("ac", "Compressor shutdown period complete");

  # ── Sync temperature: press temp_up/temp_down to reach target ──
  - id: ac_sync_temp
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("ac", "Syncing temp: %d -> %d", id(ac_current_temp), id(ac_target_temp));
      - while:
          condition:
            lambda: 'return id(ac_current_temp) < id(ac_target_temp);'
          then:
            - script.execute: air_conditioner_temp_up
            - delay: 400ms
            - lambda: 'id(ac_current_temp) += 1;'
      - while:
          condition:
            lambda: 'return id(ac_current_temp) > id(ac_target_temp);'
          then:
            - script.execute: air_conditioner_temp_down
            - delay: 400ms
            - lambda: 'id(ac_current_temp) -= 1;'
      - lambda: |-
          ESP_LOGI("ac", "Temp synced to %d", id(ac_current_temp));

  # ── Sync fan speed: press speed_up/speed_down to reach target ──
  - id: ac_sync_fan
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(ac_current_fan) < id(ac_fan_level);'
          then:
            - script.execute: air_conditioner_speed_up
            - delay: 400ms
            - lambda: 'id(ac_current_fan) += 1;'
      - while:
          condition:
            lambda: 'return id(ac_current_fan) > id(ac_fan_level);'
          then:
            - script.execute: air_conditioner_speed_down
            - delay: 400ms
            - lambda: 'id(ac_current_fan) -= 1;'
      - lambda: |-
          ESP_LOGI("ac", "Fan synced to level %d", id(ac_current_fan));

  # ── Reinitialize: power-cycle the AC and re-sync all state ──
  #    Use when IR commands were missed and state is out of sync.
  - id: ac_reinitialize
    mode: single
    then:
      - logger.log:
          level: WARN
          format: "AC REINITIALIZE: power-cycling to re-sync state"
      # Step 1: If assumed on, turn off first
      - if:
          condition:
            lambda: 'return id(ac_assumed_on);'
          then:
            - script.execute: air_conditioner_on_off
            - lambda: |-
                id(ac_assumed_on)      = false;
                id(ac_shutdown_active) = true;
            - delay: ${AC_SHUTDOWN_MS}ms
            - lambda: 'id(ac_shutdown_active) = false;'
      # Step 2: Turn on (AC will start at defaults)
      - script.execute: air_conditioner_on_off
      - delay: 1500ms
      - lambda: |-
          id(ac_assumed_on)   = true;
          id(ac_current_temp) = ${AC_DEFAULT_TEMP};
          id(ac_current_fan)  = ${AC_DEFAULT_FAN};
          // Read desired targets from the climate entity
          id(ac_target_temp) = (int)id(ac_climate).target_temperature;
      # Step 3: Sync to desired targets
      - script.execute: ac_sync_temp
      - script.wait: ac_sync_temp
      - script.execute: ac_sync_fan
      - script.wait: ac_sync_fan
      - lambda: |-
          ESP_LOGI("ac", "Reinitialize complete: %d C, fan %d",
                   id(ac_target_temp), id(ac_fan_level));

