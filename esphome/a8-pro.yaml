###############################################################################
#  A8-PRO ESPHome firmware – roof-fan / IR hub / AC climate controller
#  board: esp32dev  –  IR TX GPIO2  –  IR RX GPIO23
###############################################################################

esphome:
  name: ag-pro
  friendly_name: AG Pro

# Put substitutions early so they're available everywhere
substitutions:
  MAX_SPEED: "6"          # easy tweak later
  AC_DEFAULT_TEMP: "26"   # temp the AC starts at when powered on
  AC_DEFAULT_FAN: "4"     # fan level the AC starts at when powered on (1L–6L)
  AC_MIN_TEMP: "16"
  AC_MAX_TEMP: "32"
  AC_SHUTDOWN_MS: "30000" # compressor stop-down period (30s)

esp32:
  board: esp32dev
  framework:
    type: arduino

# ─────────────────────────────────────────────────────────────────────────────
# Core
# ─────────────────────────────────────────────────────────────────────────────
logger:
api:
  encryption:
    key: !secret ag_pro_api_key
ota:
  - platform: esphome
    password: !secret ag_pro_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.10.61
    gateway: 192.168.10.1
    subnet: 255.255.255.0
  ap:
    ssid: "AG-Pro Fallback Hotspot"
    password: !secret ag_pro_ap_password

captive_portal:

uart:
  - id: zigbee_uart
    tx_pin: GPIO33
    rx_pin: GPIO32
    baud_rate: 115200

# ─────────────────────────────────────────────────────────────────────────────
# IR
# ─────────────────────────────────────────────────────────────────────────────
remote_receiver:
  pin: GPIO23
  tolerance: 25%
  filter: 50us
  idle: 10000us
  dump: all

remote_transmitter:
  id: transmitter_main
  pin: GPIO2         # <- warning: strapping pin – use at your own risk
  carrier_duty_percent: 50%

# ─────────────────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────────────────
globals:
  - id: fan_output_float
    type: float
    restore_value: no
    initial_value: '0.0'

  # ── AC climate controller state ──
  - id: ac_assumed_on
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: ac_target_temp
    type: int
    restore_value: yes
    initial_value: '${AC_DEFAULT_TEMP}'
  - id: ac_current_temp
    type: int
    restore_value: yes
    initial_value: '${AC_DEFAULT_TEMP}'
  - id: ac_fan_level
    type: int
    restore_value: yes
    initial_value: '${AC_DEFAULT_FAN}'
  - id: ac_current_fan
    type: int
    restore_value: yes
    initial_value: '${AC_DEFAULT_FAN}'
  - id: ac_shutdown_active
    type: bool
    restore_value: no
    initial_value: 'false'

# ─────────────────────────────────────────────────────────────────────────────
# HA sensor imports (for AC power feedback)
# ─────────────────────────────────────────────────────────────────────────────
sensor:
  - platform: homeassistant
    id: ac_power_sensor
    entity_id: sensor.air_conditioning_power_24v
    on_value:
      - lambda: |-
          // If power > 12 W the AC is confirmed running
          bool hw_on = x > 12.0f;
          if (hw_on && !id(ac_assumed_on)) {
            // AC turned on externally (via physical remote?)
            id(ac_assumed_on) = true;
            id(ac_current_temp) = ${AC_DEFAULT_TEMP};
            id(ac_current_fan)  = ${AC_DEFAULT_FAN};
          }
          if (!hw_on && id(ac_assumed_on) && !id(ac_shutdown_active)) {
            // AC turned off externally
            id(ac_assumed_on) = false;
          }
  - platform: homeassistant
    id: ac_room_temp
    entity_id: sensor.bme280_1_temperature
    unit_of_measurement: "°C"
    filters:
      - heartbeat: 30s

text_sensor:
  - platform: template
    name: "24V AC Status"
    id: ac_status_text
    icon: mdi:air-conditioner
    lambda: |-
      if (id(ac_shutdown_active))
        return std::string("Shutdown (compressor cooldown)");
      if (!id(ac_assumed_on))
        return std::string("Off");
      char buf[48];
      snprintf(buf, sizeof(buf), "Cooling — %d°C, Fan %d/6",
               id(ac_current_temp), id(ac_current_fan));
      return std::string(buf);
    update_interval: 5s

binary_sensor:
  - platform: template
    name: "24V AC Compressor Shutdown"
    id: ac_shutdown_sensor
    icon: mdi:timer-sand
    lambda: 'return id(ac_shutdown_active);'

# ─────────────────────────────────────────────────────────────────────────────
# Fan entity (10-step speed fan)
# ─────────────────────────────────────────────────────────────────────────────
fan:
  - platform: speed
    name: "Roof Fan"
    id: roof_fan
    speed_count: 10
    direction_output: roof_fan_direction
    output: roof_fan_speed_out
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_off:
      - switch.template.publish:
          id: ceiling_fan_mode
          state: OFF
      - cover.template.publish:
          id: roof_fan_lid
          state: CLOSED
    on_turn_on:
      - if:
          condition:
            - switch.is_off: ceiling_fan_mode
          then:
            - cover.template.publish:
                id: roof_fan_lid
                state: OPEN

output:
  - platform: ledc
    pin: GPIO4
    id: buzzer
    frequency: 2000 Hz
    channel: 0

  - platform: template          # direction (FORWARD = exhaust, REVERSE = intake)
    id: roof_fan_direction
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              return id(roof_fan).direction == FanDirection::FORWARD;
          then:
            - switch.template.publish:
                id: ceiling_fan_mode
                state: OFF

  - platform: template          # speed – captures the float sent by the fan
    id: roof_fan_speed_out
    type: float
    write_action:
      - lambda: id(fan_output_float) = state;

      # If we're going above 0% speed, ensure we're not in ceiling mode,
      # and the lid is OPEN before we send the first speed IR.
      - if:
          condition:
            lambda: 'return state > 0.0f;'
          then:
            # If using roof mode (NOT ceiling fan) and lid is still closed, open it first
            - if:
                condition:
                  and:
                    - fan.is_on: roof_fan
                    - switch.is_off: ceiling_fan_mode
                    - lambda: 'return id(roof_fan_lid).position <= 0.5f;'
                then:
                  - cover.template.publish:
                      id: roof_fan_lid
                      state: OPEN
                  # small pause so our optimistic cover state flips before dispatch
                  - delay: 400ms

            - script.execute: roof_fan_dispatch

# ─────────────────────────────────────────────────────────────────────────────
# Cover  (lid sensor is only virtual/optimistic for now)
# ─────────────────────────────────────────────────────────────────────────────
cover:
  - platform: template
    id: roof_fan_lid
    name: "Roof Fan Lid"
    assumed_state: true
    optimistic: true
    on_open:
      - if:
          condition:
            lambda: 'return id(roof_fan_lid).position > 0.5f;'
          then:
            - if:
                condition:
                  fan.is_off: roof_fan
                then:
                  # fan off – lid open IR code
                  - remote_transmitter.transmit_raw:
                      transmitter_id: transmitter_main
                      carrier_frequency: 38kHz
                      code: [1815,-743,893,-1527,846,-787,895,-1526,845,-789,894,-716,1717,-716,849,-2402,6515,-2403,893,-5584,851,-1593,5715,-785,888,-1533,847,-4812,913,-2342,4954,-724,1711,-1533,847,-4007,912,-3154,4159,-725,2468,-1593,2511,-1536,1708,-3154,2472,-1594,3332,-1536,1706,-728,846,-785,3267,-1596,1646,-786,1644,-789,850,-762,844,-1579,869,-8061,845,-1577,2494,-763,1670,-1572,3265,-794,2491]
            - if:
                condition:
                  and:
                    - fan.is_on: roof_fan
                    - switch.is_on: ceiling_fan_mode
                then:
                  - switch.template.publish:
                      id: ceiling_fan_mode
                      state: OFF
    on_closed:
      - if:
          condition:
            and:
              - fan.is_on: roof_fan
              - switch.is_off: ceiling_fan_mode
          then:
            - switch.template.publish:
                id: ceiling_fan_mode
                state: ON
      - if:
          condition:
            fan.is_off: roof_fan
          then:
            # fan off – lid closed IR code
            - remote_transmitter.transmit_raw:
                transmitter_id: transmitter_main
                carrier_frequency: 38kHz
                code: [1604,-834,778,-1646,800,-835,779,-1645,802,-834,780,-836,1601,-834,800,-2455,6474,-2457,802,-5710,805,-1620,5651,-858,779,-1645,803,-4899,779,-2458,4875,-834,1604,-1645,780,-4083,804,-3265,4025,-835,2397,-1670,2401,-1647,1602,-3294,7270,-1646,1604,-3270,2398,-1671,3228,-859,1577,-833,803,-1644,778,-8145,800,-1646,2402,-836,1626,-1623,1599,-835,774,-861,2400]

# ─────────────────────────────────────────────────────────────────────────────
# Misc switches
# ─────────────────────────────────────────────────────────────────────────────
switch:
  - platform: template
    id: ceiling_fan_mode
    name: "Ceiling Fan Mode"
    icon: mdi:ceiling-fan
    optimistic: true
    on_turn_on:
      - lambda: |-
          auto call = id(roof_fan).make_call();
          call.set_speed(id(roof_fan).speed);
          call.set_direction(FanDirection::REVERSE);
          call.perform();
      - if:
          condition:
            fan.is_off: roof_fan
          then:
            - fan.turn_on: roof_fan
      - cover.template.publish:
          id: roof_fan_lid
          state: CLOSED
    on_turn_off:
      - if:
          condition:
            fan.is_on: roof_fan
          then:
            - cover.template.publish:
                id: roof_fan_lid
                state: OPEN

# ─────────────────────────────────────────────────────────────────────────────
# Climate entity – 24V Mini-Split AC (IR-controlled)
#
#   The mini-split has its own internal thermostat.  We use the ESPHome
#   thermostat platform purely as a UI wrapper:
#     – "Cool" mode  → IR power-on + sync to target temp/fan
#     – "Off" mode   → IR power-off
#     – Target temp   → IR temp_up/temp_down presses to match
#     – Fan modes     → IR speed_up/speed_down presses to match
#     – Swing toggle  → IR swing_flap
#
#   The BME280 room-temp sensor (on A32 Pro) is imported from HA for the
#   "current temperature" readout.  Hysteresis is set very wide so the
#   thermostat never auto-triggers cool/idle — we control everything
#   manually through the mode and target_temperature_change actions.
#
#   Power-on defaults: 26 °C, fan level 4 (1L–6L).
#   30 s compressor stop-down enforced via min_cooling_off_time.
#   "Reinitialize" button re-syncs assumed ↔ actual state.
# ─────────────────────────────────────────────────────────────────────────────
climate:
  - platform: thermostat
    name: "24V Air Conditioner"
    id: ac_climate
    sensor: ac_room_temp
    min_idle_time: 5s
    min_cooling_off_time: ${AC_SHUTDOWN_MS}ms
    min_cooling_run_time: 5s
    startup_delay: true        # enforce compressor delay on boot
    cool_deadband: 50.0       # effectively disable auto-trigger
    cool_overrun: 50.0        # effectively disable auto-trigger
    visual:
      min_temperature: ${AC_MIN_TEMP}
      max_temperature: ${AC_MAX_TEMP}
      temperature_step: 1.0
    default_preset: Normal
    on_boot_restore_from: memory
    preset:
      - name: Normal
        default_target_temperature_high: ${AC_DEFAULT_TEMP}
        fan_mode: MEDIUM
      - name: eco
        default_target_temperature_high: 28
        fan_mode: LOW
      - name: boost
        default_target_temperature_high: 18
        fan_mode: HIGH

    # ── Mode changes (user selects COOL / OFF in the HA UI) ──
    #    Because the deadband is 50 °C, cool_action will never auto-fire.
    #    The REAL on/off work is done by cool_mode / off_mode.
    cool_action:
      - logger.log: "AC thermostat cool_action (auto-trigger — should never fire)"
    idle_action:
      - logger.log: "AC thermostat idle (no action — AC manages its own thermostat)"
    cool_mode:
      - script.execute: ac_turn_on
    off_mode:
      - script.execute: ac_turn_off

    # ── Target temperature changed ──
    target_temperature_change_action:
      - lambda: |-
          int new_temp = (int)id(ac_climate).target_temperature;
          if (new_temp < ${AC_MIN_TEMP}) new_temp = ${AC_MIN_TEMP};
          if (new_temp > ${AC_MAX_TEMP}) new_temp = ${AC_MAX_TEMP};
          id(ac_target_temp) = new_temp;
          if (id(ac_assumed_on) && !id(ac_shutdown_active)) {
            id(ac_sync_temp).execute();
          }

    # ── Fan modes: LOW=2, MEDIUM=4, HIGH=6 ──
    fan_mode_low_action:
      - lambda: |-
          id(ac_fan_level) = 2;
          if (id(ac_assumed_on) && !id(ac_shutdown_active))
            id(ac_sync_fan).execute();
    fan_mode_medium_action:
      - lambda: |-
          id(ac_fan_level) = 4;
          if (id(ac_assumed_on) && !id(ac_shutdown_active))
            id(ac_sync_fan).execute();
    fan_mode_high_action:
      - lambda: |-
          id(ac_fan_level) = 6;
          if (id(ac_assumed_on) && !id(ac_shutdown_active))
            id(ac_sync_fan).execute();
    min_fan_mode_switching_time: 2s

    # ── Swing mode ──
    swing_vertical_action:
      - script.execute: air_conditioner_swing_flap
    swing_off_action:
      - script.execute: air_conditioner_swing_flap

script:
  # ───────────────────────────────────────────────────────────────────────────
  # Dispatcher script – chooses the correct IR command
  #   (references specific IR scripts that appear later in the file)
  # ───────────────────────────────────────────────────────────────────────────
  - id: roof_fan_dispatch
    mode: restart
    then:
      - lambda: |-
          using Scr = esphome::script::SingleScript<>*;

          const bool pwr     = id(roof_fan).state;                       // ON / OFF
          const bool lidOpen = id(roof_fan_lid).position > 0.5f;
          const bool exhaust = id(roof_fan).direction == FanDirection::FORWARD;
          const int  step    = std::max(1, std::min(10, id(roof_fan).speed)) - 1;

          /* -----  OFF  --------------------------------------------------- */
          if (!pwr) {
            if (lidOpen) {
              id(roof_fan_off_and_open).execute();
            } else {
              id(roof_fan_off_and_closed).execute();
            }
            return;
          }

          /* -----  ON  ---------------------------------------------------- */
          static Scr const tbl_closed[10] = {
            id(roof_fan_on_closed_speed_10), id(roof_fan_on_closed_speed_20),
            id(roof_fan_on_closed_speed_30), id(roof_fan_on_closed_speed_40),
            id(roof_fan_on_closed_speed_50), id(roof_fan_on_closed_speed_60),
            id(roof_fan_on_closed_speed_70), id(roof_fan_on_closed_speed_80),
            id(roof_fan_on_closed_speed_90), id(roof_fan_on_closed_speed_100)
          };

          static Scr const tbl_out[10] = {
            id(roof_fan_on_open_air_out_speed_10),  id(roof_fan_on_open_air_out_speed_20),
            id(roof_fan_on_open_air_out_speed_30),  id(roof_fan_on_open_air_out_speed_40),
            id(roof_fan_on_open_air_out_speed_50),  id(roof_fan_on_open_air_out_speed_60),
            id(roof_fan_on_open_air_out_speed_70),  id(roof_fan_on_open_air_out_speed_80),
            id(roof_fan_on_open_air_out_speed_90),  id(roof_fan_on_open_air_out_speed_100)
          };
          static Scr const tbl_in[10] = {
            id(roof_fan_on_open_air_in_speed_10),   id(roof_fan_on_open_air_in_speed_20),
            id(roof_fan_on_open_air_in_speed_30),   id(roof_fan_on_open_air_in_speed_40),
            id(roof_fan_on_open_air_in_speed_50),   id(roof_fan_on_open_air_in_speed_60),
            id(roof_fan_on_open_air_in_speed_70),   id(roof_fan_on_open_air_in_speed_80),
            id(roof_fan_on_open_air_in_speed_90),   id(roof_fan_on_open_air_in_speed_100)
          };

          Scr next = nullptr;
          if (!lidOpen)         next = tbl_closed[step];
          else if (exhaust)     next = tbl_out[step];
          else                  next = tbl_in[step];

          if (next) next->execute();


