# Heater status text sensor (replaces old lockout-only sensor)
  - platform: template
    name: "Hydronic Heater Status"
    id: heater_status_text
    update_interval: 1s
    lambda: |-
      int state = id(heater_retry_state);
      bool heater_on = id(hydronic_heater_on_off).state;
      float now_sec = id(real_time_clock).now().timestamp;
      float last_off = id(hydronic_heater_last_off_timestamp);

      // Priority 1: retry state machine messages
      if (state == 1 && heater_on) {
        return {"Starting heater -> Waiting for coolant to warm up..."};
      }
      if (state == 2 && heater_on) {
        return {"First attempt failed -> Retrying..."};
      }
      if (state == 3) {
        return {"Heater running -> Coolant warming up."};
      }
      if (state == 4) {
        return {"Heater failed to start after retry."};
      }
      if (state == 5) {
        float fuel = id(ha_stable_fuel_level).state;
        if (std::isnan(fuel)) fuel = 0;
        char buf[120];
        sprintf(buf, "Low fuel lockout (%.0f%%) -> Refuel or override from dashboard.", fuel);
        return {buf};
      }

      // Priority 2: power supply cooldown lockout
      if (heater_on) {
        return {"Heater running."};
      }
      float diff = now_sec - last_off;
      if (last_off > 0 && diff < 180.0) {
        float remain = 180.0 - diff;
        char buffer[80];
        sprintf(buffer, "Cooldown -> %.0fs before power can be removed.", remain);
        return {buffer};
      }

      return {"Idle."};

gp8403:
  id: my_gp8403
  voltage: 5V

globals:
  - id: blower_active
    type: bool
    initial_value: "false"  # Default to Manual mode (PID off)

  # Global: store last-off time using absolute time.
  - id: hydronic_heater_last_off_timestamp
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: water_system_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: last_water_state
    type: int
    restore_value: yes
    initial_value: '1'

  - id: valves_need_delay          # true if a valve position changes this run
    type: bool
    restore_value: no
    initial_value: 'false'

  # Heater retry state machine:
  #   0 = idle
  #   1 = first attempt (waiting for warmup)
  #   2 = retrying (second attempt)
  #   3 = running (warmup confirmed)
  #   4 = failed (both attempts failed)
  #   5 = locked out (low fuel after failed retry)
  - id: heater_retry_state
    type: int
    restore_value: no
    initial_value: '0'

  # Coolant temperature recorded when heater was started
  - id: heater_start_coolant_temp
    type: float
    restore_value: no
    initial_value: '0.0'

script:
  ########################################################################
  #  heater_start_with_retry – starts the hydronic heater and monitors   #
  #  coolant temperature. If coolant doesn't rise by at least 2°C in     #
  #  5 minutes, turns heater off/on once (retry). If the second attempt  #
  #  also fails after 5 minutes, gives up and sets state to failed.      #
  ########################################################################
  - id: heater_start_with_retry
    mode: restart
    then:
      # Record starting coolant temperature
      - lambda: |-
          float temp = id(s5140_ch34_temp).state;
          if (std::isnan(temp)) temp = 0.0;
          id(heater_start_coolant_temp) = temp;
          id(heater_retry_state) = 1;
          ESP_LOGI("HEATER", "Starting heater. Coolant baseline: %.1f C", temp);
      # Turn on the heater
      - switch.turn_on: hydronic_heater_on_off_physical
      # Wait 5 minutes for warmup
      - delay: 5min
      # Check if coolant warmed up (at least 2 C rise)
      - lambda: |-
          float now_temp = id(s5140_ch34_temp).state;
          float start_temp = id(heater_start_coolant_temp);
          if (std::isnan(now_temp)) now_temp = start_temp;
          float rise = now_temp - start_temp;
          ESP_LOGI("HEATER", "First check: start=%.1f now=%.1f rise=%.1f", start_temp, now_temp, rise);
          if (rise >= 2.0) {
            id(heater_retry_state) = 3;
            ESP_LOGI("HEATER", "Coolant warming -> heater is working.");
          }
      # If already confirmed working, stop here
      - if:
          condition:
            lambda: 'return id(heater_retry_state) == 3;'
          then:
            - logger.log:
                level: INFO
                format: "Heater confirmed working on first attempt."
          else:
            # First attempt failed - retry
            - logger.log:
                level: WARN
                format: "Heater first attempt failed -> coolant did not warm up. Retrying..."
            - lambda: 'id(heater_retry_state) = 2;'
            # Cycle the heater off then on
            - switch.turn_off: hydronic_heater_on_off_physical
            - delay: 10s
            - switch.turn_on: hydronic_heater_on_off_physical
            # Record new baseline for retry
            - lambda: |-
                float temp = id(s5140_ch34_temp).state;
                if (std::isnan(temp)) temp = 0.0;
                id(heater_start_coolant_temp) = temp;
                ESP_LOGI("HEATER", "Retry started. New coolant baseline: %.1f C", temp);
            # Wait another 5 minutes
            - delay: 5min
            # Final check
            - lambda: |-
                float now_temp = id(s5140_ch34_temp).state;
                float start_temp = id(heater_start_coolant_temp);
                if (std::isnan(now_temp)) now_temp = start_temp;
                float rise = now_temp - start_temp;
                float fuel = id(ha_stable_fuel_level).state;
                if (std::isnan(fuel)) fuel = 100.0;  // assume OK if unknown
                ESP_LOGI("HEATER", "Retry check: start=%.1f now=%.1f rise=%.1f fuel=%.0f%%", start_temp, now_temp, rise, fuel);
                if (rise >= 2.0) {
                  id(heater_retry_state) = 3;
                  ESP_LOGI("HEATER", "Coolant warming on retry -> heater is working.");
                } else if (fuel < 25.0) {
                  id(heater_retry_state) = 5;
                  ESP_LOGW("HEATER", "Heater failed + fuel low (%.0f%%) -> locking out.", fuel);
                } else {
                  id(heater_retry_state) = 4;
                  ESP_LOGW("HEATER", "Heater failed to start after retry. Giving up.");
                }
            # If fuel is low after failure, activate the HA lockout boolean
            - if:
                condition:
                  lambda: 'return id(heater_retry_state) == 5;'
                then:
                  - homeassistant.service:
                      service: input_boolean.turn_on
                      data:
                        entity_id: input_boolean.heater_low_fuel_lockout
                  - switch.turn_off: hydronic_heater_on_off_physical
                  - lambda: |-
                      id(hydronic_heater_last_off_timestamp) = id(real_time_clock).now().timestamp;
                  - logger.log:
                      level: WARN
                      format: "Low fuel lockout activated -> heater turned OFF."

  ########################################################################
  #  set_water_state – switch between the three operating modes of the   #
  #  water system.                                                       #
  #    state = 1 → MAIN (normal use)                                     #
  #    state = 2 → RECIRCULATING SHOWER                                  #
  #    state = 3 → RECIRCULATING SHOWER FLUSH                            #
  ########################################################################
  - id: set_water_state
    parameters:
      state: int                   # 1‑Main · 2‑Recirc · 3‑Flush
    mode: restart                  # cancel any previous run
    then:
      # ── Only act when the master switch is enabled ───────────────────
      - if:
          condition:
            lambda: 'return id(water_system_enabled);'
          then:

            # ── 0. Remember the requested state for next power‑up ─────
            - lambda: 'id(last_water_state) = state;'

            # ── 1. Stop both pumps immediately ────────────────────────
            - switch.turn_off: main_system_water_pump_on_off
            - switch.turn_off: shower_system_water_pump_on_off

            # ── 2. Work out which valve positions are required ────────
            - lambda: |-
                bool v1_desired = (state == 2);   // Valve 1
                bool v2_desired = (state == 3);                 // Valve 2
                bool v3_desired = (state == 3);                 // Valve 3

                id(valves_need_delay) =
                  (id(water_system_valve_1_open_closed).state != v1_desired) ||
                  (id(water_system_valve_2_open_closed).state != v2_desired) ||
                  (id(water_system_valve_3_open_closed).state != v3_desired);

            # ── 3. Move only the valves that need moving ──────────────
            # Valve 1
            - if:
                condition:
                  lambda: 'return id(water_system_valve_1_open_closed).state != (state == 2);'
                then:
                  - switch.toggle: water_system_valve_1_open_closed
            # Valve 2
            - if:
                condition:
                  lambda: 'return id(water_system_valve_2_open_closed).state != (state == 3);'
                then:
                  - switch.toggle: water_system_valve_2_open_closed
            # Valve 3
            - if:
                condition:
                  lambda: 'return id(water_system_valve_3_open_closed).state != (state == 3);'
                then:
                  - switch.toggle: water_system_valve_3_open_closed

            # ── 4. Update state‑indicator LEDs on the switch panel ────
            - switch.turn_off: switch11_water_system_state_main
            - switch.turn_off: switch12_water_system_state_recirculating_shower
            - switch.turn_off: switch13_water_system_state_recirculating_shower_flush
            - if: { condition: { lambda: 'return state == 1;' }, then: { switch.turn_on: switch11_water_system_state_main } }
            - if: { condition: { lambda: 'return state == 2;' }, then: { switch.turn_on: switch12_water_system_state_recirculating_shower } }
            - if: { condition: { lambda: 'return state == 3;' }, then: { switch.turn_on: switch13_water_system_state_recirculating_shower_flush } }

            # ── 5. Keep overall water‑system power ON ─────────────────
            - switch.turn_on: switch10_water_system_overall

            # ── 6. UV filter control  (ON for states 2 & 3) ───────────
            - if:
                condition: { lambda: 'return state == 2 || state == 3;' }
                then:       { switch.turn_on: UV_filter }
                else:       { switch.turn_off: UV_filter }

            # ── 7. OPTIONAL delay if any valves moved ─────────────────
            - if:
                condition:
                  lambda: 'return id(valves_need_delay);'
                then:
                  - delay: 10s

            # ── 8. Start the pumps appropriate to this mode ───────────
            - switch.turn_on: main_system_water_pump_on_off
            - if:
                condition: { lambda: 'return state == 2 || state == 3;' }
                then:       { switch.turn_on: shower_system_water_pump_on_off }

  - id: push_inverter
    mode: restart
    then:
      - switch.turn_on: inverter_button
      - delay: 1s
      - switch.turn_off: inverter_button

climate:
  # PID Climate for Van Hydronic Heating
  - platform: pid
    id: coolant_blower_heating
    name: "Van Hydronic Heating (PID)"
    sensor: BME280_1_Temperature
    default_target_temperature: 20 °C
    heat_output: pid_coolant_blower_output
    control_parameters:
      kp: 0.95493
      ki: 0.00137
      kd: 167.00887
      output_averaging_samples: 5      # Smooth the final output (RESULT) over 5 samples
      derivative_averaging_samples: 5  # Smooth the derivative calculation

    # Optional: deadband around the setpoint to reduce toggling
    # Adjust thresholds or multipliers to taste
    deadband_parameters:
      threshold_high: 0.1     # +0.5 °C above setpoint
      threshold_low: -0.1     # –0.5 °C below setpoint
      kp_multiplier: 0.0      # Proportional effectively turned off in deadband
      ki_multiplier: 0.05     # Let integral gently adjust inside deadband
      kd_multiplier: 0.0      # Usually keep derivative disabled inside deadband
      deadband_output_averaging_samples: 15  # Extra smoothing while in deadband

    on_state:
      - if:
          condition:
            lambda: 'return x.mode != climate::CLIMATE_MODE_OFF;'
          then:
            - lambda: |-
                id(blower_active) = true;
                ESP_LOGI("CLIMATE", "Climate is ON. PID enabled.");
            # Start the heater with retry logic (only if not already running/retrying/locked out)
            - if:
                condition:
                  and:
                    - switch.is_on: hydronic_heater_power_supply_control
                    - switch.is_off: hydronic_heater_on_off_physical
                    - lambda: 'return !id(heater_start_with_retry).is_running();'
                    - lambda: 'return !id(ha_heater_fuel_lockout).state;'
                then:
                  - script.execute: heater_start_with_retry
                  - logger.log:
                      level: INFO
                      format: "Climate ON -> Starting heater with retry logic."
                else:
                  - if:
                      condition:
                        lambda: 'return id(ha_heater_fuel_lockout).state;'
                      then:
                        - lambda: 'id(heater_retry_state) = 5;'
                        - logger.log:
                            level: WARN
                            format: "Climate ON but heater locked out (low fuel). Override from dashboard."
          else:
            - lambda: |-
                id(blower_active) = false;
                ESP_LOGI("CLIMATE", "Climate is OFF. PID disabled.");
            # Stop the retry script if running
            - script.stop: heater_start_with_retry
            - lambda: 'id(heater_retry_state) = 0;'
            # Turn off the hydronic heater UNLESS hot water mode is active
            - if:
                condition:
                  lambda: 'return id(ha_hot_water_mode).state;'
                then:
                  - logger.log:
                      level: INFO
                      format: "Climate OFF but Hot Water Mode is ON - keeping hydronic heater running."
                else:
                  - switch.turn_off: hydronic_heater_on_off_physical
                  - lambda: |-
                      id(hydronic_heater_last_off_timestamp) = id(real_time_clock).now().timestamp;
                  - logger.log:
                      level: INFO
                      format: "Climate OFF -> Hydronic heater turned OFF."
          
                  
  # 1) Battery Heater Thermostat
  - platform: bang_bang
    id: battery_heater_thermostat
    name: "Battery Heater Thermostat"
    sensor: s5140_ch36_temp
    default_target_temperature_low: 4
    default_target_temperature_high: 5
    heat_action:
      - switch.turn_on: do8_switch05_battery_heater
    idle_action:
      - switch.turn_off: do8_switch05_battery_heater

  # 2) Air Fryer Ventilation Thermostat
  - platform: bang_bang
    id: air_fryer_thermostat
    name: "Air Fryer Ventilation Thermostat"
    sensor: s5140_ch37_temp
    default_target_temperature_low: 38
    default_target_temperature_high: 40
    cool_action:
      - switch.turn_on: do8_switch08_air_fryer_ventilation_fans
    idle_action:
      - switch.turn_off: do8_switch08_air_fryer_ventilation_fans

  # 3) Fresh Water Tank Thermostat
  - platform: bang_bang
    id: fresh_water_tank_thermostat
    name: "Fresh Water Tank Thermostat"
    sensor: s5140_ch38_temp
    default_target_temperature_low: 4
