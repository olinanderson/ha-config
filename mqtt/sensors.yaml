# ============================================================
# mqtt/sensors.yaml — WiCAN Pro OBD2 Sensors (MQTT)
# ============================================================
# All WiCAN OBD data via MQTT topics (replaces ha-wican HTTP webhooks).
# Entity IDs match old ha-wican integration via object_id — no downstream changes needed.
# WiCAN publishes {"NAME": value} per PID; value_template extracts the first value.
#
# Disabled PIDs (broken on this ECU): FUEL_RATE, ALT_DUTY
# Disabled PIDs (hybrid-only, not applicable): HV_A, HV_V, SOC
# ============================================================

# ─── Standard OBD PIDs (Mode 01, 1s polling) ────────────────

- name: "Engine RPM"
  object_id: "192_168_10_90_0c_enginerpm"
  unique_id: "wican_0c_enginerpm"
  state_topic: "wican/EngineRPM"
  value_template: "{{ value_json.values() | first }}"
  unit_of_measurement: "rpm"
  state_class: measurement
  icon: mdi:engine
  expire_after: 30
  device: &wican_device
    identifiers: ["wican_pro"]
    name: "WiCAN Pro"
    manufacturer: "MeatPi Electronics"
    model: "WiCAN Pro"

