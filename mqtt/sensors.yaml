# ─── WiCAN RAW debug sensors ───
- name: "WiCAN RAW Status"
  unique_id: wican_raw_status
  state_topic: "wican/status"
  value_template: "{{ value }}"

- name: "WiCAN RAW Vehicle Speed"
  unique_id: wican_raw_vehicle_speed
  state_topic: "wican/vehicle_speed"
  value_template: "{{ value }}"

- name: "WiCAN RAW Fuel Tank Level"
  unique_id: wican_raw_fuel_tank_level
