  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','sleep_analysis') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ r[-1].sleepStart | default(states('sensor.apple_watch_ultra_apple_watch_sleep_start'), true) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_sleep_start') }}{% endif %}
  icon: mdi:clock-start

