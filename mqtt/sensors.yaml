# --- Sleep Score: Apple's own Sleep Score is NOT exported via HealthKit (it is
#     absent from the payload). This is a COMPUTED proxy (0-100) from the sleep
#     stages: 50% duration vs an 8h target, 30% deep+REM quality, 20% low wake. ---
- name: "Apple Watch Sleep Score"
  unique_id: "apple_watch_sleep_score"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','sleep_analysis') | map(attribute='data') | first | default([]) %}
    {% if r and (r[-1].totalSleep | float(0)) > 0 %}
    {% set s = r[-1] %}{% set total = s.totalSleep | float(0) %}{% set dr = (s.deep | float(0)) + (s.rem | float(0)) %}{% set awake = s.awake | float(0) %}
    {{ (50 * ([total / 8, 1] | min) + 30 * ([dr / (total * 0.5), 1] | min) + 20 * (1 - ([awake / total, 1] | min))) | round(0) | int }}
    {% else %}{{ states('sensor.apple_watch_ultra_apple_watch_sleep_score') }}{% endif %}
  unit_of_measurement: "/100"
  state_class: measurement
  icon: mdi:sleep

# --- Body Composition (RENPHO Elis Go scale -> Apple Health -> Health Auto
#     Export, on the main healthexport/data feed). KG metrics (weight, lean
#     mass) are converted to LB; to use kg instead, delete "* 2.20462262" and
#     set unit_of_measurement: kg. All are "latest wins" (no source lock), so
#     the most recent Apple Health entry shows regardless of which app wrote it.
#     The keep-last default holds the last value on days with no new reading. ---
- name: "Apple Watch Weight"
  unique_id: "apple_watch_weight"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','weight_body_mass') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ (r[-1].qty | float(0) * 2.20462262) | round(1) }}{% else %}{{ states('sensor.apple_watch_weight') }}{% endif %}
  unit_of_measurement: "lb"
  device_class: weight
  state_class: measurement
  icon: mdi:scale-bathroom

- name: "Apple Watch Body Fat"
