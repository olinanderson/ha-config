  value_template: "{{ value }}"

# ─── WiCAN parsed sensors ───
- state_topic: "wican/vehicle_speed"
  name: "WiCAN Speed"
  unique_id: wican_speed_mqtt
  icon: mdi:speedometer
  state_class: measurement
  unit_of_measurement: "km/h"
  value_template: "{{ value_json.get('0D-VehicleSpeed') | float }}"
  device:
    identifiers: ["WiCAN"]
    manufacturer: "MeatPi"
    model: "WiCAN OBD"
    name: "WiCAN"

- state_topic: "wican/fuel_tank_level"
  name: "WiCAN Fuel"
  unique_id: wican_fuel_mqtt
  icon: mdi:fuel
  state_class: measurement
  unit_of_measurement: "%"
  value_template: "{{ value_json.get('2F-FuelTankLevel') | float | round(2) }}"
  device:
    identifiers: ["WiCAN"]
    manufacturer: "MeatPi"
    model: "WiCAN OBD"
    name: "WiCAN"

- state_topic: "wican/engine_coolant_temp"
  name: "WiCAN Coolant Temperature"
  unique_id: wican_coolant_temp_mqtt
  icon: mdi:thermometer
  device_class: temperature
  state_class: measurement
  unit_of_measurement: "°C"
  value_template: "{{ value_json.get('05-EngineCoolantTemp') | float }}"
  device:
    identifiers: ["WiCAN"]
    manufacturer: "MeatPi"
    model: "WiCAN OBD"
    name: "WiCAN"

- state_topic: "wican/engine_rpm"
  name: "WiCAN RPM"
  unique_id: wican_rpm_mqtt
  icon: mdi:engine
  state_class: measurement
  unit_of_measurement: "rpm"
