    {% set r = value_json.data.metrics | selectattr('name','eq','blood_oxygen_saturation') | map(attribute='data') | first | default([]) %}
    {% if r %}{% set v = r[-1].qty | float(0) %}{{ (v * 100) | round(0) if v <= 1 else v | round(0) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_blood_oxygen') }}{% endif %}
  unit_of_measurement: "%"
  state_class: measurement
  icon: mdi:water-percent

