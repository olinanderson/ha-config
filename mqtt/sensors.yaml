# =========================================================
# WiCAN Pro DTC Extraction (Active Fault Codes)
# =========================================================
  
- name: "Transit Active DTCs"  
  state_topic: "homeassistant/wican/transit/dtcs"  
  icon: mdi:engine-outline  
  value_template: >-  
    {%- set raw_data = value_json.active_dtcs_raw if value_json is defined and value_json is mapping else value -%}  
    {%- set payload = raw_data | string | replace(" ", "") | upper -%}  
    {%- if payload.startswith("43") and payload | length >= 4 -%}  
      {%- set count = payload[2:4] | int(base=16) -%}  
      {{- "System Clear" if count == 0 else count ~ " Active Codes" -}}  
    {%- else -%}  
      Waiting for Data...  
    {%- endif -%}  
  json_attributes_topic: "homeassistant/wican/transit/dtcs"  
  json_attributes_template: >-  
    {%- from "ford_dtc.jinja" import get_meaning -%}  
    {%- set raw_data = value_json.active_dtcs_raw if value_json is defined and value_json is mapping else value -%}  
    {%- set payload = raw_data | string | replace(" ", "") | upper -%}  
    {%- set ns = namespace(codes=[], details=[]) -%}  
    {%- if payload.startswith("43") and payload | length >= 4 -%}  
      {%- set count = payload[2:4] | int(base=16) -%}  
      {%- if count > 0 -%}  
        {%- set prefix_map = {  
          "0":"P0", "1":"P1", "2":"P2", "3":"P3",  
          "4":"C0", "5":"C1", "6":"C2", "7":"C3",  
          "8":"B0", "9":"B1", "A":"B2", "B":"B3",  
          "C":"U0", "D":"U1", "E":"U2", "F":"U3"  
        } -%}  
        {%- set codes_string = payload[4:] -%}  
        {%- for i in range(0, count * 4, 4) -%}  
          {%- set hex_code = codes_string[i:i+4] -%}  
          {%- if hex_code | length == 4 -%}  
            {%- set first_char = hex_code[0] -%}  
            {%- if first_char in prefix_map -%}  
              {%- set dtc = prefix_map[first_char] ~ hex_code[1:4] -%}  
              {%- set meaning = get_meaning(dtc) | trim -%}  
              {%- set ns.codes = ns.codes + [dtc] -%}  
              {%- set ns.details = ns.details + [dtc ~ ": " ~ meaning] -%}  
            {%- endif -%}  
          {%- endif -%}  
        {%- endfor -%}  
      {%- endif -%}  
    {%- endif -%}  
    {{- {"active_codes": ns.codes, "descriptions": ns.details} | tojson -}}  

# ============================================================
# Apple Watch Ultra 3 - Apple Health via Health Auto Export (MQTT)
# ============================================================
# Source: "Health Auto Export" iOS app -> Automations -> MQTT.
#   - Set the MQTT topic in the app to:  healthexport/data
#   - Format: JSON.  Payload shape:
#       {"data": {"metrics": [ {metric}, ... ], "workouts": [...]}}
#     where each {metric} = {"name": "<id>", "units": "...", "data": [ {record}, ... ]}
#       * aggregated metrics (e.g. heart_rate)  -> record has Min / Avg / Max
#       * quantity metrics (steps, hrv, spo2..) -> record has qty
#       * sleep_analysis -> record has asleep/deep/rem/core/inBed (seconds) + start/end strings
#
# NOTE: Health Auto Export does NOT use HA MQTT auto-discovery, so sensors are
#       defined manually below. Location/presence is handled by the HA Companion
#       app (continuous), NOT this app (its GPS only logs during workouts).
#
# VERIFY METRIC NAMES: the exact "name" strings can vary by app version.
#   After the first sync, open Developer Tools -> States ->
#   sensor.apple_watch_payload_metrics and read its "names" attribute to see
#   the real names, then correct any selectattr('name','eq',...) below.
# ============================================================

# --- Diagnostic: list of metric names present in the latest payload ---
- name: "Apple Watch Payload Metrics"
  unique_id: "apple_watch_payload_metrics"
  state_topic: "healthexport/data"
  value_template: "{{ value_json.data.metrics | map(attribute='name') | list | length }}"
  json_attributes_topic: "healthexport/data"
  json_attributes_template: >-
    {{ {'names': value_json.data.metrics | map(attribute='name') | list} | tojson }}
  icon: mdi:format-list-bulleted

# --- Vitals ---
# Heart Rate comes from the main /data export: heart_rate has one record per
# reading for the day, so the LAST record is the most recent reading (~live as
# of the last export). The separate healthexport/heartrate automation is not
# needed and can be deleted in the app.
- name: "Apple Watch Heart Rate"
  unique_id: "apple_watch_heart_rate"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','heart_rate') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ (r[-1].Avg | default(r[-1].qty, true) | float(0)) | round(0) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_heart_rate') }}{% endif %}
  unit_of_measurement: "bpm"
  state_class: measurement
  icon: mdi:heart-pulse

- name: "Apple Watch Resting Heart Rate"
  unique_id: "apple_watch_resting_heart_rate"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','resting_heart_rate') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ r[-1].qty | default(r[-1].Avg, true) | default(states('sensor.apple_watch_ultra_apple_watch_resting_heart_rate'), true) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_resting_heart_rate') }}{% endif %}
  unit_of_measurement: "bpm"
  state_class: measurement
  icon: mdi:heart

- name: "Apple Watch Heart Rate Variability"
  unique_id: "apple_watch_hrv"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','heart_rate_variability') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ (r[-1].qty | default(r[-1].Avg, true) | float(0)) | round(1) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_heart_rate_variability') }}{% endif %}
  unit_of_measurement: "ms"
  state_class: measurement
  icon: mdi:heart-flash

- name: "Apple Watch Respiratory Rate"
  unique_id: "apple_watch_respiratory_rate"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','respiratory_rate') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ r[-1].qty | default(r[-1].Avg, true) | default(states('sensor.apple_watch_ultra_apple_watch_respiratory_rate'), true) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_respiratory_rate') }}{% endif %}
  unit_of_measurement: "br/min"
  state_class: measurement
  icon: mdi:lungs

- name: "Apple Watch Blood Oxygen"
  unique_id: "apple_watch_blood_oxygen"
  state_topic: "healthexport/data"
