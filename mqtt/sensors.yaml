# ─── WiCAN RAW debug sensors ───
- name: "WiCAN RAW Status"
  unique_id: wican_raw_status
  state_topic: "wican/status"
  value_template: "{{ value }}"

- name: "WiCAN RAW Vehicle Speed"
  unique_id: wican_raw_vehicle_speed
  state_topic: "wican/vehicle_speed"
  value_template: "{{ value }}"

- name: "WiCAN RAW Fuel Tank Level"
  unique_id: wican_raw_fuel_tank_level
  state_topic: "wican/fuel_tank_level"
  value_template: "{{ value }}"

- name: "WiCAN RAW Engine Coolant Temp"
  unique_id: wican_raw_engine_coolant_temp
  state_topic: "wican/engine_coolant_temp"
  value_template: "{{ value }}"

- name: "WiCAN RAW Engine RPM"
  unique_id: wican_raw_engine_rpm
  state_topic: "wican/engine_rpm"
  value_template: "{{ value }}"

- name: "WiCAN RAW Throttle Position"
  unique_id: wican_raw_throttle_position
  state_topic: "wican/throttle_position"
  value_template: "{{ value }}"

- name: "WiCAN RAW Distance MIL On"
  unique_id: wican_raw_distance_mil_on
  state_topic: "wican/distance_mil_on"
  value_template: "{{ value }}"

- name: "WiCAN RAW Calculated Engine Load"
  unique_id: wican_raw_calc_engine_load
  state_topic: "wican/calc_engine_load"
  value_template: "{{ value }}"

- name: "WiCAN RAW Control Module Voltage"
  unique_id: wican_raw_control_module_voltage
  state_topic: "wican/control_module_voltage"
  value_template: "{{ value }}"

- name: "WiCAN RAW Ambient Air Temp"
  unique_id: wican_raw_ambient_air_temp
  state_topic: "wican/ambient_air_temp"
  value_template: "{{ value }}"

- name: "WiCAN RAW PIDs Supported 61-80"
  unique_id: wican_raw_pids_supported_61_80
  state_topic: "wican/pids_supported_61_80"
  value_template: "{{ value }}"

- name: "WiCAN RAW PIDs Supported 21-40"
  unique_id: wican_raw_pids_supported_21_40
  state_topic: "wican/pids_supported_21_40"
  value_template: "{{ value }}"

# ─── WiCAN parsed sensors ───
- state_topic: "wican/vehicle_speed"
  name: "WiCAN Speed"
  unique_id: wican_speed_mqtt
  icon: mdi:speedometer
  state_class: measurement
  unit_of_measurement: "km/h"
  value_template: "{{ value_json.get('0D-VehicleSpeed') | float }}"
  device:
    identifiers: ["WiCAN"]
    manufacturer: "MeatPi"
    model: "WiCAN OBD"
    name: "WiCAN"

- state_topic: "wican/fuel_tank_level"
  name: "WiCAN Fuel"
  unique_id: wican_fuel_mqtt
  icon: mdi:fuel
  state_class: measurement
  unit_of_measurement: "%"
  value_template: "{{ value_json.get('2F-FuelTankLevel') | float | round(2) }}"
  device:
    identifiers: ["WiCAN"]
    manufacturer: "MeatPi"
    model: "WiCAN OBD"
    name: "WiCAN"

- state_topic: "wican/engine_coolant_temp"
