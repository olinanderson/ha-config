# --- Sleep (from sleep_analysis; durations are ALREADY in HOURS) ---
# Fields: totalSleep (= asleep), core, deep, rem, awake (hours); sleepStart/End,
# inBedStart/inBedEnd (timestamps). The 'asleep'/'inBed' keys are always 0 here.
- name: "Apple Watch Sleep Asleep"
  unique_id: "apple_watch_sleep_asleep"
  state_topic: "healthexport/data"
  value_template: >-
    {% set r = value_json.data.metrics | selectattr('name','eq','sleep_analysis') | map(attribute='data') | first | default([]) %}
    {% if r %}{{ r[-1].totalSleep | float(0) | round(2) }}{% else %}{{ states('sensor.apple_watch_ultra_apple_watch_sleep_asleep') }}{% endif %}
