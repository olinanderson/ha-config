  value_template: "{{ value }}"

- name: "WiCAN RAW Engine RPM"
  unique_id: wican_raw_engine_rpm
  state_topic: "wican/engine_rpm"
  value_template: "{{ value }}"

- name: "WiCAN RAW Throttle Position"
  unique_id: wican_raw_throttle_position
