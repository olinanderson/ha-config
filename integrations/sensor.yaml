# ================================
# integrations/sensor.yaml
# ================================
# Platform-based sensors: statistics, history_stats, integration (Riemann sum)

# ─── Fuel level • 5-minute rolling mean ───
- platform: statistics
  name: "WiCAN Fuel 5 min mean"
  entity_id: sensor.wican_fuel
  state_characteristic: mean
  max_age:
    minutes: 5
  sampling_size: 300

# ─── Hydronic heater run-time tracking ───
- platform: history_stats
  name: "Hydronic Heater Total On-Time"
  entity_id: switch.a32_pro_switch24_hydronic_heater
  state: "on"
  type: time
  start: "{{ as_datetime('2025-01-24 00:00:00') }}"
  end: "{{ now() }}"

# ─── Riemann sum energy integrations (Wh) ───
- platform: integration
  name: "Air Conditioning Energy (Wh)"
  unique_id: "air_conditioning_energy_wh"
  source: sensor.air_conditioning_power_24v
  method: trapezoidal
  round: 2

