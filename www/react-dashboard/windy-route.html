<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, iframe { width: 100%; height: 100%; border: none; display: block; background: #111; }
  </style>
</head>
<body>
  <script>
    var p    = new URLSearchParams(location.search);
    var lat  = parseFloat(p.get('lat') || '51');
    var lon  = parseFloat(p.get('lon') || '-114');
    var zoom = parseInt(p.get('zoom') || '8');
    var overlay = p.get('overlay') || 'wind';

    var src = 'https://embed.windy.com/embed2.html'
      + '?lat=' + lat.toFixed(4) + '&lon=' + lon.toFixed(4)
      + '&detailLat=' + lat.toFixed(4) + '&detailLon=' + lon.toFixed(4)
      + '&zoom=' + zoom
      + '&level=surface&overlay=' + overlay + '&product=ecmwf'
      + '&menu=&message=true&marker=true&calendar=now&pressure='
      + '&type=map&location=coordinates&detail='
      + '&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1'
      + '&key=CG4kOma0rcQ8B8lLWtBwUttyCbDREAI2';

    document.write('<iframe src="' + src + '" allowfullscreen></iframe>');
  </script>
</body>
</html>
