function _startPickingPlace() {
  if (!_map) return;
  _pickingPlaceLocation = true;
  _map.getContainer().style.cursor = "crosshair";
  document.getElementById("vl-pf-pick").style.display = "none";
  document.getElementById("vl-pf-pick-hint").style.display = "block";
  _map.once("click", _onPlaceMapClick);
}

function _stopPickingPlace() {
  _pickingPlaceLocation = false;
  if (_map) {
    _map.getContainer().style.cursor = "";
    _map.off("click", _onPlaceMapClick);
  }
  document.getElementById("vl-pf-pick").style.display = "";
  document.getElementById("vl-pf-pick-hint").style.display = "none";
}

function _onPlaceMapClick(e) {
  document.getElementById("vl-pf-lat").value = e.latlng.lat.toFixed(6);
  document.getElementById("vl-pf-lon").value = e.latlng.lng.toFixed(6);
  _stopPickingPlace();
  _updatePlacePreview();
  _zoomToPlacePreview();
}

function _updatePlacePreview() {
  const lat = parseFloat(document.getElementById("vl-pf-lat").value);
  const lon = parseFloat(document.getElementById("vl-pf-lon").value);
  const radius = parseFloat(document.getElementById("vl-pf-radius").value) || 200;
  if (!lat || !lon || !_map) { _removePlacePreview(); return; }
  if (_placePreviewCircle) {
    _placePreviewCircle.setLatLng([lat, lon]);
    _placePreviewCircle.setRadius(radius);
  } else {
    _placePreviewCircle = L.circle([lat, lon], {
      radius, color: "#7c3aed", fillColor: "#7c3aed",
      fillOpacity: 0.12, weight: 2, dashArray: "6 4",
    }).addTo(_map);
  }
}

function _removePlacePreview() {
  if (_placePreviewCircle) { _placePreviewCircle.remove(); _placePreviewCircle = null; }
}

/** Zoom the map to fit the place preview circle with padding. */
function _zoomToPlacePreview() {
  if (_placePreviewCircle && _map) {
    _map.fitBounds(_placePreviewCircle.getBounds(), { padding: [60, 60], maxZoom: 17 });
  }
}

/** Disable the Raw mode button when the date range spans more than 1 day. */
function _updateRawButtonState() {
  const rawBtn = document.getElementById("vl-mode-raw");
  if (!rawBtn) return;
  const { start, end } = _dateWindow(_dateMode);
  const spanMs = end - start;
  const isMultiDay = spanMs > 86400000 + 60000; // >1 day + 1min tolerance
  rawBtn.disabled = isMultiDay;
  rawBtn.style.opacity = isMultiDay ? "0.4" : "";
  rawBtn.style.cursor = isMultiDay ? "not-allowed" : "";
  rawBtn.title = isMultiDay
    ? "Raw mode disabled for multi-day ranges (too much data)"
    : "Raw Starlink GPS history (unprocessed, from HA)";
  // If currently in raw mode and range became multi-day, switch to road
  if (isMultiDay && _routeMode === "raw") {
    _routeMode = "snap";
    rawBtn.classList.remove("active");
    document.getElementById("vl-mode-snap").classList.add("active");
    if (_routeLayer) { _routeLayer.clearLayers(); drawRoute(); }
  }
}

function setupDateBar() {
  const params = new URLSearchParams(window.location.search);
  const urlMode = params.get("mode");
  const urlStart = params.get("start");
  const urlEnd = params.get("end");
  const startInput = document.getElementById("vl-date-start");
  const endInput = document.getElementById("vl-date-end");
  const rangeLabel = document.getElementById("vl-date-range-label");

  // Set max date to today, fetch min date from data range
  const todayStr = new Date().toISOString().slice(0, 10);
  startInput.max = todayStr;
  endInput.max = todayStr;
  fetch("/api/vanlife/data-range").then(r => r.json()).then(d => {
    if (d.min_date) { startInput.min = d.min_date; endInput.min = d.min_date; }
  }).catch(() => {});

  // Restore from URL
  if (urlStart && urlEnd) {
    _dateMode = "custom";
    _customStart = new Date(urlStart + "T00:00:00");
    const endNext = new Date(urlEnd + "T00:00:00");
    endNext.setDate(endNext.getDate() + 1);
    _customEnd = endNext > new Date() ? new Date() : endNext;
    startInput.value = urlStart;
    endInput.value = urlEnd;
  } else if (urlMode === "yesterday") {
    _dateMode = "yesterday";
  } else if (urlMode && urlMode !== "today") {
    // Legacy numeric modes (3d, 7d, etc.) → convert to custom range
    const days = parseInt(urlMode);
    if (days > 0 && days <= 7) {
      _dateMode = "custom";
      const s = new Date(); s.setDate(s.getDate() - (days - 1)); s.setHours(0,0,0,0);
      _customStart = s;
      _customEnd = new Date();
      startInput.value = s.toISOString().slice(0, 10);
      endInput.value = todayStr;
    }
  }
  // else: default "today"

  function updateRangeLabel() {
    if (_dateMode !== "custom" || !startInput.value || !endInput.value) {
      rangeLabel.textContent = "";
      _updateRawButtonState();
      return;
    }
    const days = Math.round((new Date(endInput.value) - new Date(startInput.value)) / 86400000) + 1;
    rangeLabel.textContent = `${days}d`;
    rangeLabel.style.color = days > 7 ? "#d32f2f" : "#888";
    _updateRawButtonState();
  }

  // Sync active buttons
  document.querySelectorAll(".vl-date-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.mode === _dateMode));
  updateRangeLabel();

  // Back button
  document.getElementById("vl-date-back").addEventListener("click", () => goDateBack());

  // Prev / Next day buttons
  document.getElementById("vl-date-prev").addEventListener("click", () => _shiftDate(-1));
  document.getElementById("vl-date-next").addEventListener("click", () => _shiftDate(1));

  // Preset buttons (Today / Yesterday)
  document.querySelectorAll(".vl-date-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const mode = btn.dataset.mode;
      if (mode === _dateMode) return;
      _dateMode = mode;
      _customStart = null; _customEnd = null;
      startInput.value = ""; endInput.value = "";
      const u = new URL(window.location);
      u.searchParams.set("mode", mode);
      u.searchParams.delete("start"); u.searchParams.delete("end");
      window.history.replaceState({}, "", u);
      document.querySelectorAll(".vl-date-btn").forEach(b => b.classList.toggle("active", b === btn));
      updateRangeLabel();
      if (_routeLayer) await drawRoute();
      _maybeBackfill(mode);
    });
  });

  // Date range inputs
  async function onDateChange() {
    if (!startInput.value || !endInput.value) return;
    const s = new Date(startInput.value);
    const e = new Date(endInput.value);
    if (isNaN(s) || isNaN(e)) return;
    const days = Math.round((e - s) / 86400000) + 1;
    if (days < 1) { rangeLabel.textContent = "⚠ end < start"; rangeLabel.style.color = "#d32f2f"; return; }
    _dateMode = "custom";
    _customStart = new Date(startInput.value + "T00:00:00");
    const endNext = new Date(endInput.value + "T00:00:00");
    endNext.setDate(endNext.getDate() + 1);
    _customEnd = endNext > new Date() ? new Date() : endNext;
    const u = new URL(window.location);
    u.searchParams.delete("mode");
    u.searchParams.set("start", startInput.value);
    u.searchParams.set("end", endInput.value);
    window.history.replaceState({}, "", u);
    document.querySelectorAll(".vl-date-btn").forEach(b => b.classList.remove("active"));
    updateRangeLabel();
    if (_routeLayer) await drawRoute();
    _maybeBackfill("custom");
  }
  startInput.addEventListener("change", onDateChange);
  endInput.addEventListener("change", onDateChange);

  // Route mode toggle (Road / Filtered / Raw)
  function setRouteMode(mode) {
    _routeMode = mode;
    document.getElementById("vl-mode-snap").classList.toggle("active", mode === "snap");
    document.getElementById("vl-mode-filtered").classList.toggle("active", mode === "filtered");
    document.getElementById("vl-mode-raw").classList.toggle("active", mode === "raw");
    if (_routeLayer) _routeLayer.clearLayers();
    if (_rawStarlinkLayer) _rawStarlinkLayer.clearLayers();
    drawRoute();
  }
  document.getElementById("vl-mode-snap").addEventListener("click", () => {
    if (_routeMode !== "snap") setRouteMode("snap");
  });
  document.getElementById("vl-mode-filtered").addEventListener("click", () => {
    if (_routeMode !== "filtered") setRouteMode("filtered");
  });
  document.getElementById("vl-mode-raw").addEventListener("click", () => {
    const rawBtn = document.getElementById("vl-mode-raw");
    if (rawBtn.disabled) return;
    if (_routeMode !== "raw") setRouteMode("raw");
  });
}

function renderPlacesList() {
  const cards = document.getElementById("vl-place-cards");
  if (_places.length === 0) {
    cards.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:#757575">
      <div style="font-size:40px;margin-bottom:12px">📌</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">No named places yet</div>
      <div style="font-size:13px">Add a place and the van will auto-label stops there.</div>
    </div>`;
    return;
  }
  cards.innerHTML = _places.map(place => {
    const icon = PLACE_CATEGORY_ICONS[place.category] || "📌";
    return `<div class="vl-place-card">
      <div class="vl-place-card-header">
        <span class="vl-place-icon">${icon}</span>
        <span class="vl-place-name">${place.name}</span>
      </div>
      <div class="vl-place-meta">
        ${place.category.replace(/_/g," ")} · ${place.radius_m}m radius<br>
        📍 ${place.lat?.toFixed(5)}, ${place.lon?.toFixed(5)}
        ${place.notes ? `<br><em>${place.notes}</em>` : ""}
      </div>
      <div class="vl-place-actions">
        <button class="vl-btn vl-btn-ghost" style="font-size:12px" data-edit="${place.id}">✏️ Edit</button>
        <button class="vl-btn vl-btn-danger" style="font-size:12px" data-del="${place.id}">🗑️</button>
      </div>
    </div>`;
  }).join("");

  cards.querySelectorAll("[data-edit]").forEach(btn => {
    const p = _places.find(x => x.id === btn.dataset.edit);
    if (p) btn.addEventListener("click", () => showPlaceForm(p));
  });
  cards.querySelectorAll("[data-del]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const p = _places.find(x => x.id === btn.dataset.del);
      if (!p || !confirm(`Delete "${p.name}"?`)) return;
      await fetch(`${OSRM_PROXY}/vanlife/named-places/${p.id}`, { method: "DELETE" });
      _places = await getNamedPlaces();
      renderPlacesList();
      renderPlaceMarkers();
    });
  });
}

function showPlaceForm(place) {
  _editingPlace = place;
  _stopPickingPlace();
  // Ensure we're on the map tab so the floating overlay is visible
  if (_currentTab !== "map") {
    _currentTab = "map";
    document.querySelectorAll(".vl-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === "map"));
    document.getElementById("vl-map-pane").classList.remove("hidden");
    document.getElementById("vl-places-pane").classList.remove("active");
    if (_map) _map.invalidateSize();
  }
  const wrap = document.getElementById("vl-place-form-wrap");
  wrap.style.display = "block";
  document.getElementById("vl-pf-title").textContent = place ? `Edit: ${place.name}` : "Add Named Place";
  document.getElementById("vl-pf-name").value = place?.name || "";
  document.getElementById("vl-pf-category").value = place?.category || "other";
  const radius = place?.radius_m ?? 200;
  document.getElementById("vl-pf-radius").value = radius;
  document.getElementById("vl-pf-radius-label").textContent = radius;
  document.getElementById("vl-pf-lat").value = place?.lat ?? "";
  document.getElementById("vl-pf-lon").value = place?.lon ?? "";
  document.getElementById("vl-pf-notes").value = place?.notes || "";
  _updatePlacePreview();
  // Zoom to place if it has coordinates
  if (place?.lat && place?.lon && _map) {
    _zoomToPlacePreview();
  }
}

async function savePlace() {
  const name = document.getElementById("vl-pf-name").value.trim();
  if (!name) { alert("Name is required"); return; }
  const data = {
    name,
    category: document.getElementById("vl-pf-category").value,
    radius_m: parseFloat(document.getElementById("vl-pf-radius").value) || 200,
    lat: parseFloat(document.getElementById("vl-pf-lat").value),
    lon: parseFloat(document.getElementById("vl-pf-lon").value),
    notes: document.getElementById("vl-pf-notes").value.trim(),
  };
  if (!data.lat || !data.lon) { alert("Latitude and longitude are required"); return; }

  if (_editingPlace) {
    await fetch(`${OSRM_PROXY}/vanlife/named-places/${_editingPlace.id}`, {
      method: "PUT", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
  } else {
    await fetch(`${OSRM_PROXY}/vanlife/named-places`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
  }
  document.getElementById("vl-place-form-wrap").style.display = "none";
  _editingPlace = null;
  _stopPickingPlace();
  _removePlacePreview();
  _places = await getNamedPlaces();
  // Remove parking dots that now fall inside any place radius
  _parkingDotMarkers = _parkingDotMarkers.filter(cm => {
    if (placeForCoord(cm._parkingLat, cm._parkingLon)) {
      cm.remove();
      return false;
    }
    return true;
  });
  renderPlacesList();
  renderPlaceMarkers();
  renderStopList();
}

// ─── Data loading ─────────────────────────────────────────

async function loadData() {
  const state = getStates()["sensor.vanlife_tracker_recent_stops"];
  _stops = state?.attributes?.stops || [];
  _places = await getNamedPlaces();
  // Don't call renderStopList() here — _travels is built by drawRoute() which runs next.
  // Set loading placeholder so the sidebar isn't blank.
  const countEl = document.getElementById("vl-stop-count");
  const list = document.getElementById("vl-stop-list");
  if (countEl) countEl.textContent = "Trips";
  if (list) list.innerHTML = `<div style="padding:16px;color:#888;font-size:13px;text-align:center">Loading…</div>`;
  // Auto-backfill if no stops for the current window
  _maybeBackfill(_dateMode);
}

// Trigger a backfill if the current date window has no stops and we haven't
// already requested one for this mode in this session.
const _backfillRequested = new Set();
async function _maybeBackfill(mode) {
  if (!_token) return;
  if (_backfillRequested.has(mode)) return;
  if (stopsInWindow().length > 0) return;
  _backfillRequested.add(mode);
  const modeDays = { today: 1, yesterday: 2 };
  const days = mode === "custom" && _customStart && _customEnd
    ? Math.ceil((_customEnd - _customStart) / 86400000)
    : (modeDays[mode] || 7);
  console.log(`[VL] No stops in ${mode} window — triggering backfill for ${days} days`);
  setStatus(`⏳ No stops found — scanning ${days}d of GPS history...`);
  try {
    await callService("vanlife_tracker", "backfill_stops", {
      days,
      stationary_radius_m: 100,
    });
    // Poll for updated stops after backfill (it takes a few seconds to geocode)
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      const r = await fetch("/api/states", { headers: { Authorization: `Bearer ${_token}` } });
      if (!r.ok) return;
      const all = await r.json();
      const newStates = Object.fromEntries(all.map(s => [s.entity_id, s]));
      const newStops = newStates["sensor.vanlife_tracker_recent_stops"]?.attributes?.stops || [];
      if (newStops.length !== _stops.length || attempts >= 12) {
        clearInterval(poll);
        _states = newStates;
        _stops = newStops;
        renderStopList();
        renderStopMarkers();
        setStatus("");
      }
    }, 5000);
  } catch(e) {
    setStatus("");
  }
}

// Returns only stops that overlap the current date window.
// A stop overlaps if it arrived before the window end AND (departed after window start OR is active).
function stopsInWindow() {
  const { start, end } = _dateWindow(_dateMode);
  const startMs = start.getTime();
  const endMs   = end.getTime();
  return _stops.filter(s => {
    const arrivedMs  = s.arrived_at  ? new Date(s.arrived_at).getTime()  : 0;
    const departedMs = s.departed_at ? new Date(s.departed_at).getTime() : Infinity;
    return arrivedMs <= endMs && departedMs >= startMs;
  });
}

// ─── Live updates — poll every 10s using REST states ──────

function startLiveUpdates() {
  setInterval(async () => {
    if (!_token) return;
    try {
      const r = await fetch("/api/states", { headers: { Authorization: `Bearer ${_token}` } });
      if (!r.ok) return;
      const all = await r.json();
      const newStates = Object.fromEntries(all.map(s => [s.entity_id, s]));
      _states = newStates;

      // Update stops if changed
      const newStops = newStates["sensor.vanlife_tracker_recent_stops"]?.attributes?.stops || [];
      if (JSON.stringify(newStops) !== JSON.stringify(_stops)) {
        _stops = newStops;
        renderStopList();
        renderStopMarkers();
      }
      // Always refresh van marker
      renderVanMarker();
    } catch(_) {}
  }, 10000);
}

// ─── Start ────────────────────────────────────────────────

async function startApp() {
  if (_appStarted) return;
  console.error("[VL] startApp() called, token:", _token ? "YES" : "NO");
  _appStarted = true;
  setStatus("Loading stops...");
  await loadData();
  setStatus("Drawing map...");
  initMap();
  startLiveUpdates();
}

document.addEventListener("DOMContentLoaded", () => {
  console.error("[VL] DOMContentLoaded, token:", _token ? "YES" : "NO");
  _initDone = true;
  populateSelects();
  setupTabs();
  setupEditPanel();
  setupPlacesTab();
  setupDateBar();
  if (_token) {
    setStatus("Token from cache, loading...");
    Promise.all([
      fetch("/api/states", { headers: { Authorization: `Bearer ${_token}` } })
        .then(r => { console.error("[VL] /api/states status:", r.status); return r.ok ? r.json() : []; }),
      fetch("/api/config", { headers: { Authorization: `Bearer ${_token}` } })
        .then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([all, config]) => {
      console.error("[VL] states loaded:", Array.isArray(all) ? all.length : "not array");
      if (Array.isArray(all)) _states = Object.fromEntries(all.map(s => [s.entity_id, s]));
      if (config?.time_zone) { _haTz = config.time_zone; console.log("[VL] HA timezone:", _haTz); }
      startApp();
    }).catch(err => { console.error("[VL] init fetch error:", err); startApp(); });
  } else {
    setStatus("Waiting for Home Assistant auth...");
    console.error("[VL] no token, waiting for postMessage...");
    setTimeout(() => {
      if (!_appStarted) {
        console.error("[VL] 5s timeout, still no token");
        setStatus("⚠ No auth token received. Try reloading.", "rgba(180,0,0,0.7)");
      }
    }, 5000);
  }
});
</script>
