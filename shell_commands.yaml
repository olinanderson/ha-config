# This is the shell command that's used to duck the audio of the video player when a notification is played
load_ducking_docker: >
  ssh -i /config/ssh_keys/ha_host_id_ed25519
      -p 22222
      -o StrictHostKeyChecking=no
      root@172.30.32.1 "
        docker exec hassio_audio pactl list modules |
        grep -q module-role-ducking ||
        docker exec hassio_audio pactl load-module module-role-ducking \
          trigger_roles=video ducking_roles=any_role volume=-20dB global=true"

# This is the shell command to load the scream audio Receiver
start_scream_receiver: >
  ssh -i /config/ssh_keys/ha_host_id_ed25519
  -p 22222
  -o StrictHostKeyChecking=no
  root@172.30.32.1
  'iptables -t nat -A PREROUTING -p udp --dport 4010 -j DNAT --to-destination 172.30.32.4:4010 2>/dev/null || true ;
  iptables -I DOCKER-USER -p udp -d 172.30.32.4 --dport 4010 -j ACCEPT 2>/dev/null || true ;
  iptables -t nat -A POSTROUTING -p udp -d 172.30.32.4 --dport 4010 -j MASQUERADE 2>/dev/null || true ;
  docker exec hassio_audio apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community scream ;
  docker exec hassio_audio pkill -f scream || true ;
  docker exec -d hassio_audio scream -u -v -o pulse -s alsa_output.usb-Generic_USB_SPDIF_Adapter_202110200032-00.iec958-stereo -n WinPC'

# Start routing CORS proxy so the vanlife panel can call GraphHopper without CORS errors
start_osrm_proxy: >
  /bin/sh -c 'if ! nc -z 127.0.0.1 8765 2>/dev/null; then
    cd /config/www/vanlife-panel &&
    nohup python3 osrm_proxy.py > /config/www/vanlife-panel/osrm_proxy.log 2>&1 &
    echo "Routing proxy started";
  else
    echo "Routing proxy already running";
  fi'

# Start Syncthing for bidirectional config sync with PC over Tailscale
start_syncthing: >
  /bin/sh -c 'if ! nc -z 127.0.0.1 22000 2>/dev/null; then
    nohup /config/.ha-sync/syncthing serve
      --home=/config/.ha-sync/st-config
      --no-browser --no-upgrade
      > /config/.ha-sync/syncthing.log 2>&1 &
    echo "Syncthing started";
  else
    echo "Syncthing already running";
  fi'

# Start GPS filter daemon — pre-processes Starlink GPS into filtered segments + routes
start_gps_filter: >
  /bin/sh -c 'if [ ! -f /tmp/gps_filter.pid ] || ! kill -0 $(cat /tmp/gps_filter.pid) 2>/dev/null; then
    TOKEN=$(cat /config/.gps_filter_token 2>/dev/null);
    if [ -z "$TOKEN" ]; then echo "No token file at /config/.gps_filter_token"; exit 1; fi;
    cd /config/www/vanlife-panel &&
    nohup python3 gps_filter.py --token "$TOKEN" >> /config/www/vanlife-panel/gps_filter.log 2>&1 &
    echo $! > /tmp/gps_filter.pid;
    echo "GPS filter daemon started";
  else
    echo "GPS filter daemon already running";
  fi'

# Start DVR proxy — camera playback API + RTSP Scale proxy
start_dvr_proxy: >
  /bin/sh -c 'if ! nc -z 127.0.0.1 8766 2>/dev/null; then
    cd /config/www/react-dashboard &&
    nohup python3 dvr_proxy.py > /config/www/react-dashboard/dvr_proxy.log 2>&1 &
    echo "DVR proxy started";
  else
    echo "DVR proxy already running";
  fi'

# Restart DVR proxy — kill existing and start fresh
restart_dvr_proxy: >
  /bin/sh -c 'pkill -f "python3.*dvr_proxy" 2>/dev/null;
    sleep 2;
    cd /config/www/react-dashboard &&
    nohup python3 dvr_proxy.py > /config/www/react-dashboard/dvr_proxy.log 2>&1 &
    echo "DVR proxy restarted"'

# Called after a fill-up is detected — queries fuel-stats API to compute the
# actual L/100km, updates input_number.fuel_ve_correction, and appends an
# entry to input_text.ve_correction_history.
# Arguments: from_ts (epoch ms of previous fill-up), to_ts (epoch ms of now)
update_ve_from_fillup: "python3 /config/ve_update.py {{ from_ts }} {{ to_ts }}"