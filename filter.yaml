# ================================
# filter.yaml
# ================================
# Time-averaged sensors for noisy OBD readings.
# Loaded via configuration.yaml: filter: !include filter.yaml

- platform: filter
  name: WiCAN Fuel EMA
  entity_id: sensor.192_168_10_90_2f_fueltanklevel
  filters:
    - filter: lowpass
      time_constant: 20
      precision: 1

# Legacy name — keep so dashboards/backends that reference it continue working
- platform: filter
  name: WiCAN Fuel 5 min mean
  entity_id: sensor.192_168_10_90_2f_fueltanklevel
  filters:
    - filter: lowpass
      time_constant: 20
      precision: 1
