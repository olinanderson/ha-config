# ===========================
# automations.yaml
# ===========================

# ───────────────────────────────────────────────
#  BMS BLE – reload after boot to fix race condition
# ───────────────────────────────────────────────
# The bms_ble integration checks for the BLE device at setup.
# If the ESP32 BLE proxy hasn't reconnected yet, setup fails
# with ConfigEntryNotReady. This automation reloads the
# integration 45s after boot when the proxy is reliably online.

- id: bms_ble_reload_after_boot
  alias: "BMS BLE - reload integration after boot"
  mode: single
  trigger:
    - trigger: homeassistant
      event: start
  action:
    - delay:
        seconds: 45
    - action: homeassistant.reload_config_entry
      data:
        entry_id: "{{ config_entry_id('sensor.olins_van_bms_battery') }}"

# ───────────────────────────────────────────────
#  Starlink-filtered tracker – MQTT update logic
# ───────────────────────────────────────────────

# 1️⃣  (Optional) Republish last known fix on HA boot
#     – only if broker has NO retained packet
- id: starlink_bootstrap_if_missing
  alias: "Starlink • bootstrap retained message if none"
  mode: single
  trigger:
    - trigger: homeassistant
      event: start
  condition:
    # Run only when tracker state is 'unknown' (means broker lost retain)
    - "{{ states('device_tracker.filtered_starlink_location') in ['unknown', 'unavailable'] }}"
  action:
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/attributes
        qos: 1
        retain: true
        payload: >
          {
            "latitude": {{ state_attr('device_tracker.starlink_device_location','latitude') | default(0) }},
            "longitude": {{ state_attr('device_tracker.starlink_device_location','longitude') | default(0) }},
            "gps_accuracy": {{ state_attr('device_tracker.starlink_device_location','gps_accuracy') | default(0) }},
            "elevation": {{ state_attr('device_tracker.starlink_device_location','altitude') | default(0) }},
            "source_type": "gps"
          }
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/state
        qos: 1
        retain: true
        payload: "home"

# 2️⃣  Update Starlink entity itself every second (pulls fresh coords)
- id: starlink_entity_refresh_1hz
  alias: "Starlink • refresh built-in entity 1 Hz"
  mode: single
  trigger:
    - trigger: time_pattern
      seconds: "/1"
  action:
    - action: homeassistant.update_entity
      target:
        entity_id: device_tracker.starlink_device_location

# 3️⃣  While the van is moving: publish new GPS fix each second
- id: starlink_filtered_while_moving
  alias: "Starlink • filtered coords 1 Hz while moving"
  mode: queued
  max: 3
  trigger:
    - trigger: time_pattern
      seconds: "/1"
  condition:
    - condition: state
      entity_id: binary_sensor.vehicle_is_moving
      state: "on"
  action:
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/attributes
        qos: 1
        retain: true
        payload: >
          {
            "latitude": {{ state_attr('device_tracker.starlink_device_location','latitude') | default(0) }},
            "longitude": {{ state_attr('device_tracker.starlink_device_location','longitude') | default(0) }},
            "gps_accuracy": {{ state_attr('device_tracker.starlink_device_location','gps_accuracy') | default(0) }},
            "elevation": {{ state_attr('device_tracker.starlink_device_location','altitude') | default(0) }},
            "source_type": "gps"
          }
    # Tracker’s textual state stays constant
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/state
        qos: 1
        retain: true
        payload: "home"

# 4️⃣  Snapshot when movement STARTS
- id: starlink_filtered_start_move
  alias: "Starlink • snapshot when movement starts"
  trigger:
    - trigger: state
      entity_id: binary_sensor.vehicle_is_moving
      from: "off"
      to: "on"
  action:
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/attributes
        qos: 1
        retain: true
        payload: >
          {
            "latitude": {{ state_attr('device_tracker.starlink_device_location','latitude') | default(0) }},
            "longitude": {{ state_attr('device_tracker.starlink_device_location','longitude') | default(0) }},
            "gps_accuracy": {{ state_attr('device_tracker.starlink_device_location','gps_accuracy') | default(0) }},
            "elevation": {{ state_attr('device_tracker.starlink_device_location','altitude') | default(0) }},
            "source_type": "gps"
          }
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/state
        qos: 1
        retain: true
        payload: "home"

# 5️⃣  Snapshot when movement STOPS
- id: starlink_filtered_stop_move
  alias: "Starlink • snapshot when movement stops"
  trigger:
    - trigger: state
      entity_id: binary_sensor.vehicle_is_moving
      from: "on"
      to: "off"
  action:
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/attributes
        qos: 1
        retain: true
        payload: >
          {
            "latitude": {{ state_attr('device_tracker.starlink_device_location','latitude') | default(0) }},
            "longitude": {{ state_attr('device_tracker.starlink_device_location','longitude') | default(0) }},
            "gps_accuracy": {{ state_attr('device_tracker.starlink_device_location','gps_accuracy') | default(0) }},
            "elevation": {{ state_attr('device_tracker.starlink_device_location','altitude') | default(0) }},
            "source_type": "gps"
          }
    - action: mqtt.publish
      data:
        topic: homeassistant/device_tracker/filtered_starlink/state
        qos: 1
        retain: true
        payload: "home"

