- id: shore_charger_manual_enable_sync
  alias: Shore Charger – Manual Enable Sync
  mode: single
  trigger:
    - trigger: state
      entity_id: input_boolean.shore_power_charger_enabled
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.shore_power_charger_enabled
              state: "on"
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.a32_pro_do8_switch04_shore_power_charger
        - conditions:
            - condition: state
              entity_id: input_boolean.shore_power_charger_enabled
              state: "off"
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.a32_pro_do8_switch04_shore_power_charger

- id: shore_charger_reset_on_low_soc
  alias: Shore Charger – Reset when SOC below threshold
  description: "Power-cycle charger (OFF 10s → ON) when SOC drops below threshold"
  mode: single
  trigger:
    - trigger: numeric_state
      entity_id: sensor.olins_van_bms_battery # 0–100 %
      below: input_number.shore_charge_reset_threshold
      # Optional (recommended): require it to stay below for a few seconds to avoid noise
      for: "00:00:05"
  condition:
    - condition: state
      entity_id: input_boolean.shore_power_charger_enabled
      state: "on" # only if feature is enabled
    - condition: state
      entity_id: switch.a32_pro_do8_switch04_shore_power_charger
      state: "on" # only makes sense to reset if it's currently on
  action:
    - action: switch.turn_off
      target:
        entity_id: switch.a32_pro_do8_switch04_shore_power_charger
    - delay: "00:00:10" # reset window
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_do8_switch04_shore_power_charger

