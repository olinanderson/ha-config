# ───────────────────────────────────────────────
#  Bed lift power – auto-off safety timer (30 s)
# ───────────────────────────────────────────────
- id: bed_power_auto_off_30s
  alias: "Bed Power Supply • auto-off after 30 s"
  mode: restart # restarts the 30 s countdown every time the switch is (re)turned on
  trigger:
    # Start / restart the countdown whenever the bed-power switch turns ON
    - trigger: state
      entity_id: switch.a32_pro_switch27_bed_power_supply
      to: "on"
  action:
    # Wait exactly 30 s
    - delay: "00:00:30"
    # Cut power to the bed motor
    - action: switch.turn_off
      target:
        entity_id: switch.a32_pro_switch27_bed_power_supply

- id: keep_home_zone_on_starlink
  alias: Keep Home zone on Starlink
