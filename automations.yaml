# ────────────────────────────────────────────────────────────────
# Shower Mode – on-activation actions
# ────────────────────────────────────────────────────────────────
- id: shower_mode_on_actions
  alias: "Shower Mode – Turn on lights and recirculate"
  mode: single
  trigger:
    - trigger: state
      entity_id: input_boolean.shower_mode
      from: "off"
      to: "on"
  action:
    # Snapshot current shower-related states for later restore
    - action: scene.create
      data:
        scene_id: pre_shower_mode_state
        snapshot_entities:
          - light.shower_lighting_switch
          - light.led_controller_sc_1
          - switch.a32_pro_water_system_master_switch
          - switch.a32_pro_water_system_state_main
          - switch.a32_pro_water_system_state_recirculating_shower

    # Turn shower lights on (linked via blueprint with controller)
    - action: light.turn_on
      target:
        entity_id:
          - light.shower_lighting_switch
          - light.led_controller_sc_1
      data:
        brightness_pct: 100

    # Ensure water system master is ON
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_water_system_master_switch

    # Small delay to let master switch settle
    - delay: "00:00:01"

    # Set water system state to Recirculating Shower
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_water_system_state_recirculating_shower

    # Open roof fan lid (needed for exhaust)
    - action: cover.open_cover
      target:
        entity_id: cover.ag_pro_roof_fan_lid

    # Set roof fan to exhaust and 60%
    - action: fan.set_direction
      data:
        entity_id: fan.ag_pro_roof_fan
        direction: forward # exhaust
    - action: fan.turn_on
      data:
        entity_id: fan.ag_pro_roof_fan
        percentage: 60

# ────────────────────────────────────────────────────────────────
# Shower Mode – off restores previous state
# ────────────────────────────────────────────────────────────────
- id: shower_mode_off_restore
  alias: "Shower Mode – Restore previous state on OFF"
  mode: single
  trigger:
    - trigger: state
      entity_id: input_boolean.shower_mode
      from: "on"
      to: "off"
  action:
    - action: scene.turn_on
      target:
        entity_id: scene.pre_shower_mode_state

# ───────────────────────────────────────────────
#  Heater low-fuel lockout – auto-clear when fuel recovers
# ───────────────────────────────────────────────
# When the stable fuel level rises above 30% (hysteresis above
# the 25% lockout threshold), automatically clear the lockout
# so the heater can be used again without manual intervention.

- id: heater_fuel_lockout_auto_clear
  alias: "Heater – Clear low fuel lockout when fuel > 30%"
  mode: single
  trigger:
    - trigger: numeric_state
      entity_id: sensor.stable_fuel_level
      above: 30
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: input_boolean.heater_low_fuel_lockout
      state: "on"
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.heater_low_fuel_lockout
    - action: system_log.write
      data:
        message: "Heater low fuel lockout cleared – fuel above 30%."
        level: info

# ────────────────────────────────────────────────────────────────
# Syncthing — bidirectional config sync with PC over Tailscale
# ────────────────────────────────────────────────────────────────
- id: syncthing_start_on_boot
  alias: "Syncthing • Start on HA boot"
  mode: single
  trigger:
    - trigger: homeassistant
      event: start
  action:
    - delay: "00:00:30"  # let networking come online
    - action: shell_command.start_syncthing

- id: osrm_proxy_start_on_boot
  alias: "OSRM Proxy • Start on HA boot"
  mode: single
  trigger:
    - trigger: homeassistant
      event: start
  action:
    - delay: "00:00:35"
    - action: shell_command.start_osrm_proxy

