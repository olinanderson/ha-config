title: Power & Energy
views:
  - title: Power & Energy
    path: power-energy
    icon: mdi:lightning-bolt

    badges:
      # ── Battery SOC ──
      - type: custom:mushroom-template-badge
        entity: sensor.olins_van_bms_battery
        icon: |
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {% set level = (batt / 10) | round(0, 'floor') * 10 %}
          {% if level < 10 %}{% set level = 10 %}{% endif %}
          {{ 'mdi:battery' if level >= 100 else 'mdi:battery-' ~ level }}
        content: "{{ states('sensor.olins_van_bms_battery') }}%"
        color: >
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {{ 'red' if batt < 30 else 'orange' if batt < 65 else 'green' }}
        label: SOC
        tap_action:
          action: more-info

      # ── Solar ──
      - type: custom:mushroom-template-badge
        entity: sensor.total_mppt_pv_power
        icon: mdi:solar-power-variant
        content: "{{ states('sensor.total_mppt_pv_power') }}W"
        color: >
          {{ 'green' if states('sensor.total_mppt_pv_power') | float(0) > 50 else 'grey' }}
        label: Solar
        tap_action:
          action: more-info

      # ── Battery Power ──
      - type: custom:mushroom-template-badge
        entity: sensor.olins_van_bms_power
        icon: >
          {% set p = states('sensor.olins_van_bms_power') | float(0) %}
          {{ 'mdi:battery-charging' if p > 0 else 'mdi:battery-arrow-down' if p < 0 else 'mdi:battery' }}
        content: "{{ states('sensor.olins_van_bms_power') | float(0) | abs | round(0) }}W"
        color: >
          {% set p = states('sensor.olins_van_bms_power') | float(0) %}
          {{ 'green' if p > 0 else 'orange' if p < 0 else 'grey' }}
        label: Battery
        tap_action:
          action: more-info

      # ── Alternator ──
      - type: custom:mushroom-template-badge
        entity: sensor.alternator_charger_power_24v
        icon: mdi:car-battery
        content: "{{ states('sensor.alternator_charger_power_24v') | float(0) | round(0) }}W"
        color: >
          {{ 'green' if states('sensor.alternator_charger_power_24v') | float(0) > 10 else 'grey' }}
        label: Alternator
        tap_action:
          action: more-info

      # ── Inverter ──
      - type: custom:mushroom-template-badge
        entity: binary_sensor.shelly_em_reachable
        icon: >
          {{ 'mdi:power-plug' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'mdi:power-plug-off' }}
        content: >
          {{ 'ON' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'OFF' }}
        color: >
          {{ 'green' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'grey' }}
        label: Inverter
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.a32_pro_inverter_on_off_toggle

      # ── 12V Rail ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_smart_battery_sense_12v_voltage
        icon: mdi:current-dc
        content: "{{ states('sensor.a32_pro_smart_battery_sense_12v_voltage') | float(0) | round(1) }}V"
        color: >
          {% set v = states('sensor.a32_pro_smart_battery_sense_12v_voltage') | float(0) %}
          {{ 'red' if v < 11 else 'orange' if v < 12 else 'green' }}
        label: 12V Rail
        tap_action:
          action: more-info

    sections:
      # ═══════════════════════════════════════════
      #  COLUMN 1 — Battery + Charging
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Battery deep-dive ──
          - type: custom:button-card
            entity: sensor.olins_van_bms_battery
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                function s(id){ var v=states[id]; return v&&v.state!=='unknown'&&v.state!=='unavailable' ? parseFloat(v.state) : NaN; }
                function fmt(n,d){ return isNaN(n)?'—':n.toFixed(d); }
                var soc=s('sensor.olins_van_bms_battery'), current=s('sensor.olins_van_bms_current'),
                    voltage=s('sensor.olins_van_bms_voltage'), power=s('sensor.olins_van_bms_power'),
                    stored=s('sensor.olins_van_bms_stored_energy'), temp=s('sensor.olins_van_bms_temperature'),
                    cycles=s('sensor.olins_van_bms_cycles'), delta=s('sensor.olins_van_bms_delta_voltage'),
                    v12=s('sensor.a32_pro_smart_battery_sense_12v_voltage');
                var socColor=isNaN(soc)||soc<30?'#ef4444':soc<65?'#f59e0b':'#22c55e';
                var status=current>0.5?'Charging':current<-0.5?'Discharging':'Idle';
                var statusColor=current>0.5?'#22c55e':current<-0.5?'#f59e0b':'var(--secondary-text-color)';
                var timeStr='';
                if(current>0.5&&!isNaN(stored)){var h=(8700-stored)/Math.abs(power); if(!isNaN(h)&&h<48) timeStr=Math.floor(h)+'h '+Math.round((h-Math.floor(h))*60)+'m to full';}
                else if(current<-0.5&&!isNaN(stored)){var h=stored/Math.abs(power); if(!isNaN(h)&&h<48) timeStr=Math.floor(h)+'h '+Math.round((h-Math.floor(h))*60)+'m left';}
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:${socColor};"></div>
                    <span style="font-size:13px; font-weight:600;">Battery</span>
                    <span style="font-size:12px; color:var(--secondary-text-color);">24V LiFePO₄ · 8.7 kWh</span>
                  </div>
                  <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:8px;">
                    <span style="font-variant-numeric:tabular-nums; font-size:36px; font-weight:700; letter-spacing:-0.025em; line-height:1; color:${socColor};">${isNaN(soc)?'—':soc+'%'}</span>
                    <span style="font-size:13px; font-weight:500; color:${statusColor};">${status}</span>
                    <span style="font-size:12px; color:var(--secondary-text-color); margin-left:auto;">${timeStr}</span>
                  </div>
                  <div style="width:100%; height:8px; background:var(--divider-color); border-radius:4px; margin-bottom:16px; overflow:hidden;">
                    <div style="width:${isNaN(soc)?0:soc}%; height:100%; background:linear-gradient(90deg, ${socColor}, ${socColor}dd); border-radius:4px; transition:width 1s ease;"></div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Voltage</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(voltage,1)}V</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Current</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(current,1)}A</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Power</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(power)?'—':Math.abs(power).toFixed(0)+'W'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Temp</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(temp,1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Stored</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(stored)?'—':(stored/1000).toFixed(2)+'kWh'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Cycles</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(cycles)?'—':cycles}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Cell ΔV</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(delta)?'—':(delta*1000).toFixed(0)+'mV'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">12V Rail</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(v12,1)}V</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Capacity</div>
                      <div style="font-size:16px; font-weight:600; margin-top:2px;">8.7kWh</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── SOC chart 24h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Battery SOC (24h)
            graph_span: 24h
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.olins_van_bms_battery
                name: SOC
                type: area
                color: '#22c55e'
                curve: smooth
                stroke_width: 2
                opacity: 0.15
            grid_options:
              columns: full
              rows: auto

          # ── Charge vs Discharge 12h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Charge vs Discharge (12h)
            graph_span: 12h
            yaxis:
              - decimals: 0
            series:
              - entity: sensor.battery_charging
                name: Charging
                type: area
                color: '#22c55e'
                curve: smooth
                stroke_width: 2
                opacity: 0.1
              - entity: sensor.battery_discharging
                name: Discharging
                type: area
                color: '#ef4444'
                curve: smooth
                stroke_width: 2
                opacity: 0.1
            grid_options:
              columns: full
              rows: auto

          # ── Charging sources ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var alt=parseFloat(states['sensor.alternator_charger_power_24v'].state)||0;
                var solar=parseFloat(states['sensor.total_mppt_pv_power'].state)||0;
                var shore=parseFloat(states['sensor.shore_power_charger_power_24v'].state)||0;
                var altC=alt>10?'#22c55e':'var(--secondary-text-color)';
                var solC=solar>10?'#f59e0b':'var(--secondary-text-color)';
                var shrC=shore>10?'#3b82f6':'var(--secondary-text-color)';
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:14px;">
                    <span style="font-size:13px; font-weight:600;">Charging Sources</span>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; text-align:center;">
                    <div>
                      <ha-icon icon="mdi:car-battery" style="--mdc-icon-size:24px; color:${altC};"></ha-icon>
                      <div style="font-variant-numeric:tabular-nums; font-size:20px; font-weight:700; margin-top:4px;">${alt.toFixed(0)}W</div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color); margin-top:2px;">Alternator</div>
                    </div>
                    <div>
                      <ha-icon icon="mdi:solar-power-variant" style="--mdc-icon-size:24px; color:${solC};"></ha-icon>
                      <div style="font-variant-numeric:tabular-nums; font-size:20px; font-weight:700; margin-top:4px;">${solar.toFixed(0)}W</div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color); margin-top:2px;">Solar</div>
                    </div>
                    <div>
                      <ha-icon icon="mdi:ev-plug-type1" style="--mdc-icon-size:24px; color:${shrC};"></ha-icon>
                      <div style="font-variant-numeric:tabular-nums; font-size:20px; font-weight:700; margin-top:4px;">${shore.toFixed(0)}W</div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color); margin-top:2px;">Shore</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: auto

          # ── Shore / Inverter toggles ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var shoreE=states['switch.a32_pro_do8_switch04_shore_power_charger'];
                var shoreEnE=states['input_boolean.shore_power_charger_enabled'];
                var invE=states['binary_sensor.shelly_em_reachable'];
                var shore=shoreE&&shoreE.state==='on';
                var shoreEnabled=shoreEnE&&shoreEnE.state==='on';
                var inverter=invE&&invE.state==='on';
                function pill(label,active,color){
                  var bg=active?color+'0d':'transparent';
                  var bc=active?color+'66':'var(--divider-color)';
                  var tc=active?color:'var(--secondary-text-color)';
                  return `<div style="border:1.5px solid ${bc}; background:${bg}; border-radius:8px; padding:10px; text-align:center; transition:all 0.15s ease;">
                    <div style="font-size:14px; font-weight:600; color:${tc};">${active?'ON':'OFF'}</div>
                    <div style="font-size:10px; font-weight:500; color:var(--secondary-text-color); margin-top:2px;">${label}</div>
                  </div>`;
                }
                return `<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                  ${pill('Shore Relay',shore,'#3b82f6')}
                  ${pill('Shore Auto',shoreEnabled,'#22c55e')}
                  ${pill('Inverter',inverter,'#22c55e')}
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: switch.a32_pro_do8_switch04_shore_power_charger
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px 20px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

      # ═══════════════════════════════════════════
      #  COLUMN 2 — Solar + Consumption
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── MPPT dual panel ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                function s(id){ return (states[id]&&states[id].state&&states[id].state!=='unknown'&&states[id].state!=='unavailable') ? parseFloat(states[id].state) : 0; }
                var m1pv=s('sensor.a32_pro_mppt1_pv_power'), m2pv=s('sensor.a32_pro_mppt2_pv_power');
                var m1v=s('sensor.a32_pro_mppt1_output_voltage'), m2v=s('sensor.a32_pro_mppt2_output_voltage');
                var m1a=s('sensor.a32_pro_mppt1_output_current'), m2a=s('sensor.a32_pro_mppt2_output_current');
                var m1y=s('sensor.a32_pro_mppt1_yield_today'), m2y=s('sensor.a32_pro_mppt2_yield_today');
                var totalPV=s('sensor.total_mppt_pv_power'), totalYield=s('sensor.total_mppt_yield_today');
                var pvColor=totalPV>100?'#f59e0b':totalPV>10?'#22c55e':'var(--secondary-text-color)';
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:${pvColor};"></div>
                    <span style="font-size:13px; font-weight:600;">Solar</span>
                    <span style="font-size:12px; color:var(--secondary-text-color);">${totalYield.toFixed(0)}Wh today</span>
                  </div>
                  <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:14px;">
                    <ha-icon icon="mdi:solar-power-variant" style="--mdc-icon-size:24px; color:${pvColor};"></ha-icon>
                    <span style="font-variant-numeric:tabular-nums; font-size:30px; font-weight:700; letter-spacing:-0.025em;">${totalPV.toFixed(0)}W</span>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div style="border:1px solid var(--divider-color); border-radius:8px; padding:12px;">
                      <div style="font-size:11px; font-weight:600; color:var(--secondary-text-color); margin-bottom:8px;">MPPT 1 (250W)</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:22px; font-weight:700;">${m1pv.toFixed(0)}W</div>
                      <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:8px;">
                        <div><span style="font-size:10px; color:var(--secondary-text-color);">V</span> <span style="font-variant-numeric:tabular-nums; font-size:12px; font-weight:600;">${m1v.toFixed(1)}</span></div>
                        <div><span style="font-size:10px; color:var(--secondary-text-color);">A</span> <span style="font-variant-numeric:tabular-nums; font-size:12px; font-weight:600;">${m1a.toFixed(1)}</span></div>
                      </div>
                      <div style="font-size:11px; color:var(--secondary-text-color); margin-top:6px;">Yield: ${(m1y*1000).toFixed(0)}Wh</div>
                    </div>
                    <div style="border:1px solid var(--divider-color); border-radius:8px; padding:12px;">
                      <div style="font-size:11px; font-weight:600; color:var(--secondary-text-color); margin-bottom:8px;">MPPT 2 (400W)</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:22px; font-weight:700;">${m2pv.toFixed(0)}W</div>
                      <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:8px;">
                        <div><span style="font-size:10px; color:var(--secondary-text-color);">V</span> <span style="font-variant-numeric:tabular-nums; font-size:12px; font-weight:600;">${m2v.toFixed(1)}</span></div>
                        <div><span style="font-size:10px; color:var(--secondary-text-color);">A</span> <span style="font-variant-numeric:tabular-nums; font-size:12px; font-weight:600;">${m2a.toFixed(1)}</span></div>
                      </div>
                      <div style="font-size:11px; color:var(--secondary-text-color); margin-top:6px;">Yield: ${(m2y*1000).toFixed(0)}Wh</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: sensor.total_mppt_pv_power
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Solar production 24h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Solar Production (24h)
            graph_span: 24h
            yaxis:
              - min: 0
                decimals: 0
            series:
              - entity: sensor.a32_pro_mppt1_pv_power
                name: MPPT 1
                type: area
                color: '#f59e0b'
                curve: smooth
                stroke_width: 2
                opacity: 0.1
              - entity: sensor.a32_pro_mppt2_pv_power
                name: MPPT 2
                type: area
                color: '#f97316'
                curve: smooth
                stroke_width: 2
                opacity: 0.1
            grid_options:
              columns: full
              rows: auto

          # ── Power by device 6h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Power by Device (6h)
            graph_span: 6h
            yaxis:
              - min: 0
                decimals: 0
            stacked: true
            series:
              - entity: sensor.inverter_power_24v
                name: Inverter
                type: area
                color: '#8b5cf6'
                curve: smooth
                stroke_width: 1
                opacity: 0.3
              - entity: sensor.air_conditioning_power_24v
                name: A/C
                type: area
                color: '#3b82f6'
                curve: smooth
                stroke_width: 1
                opacity: 0.3
              - entity: sensor.all_24v_devices_power_24v
                name: 24V
                type: area
                color: '#22c55e'
                curve: smooth
                stroke_width: 1
                opacity: 0.3
              - entity: sensor.all_12v_devices_power_24v
                name: 12V
                type: area
                color: '#06b6d4'
                curve: smooth
                stroke_width: 1
                opacity: 0.3
              - entity: sensor.shore_power_charger_power_24v
                name: Shore
                type: area
                color: '#ec4899'
                curve: smooth
                stroke_width: 1
                opacity: 0.3
            grid_options:
              columns: full
              rows: auto

          # ── Power flow ──
          - type: custom:power-flow-card-plus
            entities:
              solar:
                entity: sensor.total_mppt_pv_power
                icon: mdi:solar-power-variant
                color:
                  icon_color: '#f59e0b'
              battery:
                entity:
                  consumption: sensor.battery_discharging
                  production: sensor.battery_charging
