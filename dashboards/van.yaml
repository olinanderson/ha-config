title: Van
views:
  - title: Van
    path: van
    icon: mdi:van-passenger

    # ─────────────────────────────────────────────
    #  BADGE BAR — critical driving info at a glance
    # ─────────────────────────────────────────────
    badges:
      # ── Battery SOC ──
      - type: custom:mushroom-template-badge
        entity: sensor.olins_van_bms_battery
        icon: |
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {% set level = (batt / 10) | round(0, 'floor') * 10 %}
          {% if level < 10 %}{% set level = 10 %}{% endif %}
          {{ 'mdi:battery' if level >= 100 else 'mdi:battery-' ~ level }}
        content: "{{ states('sensor.olins_van_bms_battery') }}%"
        color: >
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {{ 'red' if batt < 30 else 'orange' if batt < 65 else 'green' }}
        label: Battery
        tap_action:
          action: more-info

      # ── Solar ──
      - type: custom:mushroom-template-badge
        entity: sensor.total_mppt_pv_power
        icon: mdi:solar-power-variant
        content: "{{ states('sensor.total_mppt_pv_power') }}W"
        color: >
          {{ 'green' if states('sensor.total_mppt_pv_power') | float(0) > 50 else 'grey' }}
        label: Solar
        tap_action:
          action: more-info

      # ── Fuel ──
      - type: custom:mushroom-template-badge
        entity: sensor.stable_fuel_level
        icon: mdi:gas-station
        content: "{{ states('sensor.stable_fuel_level') }}%"
        color: >
          {% set v = states('sensor.stable_fuel_level') | float(0) %}
          {{ 'red' if v < 15 else 'orange' if v < 30 else 'green' }}
        label: Fuel
        tap_action:
          action: more-info

      # ── Engine ──
      - type: custom:mushroom-template-badge
        entity: binary_sensor.engine_is_running
        icon: >
          {{ 'mdi:engine' if is_state('binary_sensor.engine_is_running', 'on') else 'mdi:engine-off' }}
        content: >
          {{ 'Running' if is_state('binary_sensor.engine_is_running', 'on') else 'Off' }}
        color: >
          {{ 'green' if is_state('binary_sensor.engine_is_running', 'on') else 'grey' }}
        label: Engine
        tap_action:
          action: more-info

      # ── Inverter ──
      - type: custom:mushroom-template-badge
        entity: binary_sensor.shelly_em_reachable
        icon: >
          {{ 'mdi:power-plug' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'mdi:power-plug-off' }}
        content: >
          {{ 'ON' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'OFF' }}
        color: >
          {{ 'green' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'grey' }}
        label: Inverter
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.a32_pro_inverter_on_off_toggle

    # ─────────────────────────────────────────────
    #  SECTIONS
    # ─────────────────────────────────────────────
    sections:

      # ═══════════════════════════════════════════
      #  COLUMN 1: Battery + Power while driving
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Battery hero card ──
          - type: custom:button-card
            entity: sensor.olins_van_bms_battery
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var soc = parseFloat(states['sensor.olins_van_bms_battery'].state);
                var current = parseFloat(states['sensor.olins_van_bms_current'].state);
                var voltage = parseFloat(states['sensor.olins_van_bms_voltage'].state);
                var power = parseFloat(states['sensor.olins_van_bms_power'].state);
                var stored = parseFloat(states['sensor.olins_van_bms_stored_energy'].state);
                var temp = parseFloat(states['sensor.olins_van_bms_temperature'].state);

                var socColor = soc < 30 ? 'var(--error-color)' : soc < 65 ? 'var(--warning-color)' : 'var(--success-color)';
                var status = current > 0.5 ? 'Charging' : current < -0.5 ? 'Discharging' : 'Idle';
                var statusColor = current > 0.5 ? 'var(--success-color)' : current < -0.5 ? 'var(--warning-color)' : 'var(--secondary-text-color)';

                var timeStr = '';
                if (current > 0.5) {
                  var whRemaining = 8700 - stored;
                  var hours = whRemaining / Math.abs(power);
                  if (hours < 48) {
                    var h = Math.floor(hours);
                    var m = Math.round((hours - h) * 60);
                    timeStr = h + 'h ' + m + 'm to full';
                  }
                } else if (current < -0.5) {
                  var hours = stored / Math.abs(power);
                  if (hours < 48) {
                    var h = Math.floor(hours);
                    var m = Math.round((hours - h) * 60);
                    timeStr = h + 'h ' + m + 'm remaining';
                  }
                }

                return `<div style="padding:2px 0;">
                  <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:6px;">
                    <span style="font-size:32px; font-weight:700; letter-spacing:-1px; color:${socColor};">${soc}%</span>
                    <span style="font-size:13px; font-weight:500; color:${statusColor};">${status}</span>
                  </div>
                  <div style="width:100%; height:6px; background:var(--divider-color); border-radius:3px; margin-bottom:10px; overflow:hidden;">
                    <div style="width:${soc}%; height:100%; background:${socColor}; border-radius:3px; transition:width 1s ease;"></div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Voltage</div>
                      <div style="font-size:14px; font-weight:600;">${voltage.toFixed(1)}V</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Current</div>
                      <div style="font-size:14px; font-weight:600;">${current.toFixed(1)}A</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Power</div>
                      <div style="font-size:14px; font-weight:600;">${Math.abs(power).toFixed(0)}W</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Temp</div>
                      <div style="font-size:14px; font-weight:600;">${temp.toFixed(1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Stored</div>
                      <div style="font-size:14px; font-weight:600;">${(stored/1000).toFixed(1)}kWh</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Estimate</div>
                      <div style="font-size:14px; font-weight:600;">${timeStr || '—'}</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Charging sources row ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var alt = parseFloat(states['sensor.alternator_charger_power_24v'].state) || 0;
                var solar = parseFloat(states['sensor.total_mppt_pv_power'].state) || 0;
                var shore = parseFloat(states['sensor.shore_power_charger_power_24v'].state) || 0;

                var altColor = alt > 10 ? 'var(--success-color)' : 'var(--secondary-text-color)';
                var solarColor = solar > 10 ? 'var(--warning-color)' : 'var(--secondary-text-color)';
                var shoreColor = shore > 10 ? 'var(--info-color)' : 'var(--secondary-text-color)';

                return `<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center;">
                  <div>
                    <ha-icon icon="mdi:car-battery" style="--mdc-icon-size:20px; color:${altColor};"></ha-icon>
                    <div style="font-size:16px; font-weight:700; margin-top:2px;">${alt.toFixed(0)}W</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">Alternator</div>
                  </div>
                  <div>
                    <ha-icon icon="mdi:solar-power-variant" style="--mdc-icon-size:20px; color:${solarColor};"></ha-icon>
                    <div style="font-size:16px; font-weight:700; margin-top:2px;">${solar.toFixed(0)}W</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">Solar</div>
                  </div>
                  <div>
                    <ha-icon icon="mdi:ev-plug-type1" style="--mdc-icon-size:20px; color:${shoreColor};"></ha-icon>
                    <div style="font-size:16px; font-weight:700; margin-top:2px;">${shore.toFixed(0)}W</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">Shore</div>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Battery SOC history chart ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Battery SOC
            graph_span: 4h
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.olins_van_bms_battery
                name: SOC
                type: area
                color: '#22c55e'
                curve: smooth
                stroke_width: 2
                opacity: 0.15
            grid_options:
              columns: full
              rows: auto

      # ═══════════════════════════════════════════
      #  COLUMN 2: Engine + Vehicle data
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Engine gauges hero ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var rpm = parseFloat(states['sensor.wican_rpm'].state) || 0;
                var speed = parseFloat(states['sensor.wican_speed'].state) || 0;
                var coolant = states['sensor.coolant_temp_last'] ? parseFloat(states['sensor.coolant_temp_last'].state) : 0;
                var throttle = parseFloat(states['sensor.wican_throttle_position'].state) || 0;
                var load = parseFloat(states['sensor.wican_engine_load'].state) || 0;
                var ambient = states['sensor.ambient_air_temp_last'] ? parseFloat(states['sensor.ambient_air_temp_last'].state) : 0;

                var rpmPct = Math.min(rpm / 6000 * 100, 100);
                var rpmColor = rpm > 4000 ? 'var(--error-color)' : rpm > 2500 ? 'var(--warning-color)' : 'var(--success-color)';
                var coolantColor = coolant > 105 ? 'var(--error-color)' : coolant > 95 ? 'var(--warning-color)' : 'var(--info-color)';

                return `<div style="padding:2px 0;">
                  <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Speed</div>
                      <div style="font-size:28px; font-weight:700; letter-spacing:-0.5px;">${speed.toFixed(0)} <span style="font-size:14px; font-weight:400;">km/h</span></div>
                    </div>
                    <div style="text-align:right;">
                      <div style="font-size:11px; color:var(--secondary-text-color);">RPM</div>
                      <div style="font-size:28px; font-weight:700; letter-spacing:-0.5px; color:${rpmColor};">${rpm.toFixed(0)}</div>
                    </div>
                  </div>
                  <div style="width:100%; height:4px; background:var(--divider-color); border-radius:2px; margin-bottom:12px; overflow:hidden;">
                    <div style="width:${rpmPct}%; height:100%; background:${rpmColor}; border-radius:2px; transition:width 0.5s ease;"></div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Coolant</div>
                      <div style="font-size:14px; font-weight:600; color:${coolantColor};">${coolant.toFixed(1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Throttle</div>
                      <div style="font-size:14px; font-weight:600;">${throttle.toFixed(0)}%</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Load</div>
                      <div style="font-size:14px; font-weight:600;">${load.toFixed(0)}%</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Ambient</div>
                      <div style="font-size:14px; font-weight:600;">${ambient.toFixed(1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">ECU Volt</div>
                      <div style="font-size:14px; font-weight:600;">${(parseFloat(states['sensor.wican_control_module_voltage'].state) || 0).toFixed(1)}V</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Fuel</div>
                      <div style="font-size:14px; font-weight:600;">${(parseFloat(states['sensor.stable_fuel_level'].state) || 0).toFixed(0)}%</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: sensor.wican_rpm
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Road grade + driving status ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var grade = parseFloat(states['sensor.road_grade_percent'].state) || 0;
                var gradeDeg = parseFloat(states['sensor.road_grade_deg'].state) || 0;
                var hill = states['sensor.hill_aggression'] ? states['sensor.hill_aggression'].state.trim() : 'Flat';
                var moving = states['binary_sensor.vehicle_is_moving'].state === 'on';
                var stable = states['binary_sensor.vehicle_is_stable'].state === 'on';

                var gradeColor = Math.abs(grade) > 10 ? 'var(--error-color)' : Math.abs(grade) > 5 ? 'var(--warning-color)' : 'var(--success-color)';
                var gradeIcon = grade > 3 ? 'mdi:arrow-top-right' : grade < -3 ? 'mdi:arrow-bottom-right' : 'mdi:arrow-right';

                return `<div style="display:flex; justify-content:space-between; align-items:center;">
                  <div style="display:flex; align-items:center; gap:10px;">
                    <ha-icon icon="${gradeIcon}" style="--mdc-icon-size:24px; color:${gradeColor};"></ha-icon>
                    <div>
                      <div style="font-size:18px; font-weight:700; color:${gradeColor};">${grade.toFixed(1)}%</div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">${hill} · ${gradeDeg.toFixed(1)}°</div>
                    </div>
                  </div>
                  <div style="display:flex; gap:12px;">
                    <div style="text-align:center;">
                      <ha-icon icon="${moving ? 'mdi:car' : 'mdi:car-brake-parking'}" style="--mdc-icon-size:18px; color:${moving ? 'var(--info-color)' : 'var(--secondary-text-color)'};"></ha-icon>
                      <div style="font-size:10px; color:var(--secondary-text-color);">${moving ? 'Moving' : 'Parked'}</div>
                    </div>
                    <div style="text-align:center;">
                      <ha-icon icon="${stable ? 'mdi:check-circle' : 'mdi:car-speed-limiter'}" style="--mdc-icon-size:18px; color:${stable ? 'var(--success-color)' : 'var(--warning-color)'};"></ha-icon>
                      <div style="font-size:10px; color:var(--secondary-text-color);">${stable ? 'Stable' : 'Accel'}</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Temperatures ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var t1 = parseFloat(states['sensor.a32_pro_bme280_1_temperature'].state);
                var t2 = parseFloat(states['sensor.a32_pro_bme280_2_temperature'].state);
                var t4 = parseFloat(states['sensor.a32_pro_bme280_4_temperature'].state);
                var h1 = parseFloat(states['sensor.a32_pro_bme280_1_relative_humidity'].state);

                return `<div style="display:flex; gap:20px; justify-content:center; align-items:center; padding:2px 0;">
                  <div style="text-align:center;">
                    <div style="font-size:22px; font-weight:600;">${t1.toFixed(1)}°</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">Inside · ${h1.toFixed(0)}%</div>
                  </div>
                  <div style="width:1px; height:28px; background:var(--divider-color);"></div>
                  <div style="text-align:center;">
                    <div style="font-size:22px; font-weight:600;">${t2.toFixed(1)}°</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">Cab</div>
                  </div>
                  <div style="width:1px; height:28px; background:var(--divider-color);"></div>
                  <div style="text-align:center;">
                    <div style="font-size:22px; font-weight:600;">${t4.toFixed(1)}°</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">Outside</div>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 10px 14px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Fuel level chart ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Fuel Level
            graph_span: 24h
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.stable_fuel_level
                name: Fuel
                type: area
                color: '#f59e0b'
                curve: stepline
                stroke_width: 2
                opacity: 0.15
            grid_options:
              columns: full
              rows: auto

          # ── Road grade chart ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Road Grade
            graph_span: 30min
            yaxis:
              - decimals: 1
            series:
              - entity: sensor.road_grade_percent
                name: Grade %
                type: line
                color: '#8b5cf6'
                curve: smooth
                stroke_width: 2
            grid_options:
              columns: full
              rows: auto

    cards: []
