title: Climate & Heating
views:
  - title: Climate & Heating
    path: climate
    icon: mdi:thermostat

    # ─────────────────────────────────────────────
    #  BADGE BAR — climate at a glance
    # ─────────────────────────────────────────────
    badges:
      # ── Inside Temp ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_bme280_1_temperature
        icon: mdi:thermometer
        content: "{{ states('sensor.a32_pro_bme280_1_temperature') | float(0) | round(1) }}°C"
        color: >
          {% set t = states('sensor.a32_pro_bme280_1_temperature') | float(0) %}
          {{ 'blue' if t < 15 else 'orange' if t > 28 else 'green' }}
        label: Inside
        tap_action:
          action: more-info

      # ── Outside Temp ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_bme280_4_temperature
        icon: mdi:thermometer-lines
        content: "{{ states('sensor.a32_pro_bme280_4_temperature') | float(0) | round(1) }}°C"
        color: >
          {% set t = states('sensor.a32_pro_bme280_4_temperature') | float(0) %}
          {{ 'blue' if t < 5 else 'orange' if t > 30 else 'green' }}
        label: Outside
        tap_action:
          action: more-info

      # ── Heater ──
      - type: custom:mushroom-template-badge
        entity: switch.a32_pro_switch24_hydronic_heater
        icon: >
          {{ 'mdi:radiator' if is_state('switch.a32_pro_switch24_hydronic_heater', 'on') else 'mdi:radiator-off' }}
        content: >
          {{ 'ON' if is_state('switch.a32_pro_switch24_hydronic_heater', 'on') else 'OFF' }}
        color: >
          {{ 'orange' if is_state('switch.a32_pro_switch24_hydronic_heater', 'on') else 'grey' }}
        label: Heater
        tap_action:
          action: more-info

      # ── Humidity ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_bme280_1_relative_humidity
        icon: mdi:water-percent
        content: "{{ states('sensor.a32_pro_bme280_1_relative_humidity') | float(0) | round(0) }}%"
        color: >
          {% set h = states('sensor.a32_pro_bme280_1_relative_humidity') | float(0) %}
          {{ 'red' if h > 70 else 'orange' if h > 60 else 'green' }}
        label: Humidity
        tap_action:
          action: more-info

      # ── Roof Fan ──
      - type: custom:mushroom-template-badge
        entity: fan.ag_pro_roof_fan
        icon: >
          {{ 'mdi:fan' if is_state('fan.ag_pro_roof_fan', 'on') else 'mdi:fan-off' }}
        content: >
          {% if is_state('fan.ag_pro_roof_fan', 'on') %}
            {{ state_attr('fan.ag_pro_roof_fan', 'percentage') | default(0) }}%
          {% else %}
            Off
          {% endif %}
        color: >
          {{ 'cyan' if is_state('fan.ag_pro_roof_fan', 'on') else 'grey' }}
        label: Roof Fan
        tap_action:
          action: more-info

    # ─────────────────────────────────────────────
    #  SECTIONS
    # ─────────────────────────────────────────────
    sections:

      # ═══════════════════════════════════════════
      #  COLUMN 1: Thermostat + Heater details
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── PID Thermostat ──
          - type: custom:better-thermostat-ui-card
            entity: climate.a32_pro_van_hydronic_heating_pid
            grid_options:
              columns: full
              rows: auto

          # ── Hydronic heater details hero ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var heaterOn = states['switch.a32_pro_switch24_hydronic_heater'].state === 'on';
                var lockout = states['sensor.a32_pro_hydronic_heater_power_supply_lockout_status'].state;
                var pidOutput = parseFloat(states['sensor.a32_pro_coolant_blower_heating_pid_climate_result'].state) || 0;
                var coolantTemp = parseFloat(states['sensor.a32_pro_s5140_channel_34_temperature_blower_coolant'].state) || 0;
                var blowerAirTemp = parseFloat(states['sensor.a32_pro_s5140_channel_35_temperature_blower_air'].state) || 0;
                var runTime = states['sensor.hydronic_heater_total_on_time'].state || '0';
                var fanOverride = states['switch.a32_pro_fan_override_manual_on_off'].state === 'on';

                var heaterColor = heaterOn ? 'var(--warning-color)' : 'var(--secondary-text-color)';
                var lockoutColor = lockout === 'Normal' || lockout === 'normal' ? 'var(--success-color)' : 'var(--error-color)';

                return `<div style="padding:2px 0;">
                  <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--secondary-text-color); margin-bottom:8px;">Hydronic Heater</div>
                  <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <ha-icon icon="${heaterOn ? 'mdi:radiator' : 'mdi:radiator-off'}" style="--mdc-icon-size:28px; color:${heaterColor};"></ha-icon>
                    <div>
                      <div style="font-size:18px; font-weight:700; color:${heaterColor};">${heaterOn ? 'Running' : 'Off'}</div>
                      <div style="font-size:11px; color:${lockoutColor};">Lockout: ${lockout}</div>
                    </div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">PID Output</div>
                      <div style="font-size:14px; font-weight:600;">${(pidOutput * 100).toFixed(0)}%</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Coolant</div>
                      <div style="font-size:14px; font-weight:600;">${coolantTemp.toFixed(1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Blower Air</div>
                      <div style="font-size:14px; font-weight:600;">${blowerAirTemp.toFixed(1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Run Time</div>
                      <div style="font-size:14px; font-weight:600;">${parseFloat(runTime).toFixed(0)}h</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Fan Override</div>
                      <div style="font-size:14px; font-weight:600; color:${fanOverride ? 'var(--info-color)' : 'var(--secondary-text-color)'};">${fanOverride ? 'ON' : 'Off'}</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Blower</div>
                      <div style="font-size:14px; font-weight:600;">${(parseFloat(states['light.a32_pro_a32_pro_dac_0'].attributes.brightness || 0) / 255 * 100).toFixed(0)}%</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: switch.a32_pro_switch24_hydronic_heater
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Heater scheduler ──
          - type: custom:scheduler-card
            include:
              - climate.a32_pro_van_hydronic_heating_pid
              - switch.a32_pro_switch24_hydronic_heater
            grid_options:
              columns: full
              rows: auto

          # ── Roof Fan control ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var fanOn = states['fan.ag_pro_roof_fan'].state === 'on';
                var speed = parseInt(states['fan.ag_pro_roof_fan'].attributes.percentage) || 0;
                var direction = states['sensor.roof_fan_direction'].state || 'Unknown';
                var lidOpen = states['cover.ag_pro_roof_fan_lid'].state === 'open';
                var fanPower = parseFloat(states['sensor.roof_fan_power_12v'].state) || 0;

                var fanColor = fanOn ? 'var(--info-color)' : 'var(--secondary-text-color)';
                var dirIcon = direction === 'Exhaust' ? 'mdi:arrow-up' : direction === 'Intake' ? 'mdi:arrow-down' : 'mdi:minus';

                return `<div style="padding:2px 0;">
                  <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--secondary-text-color); margin-bottom:8px;">Roof Fan</div>
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px;">
                      <ha-icon icon="${fanOn ? 'mdi:fan' : 'mdi:fan-off'}" style="--mdc-icon-size:28px; color:${fanColor};"></ha-icon>
                      <div>
                        <div style="font-size:18px; font-weight:700; color:${fanColor};">${fanOn ? speed + '%' : 'Off'}</div>
                        <div style="font-size:11px; color:var(--secondary-text-color);">
                          <ha-icon icon="${dirIcon}" style="--mdc-icon-size:14px;"></ha-icon> ${direction}
                        </div>
                      </div>
                    </div>
                    <div style="display:flex; gap:16px; text-align:center;">
                      <div>
                        <div style="font-size:10px; color:var(--secondary-text-color);">Lid</div>
                        <div style="font-size:13px; font-weight:600;">${lidOpen ? 'Open' : 'Closed'}</div>
                      </div>
                      <div>
                        <div style="font-size:10px; color:var(--secondary-text-color);">Power</div>
                        <div style="font-size:13px; font-weight:600;">${fanPower.toFixed(1)}W</div>
                      </div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: fan.ag_pro_roof_fan
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

      # ═══════════════════════════════════════════
      #  COLUMN 2: Temperature + Humidity charts
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── All temperatures at a glance ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var t1 = parseFloat(states['sensor.a32_pro_bme280_1_temperature'].state);
                var h1 = parseFloat(states['sensor.a32_pro_bme280_1_relative_humidity'].state);
                var t2 = parseFloat(states['sensor.a32_pro_bme280_2_temperature'].state);
                var h2 = parseFloat(states['sensor.a32_pro_bme280_2_relative_humidity'].state);
                var t3 = parseFloat(states['sensor.a32_pro_bme280_3_temperature'].state);
                var h3 = parseFloat(states['sensor.a32_pro_bme280_3_relative_humidity'].state);
                var t4 = parseFloat(states['sensor.a32_pro_bme280_4_temperature'].state);
                var h4 = parseFloat(states['sensor.a32_pro_bme280_4_relative_humidity'].state);

                function zone(name, temp, hum, icon) {
                  var tColor = temp < 15 ? 'var(--info-color)' : temp > 28 ? 'var(--error-color)' : 'var(--primary-text-color)';
                  return `<div style="text-align:center;">
                    <ha-icon icon="${icon}" style="--mdc-icon-size:20px; color:${tColor};"></ha-icon>
                    <div style="font-size:20px; font-weight:700; margin-top:2px; color:${tColor};">${temp.toFixed(1)}°</div>
                    <div style="font-size:11px; color:var(--secondary-text-color);">${hum.toFixed(0)}%</div>
                    <div style="font-size:10px; color:var(--secondary-text-color);">${name}</div>
                  </div>`;
                }

                return `<div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; padding:4px 0;">
                  ${zone('Living', t1, h1, 'mdi:sofa')}
                  ${zone('Cab', t2, h2, 'mdi:car-seat')}
                  ${zone('Shower', t3, h3, 'mdi:shower')}
                  ${zone('Outside', t4, h4, 'mdi:weather-partly-cloudy')}
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: auto

          # ── Temperature history 12h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Temperature (12h)
            graph_span: 12h
            yaxis:
              - decimals: 1
            series:
              - entity: sensor.a32_pro_bme280_1_temperature
                name: Living
                type: line
                color: '#ef4444'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_bme280_2_temperature
                name: Cab
                type: line
                color: '#f59e0b'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_bme280_3_temperature
                name: Shower
                type: line
                color: '#3b82f6'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_bme280_4_temperature
                name: Outside
                type: line
                color: '#22c55e'
                curve: smooth
                stroke_width: 2
            grid_options:
              columns: full
              rows: auto

          # ── Humidity history 12h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Humidity (12h)
            graph_span: 12h
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.a32_pro_bme280_1_relative_humidity
                name: Living
                type: line
                color: '#ef4444'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_bme280_2_relative_humidity
                name: Cab
                type: line
                color: '#f59e0b'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_bme280_3_relative_humidity
                name: Shower
                type: line
                color: '#3b82f6'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_bme280_4_relative_humidity
                name: Outside
                type: line
                color: '#22c55e'
                curve: smooth
                stroke_width: 2
            grid_options:
              columns: full
              rows: auto

          # ── Battery heater status ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var battTemp = parseFloat(states['sensor.olins_van_bms_temperature'].state) || 0;
                var battHeaterPower = parseFloat(states['sensor.battery_heater_power_12v'].state) || 0;
                var battHeaterOn = battHeaterPower > 5;
                var plateTemp = parseFloat(states['sensor.a32_pro_s5140_channel_36_temperature_ntc_battery_plate'].state) || 0;

                var tempColor = battTemp < 5 ? 'var(--info-color)' : battTemp > 40 ? 'var(--error-color)' : 'var(--success-color)';

                return `<div style="display:flex; justify-content:space-between; align-items:center;">
                  <div style="display:flex; align-items:center; gap:10px;">
                    <ha-icon icon="${battHeaterOn ? 'mdi:heat-wave' : 'mdi:snowflake'}" style="--mdc-icon-size:24px; color:${battHeaterOn ? 'var(--warning-color)' : 'var(--info-color)'};"></ha-icon>
                    <div>
                      <div style="font-size:14px; font-weight:600;">Battery Heater</div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">${battHeaterOn ? 'Heating' : 'Standby'} · ${battHeaterPower.toFixed(1)}W</div>
                    </div>
                  </div>
                  <div style="display:flex; gap:16px; text-align:center;">
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">BMS</div>
                      <div style="font-size:16px; font-weight:700; color:${tempColor};">${battTemp.toFixed(1)}°</div>
                    </div>
                    <div>
                      <div style="font-size:10px; color:var(--secondary-text-color);">Plate</div>
                      <div style="font-size:16px; font-weight:700;">${plateTemp.toFixed(1)}°</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: sensor.olins_van_bms_temperature
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Heater coolant + blower temps chart ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Heater Temps (6h)
            graph_span: 6h
            yaxis:
              - decimals: 1
            series:
              - entity: sensor.a32_pro_s5140_channel_34_temperature_blower_coolant
                name: Coolant
                type: line
                color: '#ef4444'
                curve: smooth
                stroke_width: 2
              - entity: sensor.a32_pro_s5140_channel_35_temperature_blower_air
                name: Blower Air
                type: line
                color: '#f59e0b'
                curve: smooth
                stroke_width: 2
              - entity: sensor.olins_van_bms_temperature
                name: Battery
                type: line
                color: '#3b82f6'
                curve: smooth
                stroke_width: 2
            grid_options:
              columns: full
              rows: auto

    cards: []
