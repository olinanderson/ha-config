title: Water & Propane
views:
  - title: Water & Propane
    path: water-propane
    icon: mdi:water

    badges:
      # ── Fresh Water ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_fresh_water_tank_level
        icon: mdi:water
        content: "{{ states('sensor.a32_pro_fresh_water_tank_level') | float(0) | round(0) }}%"
        color: >
          {% set w = states('sensor.a32_pro_fresh_water_tank_level') | float(0) %}
          {{ 'red' if w < 15 else 'orange' if w < 30 else 'blue' }}
        label: Fresh
        tap_action:
          action: more-info

      # ── Grey Water ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_grey_water_tank_level
        icon: mdi:water-opacity
        content: "{{ states('sensor.a32_pro_grey_water_tank_level') | float(0) | round(0) }}%"
        color: >
          {% set g = states('sensor.a32_pro_grey_water_tank_level') | float(0) %}
          {{ 'red' if g > 80 else 'orange' if g > 60 else 'grey' }}
        label: Grey
        tap_action:
          action: more-info

      # ── Propane ──
      - type: custom:mushroom-template-badge
        entity: sensor.propane_tank_percentage
        icon: mdi:propane-tank
        content: "{{ states('sensor.propane_tank_percentage') | float(0) | round(0) }}%"
        color: >
          {% set p = states('sensor.propane_tank_percentage') | float(0) %}
          {{ 'red' if p < 10 else 'orange' if p < 25 else 'deep-purple' }}
        label: Propane
        tap_action:
          action: more-info

      # ── Water System ──
      - type: custom:mushroom-template-badge
        entity: switch.a32_pro_water_system_master_switch
        icon: >
          {{ 'mdi:water-check' if is_state('switch.a32_pro_water_system_master_switch', 'on') else 'mdi:water-off' }}
        content: >
          {{ 'ON' if is_state('switch.a32_pro_water_system_master_switch', 'on') else 'OFF' }}
        color: >
          {{ 'blue' if is_state('switch.a32_pro_water_system_master_switch', 'on') else 'grey' }}
        label: Water
        tap_action:
          action: toggle

      # ── LPG Valve ──
      - type: custom:mushroom-template-badge
        entity: switch.a32_pro_switch16_lpg_valve
        icon: >
          {{ 'mdi:valve-open' if is_state('switch.a32_pro_switch16_lpg_valve', 'on') else 'mdi:valve-closed' }}
        content: >
          {{ 'Open' if is_state('switch.a32_pro_switch16_lpg_valve', 'on') else 'Closed' }}
        color: >
          {{ 'orange' if is_state('switch.a32_pro_switch16_lpg_valve', 'on') else 'grey' }}
        label: LPG
        tap_action:
          action: toggle

    sections:
      # ═══════════════════════════════════════════
      #  COLUMN 1 — Water System
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Water tanks hero ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var fresh=parseFloat(states['sensor.a32_pro_fresh_water_tank_level'].state)||0;
                var grey=parseFloat(states['sensor.a32_pro_grey_water_tank_level'].state)||0;
                var freshColor=fresh<15?'#ef4444':fresh<30?'#f59e0b':'#3b82f6';
                var greyColor=grey>80?'#ef4444':grey>60?'#f59e0b':'#6b7280';
                function bar(pct,color,label,icon){
                  return `<div>
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
                      <div style="display:flex; align-items:center; gap:6px;">
                        <ha-icon icon="${icon}" style="--mdc-icon-size:16px; color:${color};"></ha-icon>
                        <span style="font-size:12px; font-weight:500; color:var(--secondary-text-color);">${label}</span>
                      </div>
                      <span style="font-variant-numeric:tabular-nums; font-size:20px; font-weight:700; color:${color};">${pct.toFixed(0)}%</span>
                    </div>
                    <div style="width:100%; height:8px; background:var(--divider-color); border-radius:4px; overflow:hidden;">
                      <div style="width:${pct}%; height:100%; background:linear-gradient(90deg, ${color}, ${color}dd); border-radius:4px; transition:width 1s ease;"></div>
                    </div>
                  </div>`;
                }
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:8px; margin-bottom:18px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:#3b82f6;"></div>
                    <span style="font-size:13px; font-weight:600;">Water Tanks</span>
                  </div>
                  <div style="display:flex; flex-direction:column; gap:16px;">
                    ${bar(fresh,freshColor,'Fresh Water','mdi:water')}
                    ${bar(grey,greyColor,'Grey Water','mdi:water-opacity')}
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Water system controls ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var master=states['switch.a32_pro_water_system_master_switch'].state==='on';
                var main=states['switch.a32_pro_water_system_state_main'].state==='on';
                var recirc=states['switch.a32_pro_water_system_state_recirculating_shower'].state==='on';
                var grey=states['switch.a32_pro_switch06_grey_water_tank_valve'].state==='on';
                function pill(label,active,color){
                  var bg=active?color+'0d':'transparent';
                  var bc=active?color+'66':'var(--divider-color)';
                  var tc=active?color:'var(--secondary-text-color)';
                  var ring=active?`box-shadow:0 0 0 3px ${color}14;`:'';
                  return `<div style="border:1.5px solid ${bc}; background:${bg}; border-radius:8px; padding:10px 8px; text-align:center; transition:all 0.15s ease; ${ring}">
                    <div style="font-size:13px; font-weight:600; color:${tc};">${active?'ON':'OFF'}</div>
                    <div style="font-size:10px; font-weight:500; color:var(--secondary-text-color); margin-top:2px;">${label}</div>
                  </div>`;
                }
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:14px;">
                    <span style="font-size:13px; font-weight:600;">Controls</span>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;">
                    ${pill('Master',master,'#3b82f6')}
                    ${pill('Main',main,'#22c55e')}
                    ${pill('Recirc',recirc,'#06b6d4')}
                    ${pill('Grey Dump',grey,'#f59e0b')}
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: switch.a32_pro_water_system_master_switch
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px 20px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: auto

          # ── Water level chart 24h ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Tank Levels (24h)
            graph_span: 24h
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.a32_pro_fresh_water_tank_level
                name: Fresh
                type: area
                color: '#3b82f6'
                curve: stepline
                stroke_width: 2
                opacity: 0.1
              - entity: sensor.a32_pro_grey_water_tank_level
                name: Grey
                type: area
                color: '#6b7280'
                curve: stepline
                stroke_width: 2
                opacity: 0.1
            grid_options:
              columns: full
              rows: auto

          # ── Shower / Cook mode buttons ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var shower=states['input_boolean.shower_mode'].state==='on';
                function ring(label,icon,active,color){
                  var bg=active?color+'0d':'transparent';
                  var bc=active?color+'66':'var(--divider-color)';
                  var tc=active?color:'var(--secondary-text-color)';
                  var shadow=active?`box-shadow:0 0 0 3px ${color}14;`:'';
                  return `<div style="border:1.5px solid ${bc}; background:${bg}; border-radius:10px; padding:14px; text-align:center; ${shadow} transition:all 0.15s ease;">
                    <ha-icon icon="${icon}" style="--mdc-icon-size:24px; color:${tc};"></ha-icon>
                    <div style="font-size:12px; font-weight:600; color:${tc}; margin-top:6px;">${label}</div>
                    <div style="font-size:10px; color:var(--secondary-text-color); margin-top:2px;">${active?'Active':'Off'}</div>
                  </div>`;
                }
                return `<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                  ${ring('Shower','mdi:shower-head',shower,'#06b6d4')}
                  ${ring('Cook','mdi:stove',false,'#f97316')}
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px 20px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: auto

      # ═══════════════════════════════════════════
      #  COLUMN 2 — Propane
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Propane hero ──
          - type: custom:button-card
            entity: sensor.propane_tank_percentage
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                function s(id){ var v=states[id]; return v&&v.state!=='unknown'&&v.state!=='unavailable' ? parseFloat(v.state) : NaN; }
                var pct=s('sensor.propane_tank_percentage'), depth=s('sensor.propane_liquid_depth'),
                    vol=s('sensor.propane_liquid_volume'), dist=s('sensor.propane_raw_distance');
                var lpg=states['switch.a32_pro_switch16_lpg_valve'].state==='on';
                var pctColor=isNaN(pct)||pct<10?'#ef4444':pct<25?'#f59e0b':'#8b5cf6';
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:${pctColor};"></div>
                    <span style="font-size:13px; font-weight:600;">Propane</span>
                    <span style="font-size:12px; color:var(--secondary-text-color);">20 lb tank · 80% fill</span>
                  </div>
                  <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:8px;">
                    <span style="font-variant-numeric:tabular-nums; font-size:36px; font-weight:700; letter-spacing:-0.025em; color:${pctColor};">${isNaN(pct)?'—':pct.toFixed(0)+'%'}</span>
                    <span style="font-size:13px; color:${lpg?'#f59e0b':'var(--secondary-text-color)'};">${lpg?'Valve Open':'Valve Closed'}</span>
                  </div>
                  <div style="width:100%; height:8px; background:var(--divider-color); border-radius:4px; margin-bottom:16px; overflow:hidden;">
                    <div style="width:${isNaN(pct)?0:pct}%; height:100%; background:linear-gradient(90deg, ${pctColor}, ${pctColor}dd); border-radius:4px; transition:width 1s ease;"></div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Volume</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(vol)?'—':vol.toFixed(1)+'L'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Depth</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(depth)?'—':depth.toFixed(0)+'mm'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Sensor</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(dist)?'—':dist.toFixed(0)+'mm'}</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Propane level 7d ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Propane Level (7d)
            graph_span: 7d
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.propane_tank_percentage
                name: Propane %
                type: area
                color: '#8b5cf6'
                curve: smooth
                stroke_width: 2
                opacity: 0.15
            grid_options:
              columns: full
              rows: auto

          # ── Propane raw distance 7d ──
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              title: Sensor Distance (7d)
            graph_span: 7d
            series:
              - entity: sensor.propane_raw_distance
                name: Distance (mm)
                type: line
                color: '#6b7280'
                curve: smooth
                stroke_width: 1.5
            grid_options:
              columns: full
              rows: auto

          # ── Tank temperatures ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                function s(id){ var v=states[id]; return v&&v.state!=='unknown'&&v.state!=='unavailable' ? parseFloat(v.state) : NaN; }
                var blowerCoolant=s('sensor.a32_pro_s5140_channel_34_temperature_blower_coolant');
                var blowerAir=s('sensor.a32_pro_s5140_channel_35_temperature_blower_air');
                function row(label,val,unit){
                  return `<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0;">
                    <span style="font-size:12px; font-weight:500; color:var(--secondary-text-color);">${label}</span>
                    <span style="font-variant-numeric:tabular-nums; font-size:14px; font-weight:600;">${isNaN(val)?'—':val.toFixed(1)+unit}</span>
                  </div>`;
                }
                return `<div style="padding:2px 0;">
                  <div style="font-size:13px; font-weight:600; margin-bottom:10px;">Temperatures</div>
                  <div style="border-top:1px solid var(--divider-color);">
                    ${row('Blower Coolant',blowerCoolant,'°C')}
                    ${row('Blower Air',blowerAir,'°C')}
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px 20px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

    cards: []
