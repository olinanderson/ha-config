                      ${feelsStr?'<div style="font-size:12px; color:var(--secondary-text-color); margin-top:4px;">'+feelsStr+'</div>':''}
                    </div>
                  </div>
                  <div style="font-size:14px; font-weight:500; margin-bottom:12px;">${summary}</div>
                  <div style="display:flex; gap:16px;">
                    <div style="display:flex; align-items:center; gap:4px;">
                      <ha-icon icon="mdi:water-percent" style="--mdc-icon-size:14px; color:var(--secondary-text-color);"></ha-icon>
                      <span style="font-size:12px; color:var(--secondary-text-color);">${humidity}%</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px;">
                      <ha-icon icon="mdi:weather-windy" style="--mdc-icon-size:14px; color:var(--secondary-text-color);"></ha-icon>
                      <span style="font-size:12px; color:var(--secondary-text-color);">${windDir}${windSpd} km/h</span>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
