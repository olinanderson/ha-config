                var timeStr = 'Unknown';
                if (tracker && tracker.last_changed) {
                  var dur = (Date.now() / 1000) - Date.parse(tracker.last_changed) / 1000;
                  var m = Math.floor(dur / 60);
                  var d = Math.floor(m / 1440), h = Math.floor((m % 1440) / 60), mm = m % 60;
                  timeStr = (d>0?d+'d ':'') + (h>0?h+'h ':'') + mm + 'm';
                }
                var slOk = states['binary_sensor.starlink_ethernet_speeds'] && states['binary_sensor.starlink_ethernet_speeds'].state === 'off';
