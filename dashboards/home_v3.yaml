            label: |
              [[[
                function sAttr(obj,key){ if(!obj) return NaN; var n=Number(obj[key]); return isNaN(n)?NaN:n; }
                var w = states['weather.pirateweather'];
                if (!w || w.state === 'unavailable') return 'Weather unavailable';
                var a = w.attributes || {};
                var temp = sAttr(a,'temperature');
                var feelsLike = a.apparent_temperature != null ? sAttr(a,'apparent_temperature') : NaN;
                var humidity = a.humidity != null ? a.humidity : '—';
                var windSpd = a.wind_speed ? (Number(a.wind_speed)*1.60934).toFixed(0) : '—';
                var windBearing = a.wind_bearing != null ? sAttr(a,'wind_bearing') : NaN;
                var cond = w.state;
                var windDir = '';
                if (!isNaN(windBearing)) { var dirs=['N','NE','E','SE','S','SW','W','NW']; windDir=dirs[Math.round(windBearing/45)%8]+' '; }
                var condNames = {'clear-night':'Clear','cloudy':'Cloudy','fog':'Foggy','hail':'Hail','lightning':'Lightning','lightning-rainy':'Thunderstorm','partlycloudy':'Partly Cloudy','pouring':'Heavy Rain','rainy':'Rain','snowy':'Snow','snowy-rainy':'Sleet','sunny':'Sunny','windy':'Windy','windy-variant':'Windy','exceptional':'Severe'};
                var condName = condNames[cond] || cond;
                var iconMap = {'clear-night':'mdi:weather-night','cloudy':'mdi:weather-cloudy','fog':'mdi:weather-fog','hail':'mdi:weather-hail','lightning':'mdi:weather-lightning','lightning-rainy':'mdi:weather-lightning-rainy','partlycloudy':'mdi:weather-partly-cloudy','pouring':'mdi:weather-pouring','rainy':'mdi:weather-rainy','snowy':'mdi:weather-snowy','snowy-rainy':'mdi:weather-snowy-rainy','sunny':'mdi:weather-sunny','windy':'mdi:weather-windy','windy-variant':'mdi:weather-windy-variant','exceptional':'mdi:weather-hurricane'};
                var icon = iconMap[cond] || 'mdi:weather-cloudy';
                var tempWord = temp<=-10?'frigid':temp<=0?'freezing':temp<=8?'cold':temp<=15?'cool':temp<=22?'mild':temp<=28?'warm':'hot';
                var summary = condName + ' and ' + tempWord;
                var geo = states['sensor.olin_andersons_iphone_geocoded_location'];
                var loc = '';
                if (geo && geo.state && geo.state !== 'unknown' && geo.state !== 'unavailable') {
                  var ga = geo.attributes || {};
                  var city = ga['Locality']||ga['locality']||'';
                  var region = ga['AdministrativeArea']||ga['administrative_area']||'';
                  loc = city&&region ? city+', '+region : city||region||geo.state;
                }
                if (!loc) loc = 'Location unavailable';
                var feelsStr = !isNaN(feelsLike) ? 'Feels like ' + Math.round(feelsLike) + '°' : '';
                return `<div style="padding:2px 0;">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:14px;">
