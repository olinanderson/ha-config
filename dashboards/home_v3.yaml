title: Home
views:
  - title: Home
    path: home
    icon: mdi:home

    # ─────────────────────────────────────────────
    #  BADGE BAR — 8 essential at-a-glance indicators
    # ─────────────────────────────────────────────
    badges:
      # ── Battery SOC ──
      - type: custom:mushroom-template-badge
        entity: sensor.olins_van_bms_battery
        icon: |
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {% set level = (batt / 10) | round(0, 'floor') * 10 %}
          {% if level < 10 %}{% set level = 10 %}{% endif %}
          {{ 'mdi:battery' if level >= 100 else 'mdi:battery-' ~ level }}
        content: >
          {{ states('sensor.olins_van_bms_battery') }}% · {{ states('sensor.olins_van_bms_current') }}A
        color: >
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {{ 'red' if batt < 30 else 'orange' if batt < 65 else 'green' }}
        label: Battery
        tap_action:
          action: more-info
          entity: sensor.olins_van_bms_battery

      # ── Solar ──
      - type: custom:mushroom-template-badge
        entity: sensor.total_mppt_pv_power
        icon: mdi:solar-power-variant
        content: "{{ states('sensor.total_mppt_pv_power') }}W"
        color: >
          {{ 'green' if states('sensor.total_mppt_pv_power') | float(0) > 50 else 'grey' }}
        label: Solar
        tap_action:
          action: more-info

      # ── Fresh Water ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_fresh_water_tank_level
        icon: >
          {{ 'mdi:water-off' if states('sensor.a32_pro_fresh_water_tank_level') | float(0) < 20 else 'mdi:water' }}
        content: "{{ states('sensor.a32_pro_fresh_water_tank_level') | float(0) | round(0) }}%"
        color: >
          {% set v = states('sensor.a32_pro_fresh_water_tank_level') | float(0) %}
          {{ 'red' if v < 20 else 'orange' if v < 50 else 'green' }}
        label: Fresh
        tap_action:
          action: more-info

      # ── Grey Water ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_grey_water_tank_level
        icon: mdi:water-opacity
        content: "{{ states('sensor.a32_pro_grey_water_tank_level') | float(0) | round(0) }}%"
        color: >
          {% set v = states('sensor.a32_pro_grey_water_tank_level') | float(0) %}
          {{ 'red' if v > 80 else 'orange' if v > 60 else 'green' }}
        label: Grey
        tap_action:
          action: more-info

      # ── Fuel ──
      - type: custom:mushroom-template-badge
        entity: sensor.stable_fuel_level
        icon: mdi:gas-station
        content: "{{ states('sensor.stable_fuel_level') | float(0) | round(0) }}%"
        color: >
          {% set v = states('sensor.stable_fuel_level') | float(0) %}
          {{ 'red' if v < 15 else 'orange' if v < 30 else 'green' }}
        label: Fuel
        tap_action:
          action: more-info

      # ── Propane ──
      - type: custom:mushroom-template-badge
        entity: sensor.propane_tank_percentage
        icon: mdi:propane-tank
        content: "{{ states('sensor.propane_tank_percentage') | round(0) }}%"
        color: >
          {% set v = states('sensor.propane_tank_percentage') | float(0) %}
          {{ 'red' if v < 15 else 'orange' if v < 30 else 'green' }}
        label: Propane
        tap_action:
          action: more-info

      # ── Inverter ──
      - type: custom:mushroom-template-badge
        entity: binary_sensor.shelly_em_reachable
        icon: >
          {{ 'mdi:power-plug' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'mdi:power-plug-off' }}
        content: >
          {{ 'ON' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'OFF' }}
        color: >
          {{ 'green' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'grey' }}
        label: Inverter
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.a32_pro_inverter_on_off_toggle

      # ── Lights quick toggle ──
      - type: custom:mushroom-template-badge
        entity: light.led_controller_cct_1
        icon: >
          {{ 'mdi:lightbulb-group' if is_state('light.led_controller_cct_1', 'on') or is_state('light.led_controller_cct_2', 'on') else 'mdi:lightbulb-group-off' }}
        content: >
          {{ 'ON' if is_state('light.led_controller_cct_1', 'on') or is_state('light.led_controller_cct_2', 'on') else 'OFF' }}
        color: >
          {{ 'amber' if is_state('light.led_controller_cct_1', 'on') or is_state('light.led_controller_cct_2', 'on') else 'grey' }}
        label: Lights
        tap_action:
          action: call-service
          service: light.toggle
          target:
            entity_id:
              - light.led_controller_cct_1
              - light.led_controller_cct_2
              - light.led_controller_sc_1
              - light.led_controller_sc_2

    # ─────────────────────────────────────────────
    #  SECTIONS
    # ─────────────────────────────────────────────
    sections:

      # ═══════════════════════════════════════════
      #  COLUMN 1 — Climate & Heating
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Temperature hero ──
          - type: custom:button-card
            show_state: false
            show_icon: false
            show_name: false
            show_label: true
            label: |
              [[[
                function s(id){ var v=states[id]; if(!v||v.state==='unknown'||v.state==='unavailable') return NaN; return Number(v.state); }
                function fmt(n,d){ return isNaN(n)?'—':n.toFixed(d); }
                var t1=s('sensor.a32_pro_bme280_1_temperature'), t2=s('sensor.a32_pro_bme280_2_temperature'),
                    t4=s('sensor.a32_pro_bme280_4_temperature'), h1=s('sensor.a32_pro_bme280_1_relative_humidity');
                var tColor = isNaN(t1) ? 'var(--secondary-text-color)' : t1<15?'#3b82f6':t1>28?'#ef4444':'var(--primary-text-color)';
                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:16px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:${tColor};flex-shrink:0;"></div>
                    <span style="font-size:13px; font-weight:600; color:var(--primary-text-color);">Climate</span>
                    <span style="font-size:12px; color:var(--secondary-text-color);">Indoor environment</span>
                  </div>
                  <div style="display:flex; gap:20px; justify-content:center; align-items:center;">
                    <div style="text-align:center;">
                      <div style="font-variant-numeric:tabular-nums; font-size:28px; font-weight:700; letter-spacing:-0.025em; color:${tColor};">${fmt(t1,1)}°</div>
                      <div style="font-size:11px; color:var(--secondary-text-color); margin-top:2px;">Inside · ${fmt(h1,0)}%</div>
                    </div>
                    <div style="width:1px; height:36px; background:var(--divider-color);"></div>
                    <div style="text-align:center;">
                      <div style="font-variant-numeric:tabular-nums; font-size:28px; font-weight:700; letter-spacing:-0.025em;">${fmt(t2,1)}°</div>
                      <div style="font-size:11px; color:var(--secondary-text-color); margin-top:2px;">Cab</div>
                    </div>
                    <div style="width:1px; height:36px; background:var(--divider-color);"></div>
                    <div style="text-align:center;">
                      <div style="font-variant-numeric:tabular-nums; font-size:28px; font-weight:700; letter-spacing:-0.025em;">${fmt(t4,1)}°</div>
                      <div style="font-size:11px; color:var(--secondary-text-color); margin-top:2px;">Outside</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px 20px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 2

          # ── PID Thermostat ──
          - type: custom:better-thermostat-ui-card
            entity: climate.a32_pro_van_hydronic_heating_pid
            grid_options:
              columns: full
              rows: auto

          # ── Climate controls — ring-style toggles ──
          - type: custom:button-card
            entity: light.a32_pro_a32_pro_dac_0
            name: Blower
            icon: mdi:fan
            show_state: true
            state_display: |
              [[[
                if (entity.state === 'on') return Math.round((entity.attributes.brightness / 255) * 100) + '%';
                return 'Off';
              ]]]
            tap_action:
              action: more-info
            state:
              - value: 'on'
                styles:
                  card:
                    - background: rgba(59, 130, 246, 0.05)
                    - border: 1.5px solid rgba(59, 130, 246, 0.4)
                    - box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08), 0 1px 2px 0 rgba(0,0,0,0.05)
                  icon:
                    - color: '#3b82f6'
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
                - transition: all 0.15s ease
              icon:
                - width: 22px
              name:
                - font-size: 12px
                - font-weight: 500
                - color: var(--primary-text-color)
              state:
                - font-size: 11px
                - color: var(--secondary-text-color)
            grid_options:
              columns: 4
              rows: 2

          - type: custom:button-card
            entity: switch.a32_pro_switch24_hydronic_heater
            name: Heater
            icon: mdi:radiator
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  card:
                    - background: rgba(249, 115, 22, 0.05)
                    - border: 1.5px solid rgba(249, 115, 22, 0.4)
                    - box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.08), 0 1px 2px 0 rgba(0,0,0,0.05)
                  icon:
                    - color: '#f97316'
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
                - transition: all 0.15s ease
              icon:
                - width: 22px
              name:
                - font-size: 12px
                - font-weight: 500
                - color: var(--primary-text-color)
            grid_options:
              columns: 4
              rows: 2

          - type: custom:button-card
            entity: input_boolean.hot_water_mode
            name: Hot Water
            icon: mdi:water-boiler
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  card:
                    - background: rgba(6, 182, 212, 0.05)
                    - border: 1.5px solid rgba(6, 182, 212, 0.4)
                    - box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.08), 0 1px 2px 0 rgba(0,0,0,0.05)
                  icon:
                    - color: '#06b6d4'
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
                - transition: all 0.15s ease
              icon:
                - width: 22px
              name:
                - font-size: 12px
                - font-weight: 500
                - color: var(--primary-text-color)
            grid_options:
              columns: 4
              rows: 2

          # ── Heating details ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var coolant = states['sensor.a32_pro_s5140_channel_34_temperature_blower_coolant'];
                var blowerAir = states['sensor.a32_pro_s5140_channel_35_temperature_blower_air'];
                var heater = states['switch.a32_pro_switch24_hydronic_heater'];
                var hotWater = states['input_boolean.hot_water_mode'];
                var climate = states['climate.a32_pro_van_hydronic_heating_pid'];
                var coolVal = coolant ? parseFloat(coolant.state).toFixed(1) : '—';
                var blowerVal = blowerAir ? parseFloat(blowerAir.state).toFixed(1) : '—';
                var heaterOn = heater && heater.state === 'on';
                var hwMode = hotWater && hotWater.state === 'on';
                var climateOn = climate && climate.state !== 'off';
                var modeText = '', modeColor = 'var(--secondary-text-color)';
                if (heaterOn && climateOn && hwMode) { modeText='Heating air + water'; modeColor='#f97316'; }
                else if (heaterOn && hwMode && !climateOn) { modeText='Hot water only'; modeColor='#06b6d4'; }
                else if (heaterOn && climateOn) { modeText='Heating air (+ water passthrough)'; modeColor='#f97316'; }
                else if (heaterOn) { modeText='Heater on (manual)'; modeColor='#f97316'; }
                var temps = `<div style="display:flex; gap:24px; justify-content:center; align-items:center;">
                  <div style="display:flex; align-items:center; gap:6px;">
                    <ha-icon icon="mdi:coolant-temperature" style="--mdc-icon-size:16px; color:#3b82f6;"></ha-icon>
                    <span style="font-size:12px; font-variant-numeric:tabular-nums;">Coolant ${coolVal}°C</span>
                  </div>
                  <div style="display:flex; align-items:center; gap:6px;">
                    <ha-icon icon="mdi:air-filter" style="--mdc-icon-size:16px; color:#f59e0b;"></ha-icon>
                    <span style="font-size:12px; font-variant-numeric:tabular-nums;">Blower Air ${blowerVal}°C</span>
                  </div>
                </div>`;
                if (modeText) {
                  temps += `<div style="display:flex; align-items:center; gap:6px; justify-content:center; margin-top:8px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:${modeColor};"></div>
                    <span style="font-size:12px; font-weight:500; color:${modeColor};">${modeText}</span>
                  </div>`;
                }
                return temps;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px 16px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
              label:
                - font-size: 12px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Heater status (hides when idle) ──
          - type: custom:button-card
            entity: sensor.a32_pro_hydronic_heater_status
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var status = entity ? entity.state : 'Unknown';
                if (status === 'Idle.' || status === 'unavailable' || status === 'unknown') return '';
                var color = 'var(--secondary-text-color)';
                if (status.includes('Low fuel lockout')) color = '#ef4444';
                else if (status.includes('Retrying') || status.includes('Cooldown')) color = '#f59e0b';
                else if (status.includes('failed')) color = '#ef4444';
                else if (status.includes('warming') || status.includes('running')) color = '#22c55e';
                else if (status.includes('Waiting')) color = '#3b82f6';
                return `<div style="display:flex; align-items:center; gap:8px; justify-content:center;">
                  <div style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0;"></div>
                  <span style="font-size:12px; font-weight:500; color:${color};">${status}</span>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 10px 16px
                - box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)
                - display: |
                    [[[
                      var s = entity ? entity.state : '';
                      return (s==='Idle.'||s==='unavailable'||s==='unknown'||s==='') ? 'none' : 'block';
                    ]]]
              label:
                - font-size: 12px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Low fuel lockout override (conditional) ──
          - type: custom:button-card
            entity: input_boolean.heater_low_fuel_lockout
            name: Override Fuel Lockout
            icon: mdi:shield-off-outline
            show_state: false
            tap_action:
              action: call-service
              service: input_boolean.turn_off
              service_data:
                entity_id: input_boolean.heater_low_fuel_lockout
              confirmation:
                text: "Override fuel lockout and allow heater to start?"
            styles:
              card:
                - background: rgba(239, 68, 68, 0.04)
                - border: 1.5px solid rgba(239, 68, 68, 0.4)
                - border-radius: 12px
                - padding: 10px 16px
                - box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.08)
                - display: |
                    [[[
                      return entity.state === 'on' ? 'block' : 'none';
                    ]]]
              icon:
                - color: '#ef4444'
                - width: 20px
              name:
                - font-size: 12px
                - font-weight: 600
                - color: '#ef4444'
            grid_options:
              columns: full
              rows: 1

          # ── Scheduler ──
          - type: custom:scheduler-card
            include:
              - climate.a32_pro_van_hydronic_heating_pid
            grid_options:
              columns: full
              rows: auto

      # ═══════════════════════════════════════════
      #  COLUMN 2 — Power & Energy
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Battery hero ──
          - type: custom:button-card
            entity: sensor.olins_van_bms_battery
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                function s(id){ var v=states[id]; if(!v||v.state==='unknown'||v.state==='unavailable') return NaN; return Number(v.state); }
                function fmt(n,d){ return isNaN(n)?'—':n.toFixed(d); }
                var soc=s('sensor.olins_van_bms_battery'), current=s('sensor.olins_van_bms_current'),
                    voltage=s('sensor.olins_van_bms_voltage'), power=s('sensor.olins_van_bms_power'),
                    stored=s('sensor.olins_van_bms_stored_energy'), temp=s('sensor.olins_van_bms_temperature');
                var socNum=isNaN(soc)?0:soc;
                var socColor=socNum<30?'#ef4444':socNum<65?'#f59e0b':'#22c55e';
                var status=(current>0.5)?'Charging':(current<-0.5)?'Discharging':'Idle';
                var statusColor=(current>0.5)?'#22c55e':(current<-0.5)?'#f59e0b':'var(--secondary-text-color)';
                var timeStr='';
                if(current>0.5&&!isNaN(power)&&!isNaN(stored)){
                  var h=Math.abs(power)>0?(8700-stored)/Math.abs(power):NaN;
                  if(!isNaN(h)&&h<48){timeStr=Math.floor(h)+'h '+Math.round((h-Math.floor(h))*60)+'m to full';}
                }else if(current<-0.5&&!isNaN(power)&&!isNaN(stored)){
                  var h=Math.abs(power)>0?stored/Math.abs(power):NaN;
                  if(!isNaN(h)&&h<48){timeStr=Math.floor(h)+'h '+Math.round((h-Math.floor(h))*60)+'m left';}
                }
                return `<div style="padding:2px 0;">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:16px;">
                    <div style="width:6px;height:6px;border-radius:50%;background:${socColor};flex-shrink:0;"></div>
                    <span style="font-size:13px; font-weight:600; color:var(--primary-text-color);">Battery</span>
                    <span style="font-size:12px; color:var(--secondary-text-color);">24V LiFePO₄</span>
                  </div>
                  <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:8px;">
                    <span style="font-variant-numeric:tabular-nums; font-size:36px; font-weight:700; letter-spacing:-0.025em; line-height:1; color:${socColor};">${isNaN(soc)?'—':Math.round(soc)+'%'}</span>
                    <span style="font-size:13px; font-weight:500; color:${statusColor};">${status}</span>
                  </div>
                  <div style="width:100%; height:8px; background:var(--divider-color); border-radius:4px; margin-bottom:14px; overflow:hidden;">
                    <div style="width:${isNaN(soc)?0:soc}%; height:100%; background:linear-gradient(90deg, ${socColor}, ${socColor}dd); border-radius:4px; transition:width 1s ease;"></div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Voltage</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(voltage,1)}V</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Current</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(current,1)}A</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Power</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(power)?'—':Math.abs(power).toFixed(0)+'W'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Stored</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${isNaN(stored)?'—':(stored/1000).toFixed(1)+' kWh'}</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Temp</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${fmt(temp,1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:11px; font-weight:500; color:var(--secondary-text-color);">Estimate</div>
                      <div style="font-variant-numeric:tabular-nums; font-size:16px; font-weight:600; margin-top:2px;">${timeStr||'—'}</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 20px
