title: Home
views:
  - title: Home
    path: home
    icon: mdi:home

    # ─────────────────────────────────────────────
    #  BADGE BAR — 8 essential at-a-glance indicators
    # ─────────────────────────────────────────────
    badges:
      # ── Battery SOC ──
      - type: custom:mushroom-template-badge
        entity: sensor.olins_van_bms_battery
        icon: |
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {% set level = (batt / 10) | round(0, 'floor') * 10 %}
          {% if level < 10 %}{% set level = 10 %}{% endif %}
          {{ 'mdi:battery' if level >= 100 else 'mdi:battery-' ~ level }}
        content: >
          {{ states('sensor.olins_van_bms_battery') }}% · {{ states('sensor.olins_van_bms_current') }}A
        color: >
          {% set batt = states('sensor.olins_van_bms_battery') | float(0) %}
          {{ 'red' if batt < 30 else 'orange' if batt < 65 else 'green' }}
        label: Battery
        tap_action:
          action: more-info
          entity: sensor.olins_van_bms_battery

      # ── Solar ──
      - type: custom:mushroom-template-badge
        entity: sensor.total_mppt_pv_power
        icon: mdi:solar-power-variant
        content: "{{ states('sensor.total_mppt_pv_power') }}W"
        color: >
          {{ 'green' if states('sensor.total_mppt_pv_power') | float(0) > 50 else 'grey' }}
        label: Solar
        tap_action:
          action: more-info

      # ── Fresh Water ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_fresh_water_tank_level
        icon: >
          {{ 'mdi:water-off' if states('sensor.a32_pro_fresh_water_tank_level') | float(0) < 20 else 'mdi:water' }}
        content: "{{ states('sensor.a32_pro_fresh_water_tank_level') }}%"
        color: >
          {% set v = states('sensor.a32_pro_fresh_water_tank_level') | float(0) %}
          {{ 'red' if v < 20 else 'orange' if v < 50 else 'green' }}
        label: Fresh
        tap_action:
          action: more-info

      # ── Grey Water ──
      - type: custom:mushroom-template-badge
        entity: sensor.a32_pro_grey_water_tank_level
        icon: mdi:water-opacity
        content: "{{ states('sensor.a32_pro_grey_water_tank_level') }}%"
        color: >
          {% set v = states('sensor.a32_pro_grey_water_tank_level') | float(0) %}
          {{ 'red' if v > 80 else 'orange' if v > 60 else 'green' }}
        label: Grey
        tap_action:
          action: more-info

      # ── Fuel ──
      - type: custom:mushroom-template-badge
        entity: sensor.stable_fuel_level
        icon: mdi:gas-station
        content: "{{ states('sensor.stable_fuel_level') }}%"
        color: >
          {% set v = states('sensor.stable_fuel_level') | float(0) %}
          {{ 'red' if v < 15 else 'orange' if v < 30 else 'green' }}
        label: Fuel
        tap_action:
          action: more-info

      # ── Propane ──
      - type: custom:mushroom-template-badge
        entity: sensor.propane_tank_percentage
        icon: mdi:propane-tank
        content: "{{ states('sensor.propane_tank_percentage') | round(0) }}%"
        color: >
          {% set v = states('sensor.propane_tank_percentage') | float(0) %}
          {{ 'red' if v < 15 else 'orange' if v < 30 else 'green' }}
        label: Propane
        tap_action:
          action: more-info

      # ── Inverter ──
      - type: custom:mushroom-template-badge
        entity: binary_sensor.shelly_em_reachable
        icon: >
          {{ 'mdi:power-plug' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'mdi:power-plug-off' }}
        content: >
          {{ 'ON' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'OFF' }}
        color: >
          {{ 'green' if is_state('binary_sensor.shelly_em_reachable', 'on') else 'grey' }}
        label: Inverter
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.a32_pro_inverter_on_off_toggle

      # ── Lights quick toggle ──
      - type: custom:mushroom-template-badge
        entity: light.led_controller_cct_1
        icon: >
          {{ 'mdi:lightbulb-group' if is_state('light.led_controller_cct_1', 'on') or is_state('light.led_controller_cct_2', 'on') else 'mdi:lightbulb-group-off' }}
        content: >
          {{ 'ON' if is_state('light.led_controller_cct_1', 'on') or is_state('light.led_controller_cct_2', 'on') else 'OFF' }}
        color: >
          {{ 'amber' if is_state('light.led_controller_cct_1', 'on') or is_state('light.led_controller_cct_2', 'on') else 'grey' }}
        label: Lights
        tap_action:
          action: call-service
          service: light.toggle
          target:
            entity_id:
              - light.led_controller_cct_1
              - light.led_controller_cct_2
              - light.led_controller_sc_1
              - light.led_controller_sc_2

    # ─────────────────────────────────────────────
    #  SECTIONS
    # ─────────────────────────────────────────────
    sections:

      # ═══════════════════════════════════════════
      #  SECTION 1: Climate & Heating
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Temperature overview ──
          - type: custom:button-card
            show_state: false
            show_icon: false
            show_name: false
            show_label: true
            label: |
              [[[
                var t1 = parseFloat(states['sensor.a32_pro_bme280_1_temperature'].state);
                var t2 = parseFloat(states['sensor.a32_pro_bme280_2_temperature'].state);
                var t4 = parseFloat(states['sensor.a32_pro_bme280_4_temperature'].state);
                var h1 = parseFloat(states['sensor.a32_pro_bme280_1_relative_humidity'].state);

                return `<div style="display:flex; gap:24px; justify-content:center; align-items:center; padding:2px 0;">
                  <div style="text-align:center;">
                    <div style="font-size:26px; font-weight:600; letter-spacing:-0.5px; color:var(--primary-text-color);">${t1.toFixed(1)}°</div>
                    <div style="font-size:11px; color:var(--secondary-text-color); margin-top:1px;">Inside · ${h1.toFixed(0)}%</div>
                  </div>
                  <div style="width:1px; height:32px; background:var(--divider-color);"></div>
                  <div style="text-align:center;">
                    <div style="font-size:26px; font-weight:600; letter-spacing:-0.5px; color:var(--primary-text-color);">${t2.toFixed(1)}°</div>
                    <div style="font-size:11px; color:var(--secondary-text-color); margin-top:1px;">Cab</div>
                  </div>
                  <div style="width:1px; height:32px; background:var(--divider-color);"></div>
                  <div style="text-align:center;">
                    <div style="font-size:26px; font-weight:600; letter-spacing:-0.5px; color:var(--primary-text-color);">${t4.toFixed(1)}°</div>
                    <div style="font-size:11px; color:var(--secondary-text-color); margin-top:1px;">Outside</div>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 8px 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 2

          # ── Thermostat ──
          - type: custom:better-thermostat-ui-card
            entity: climate.a32_pro_van_hydronic_heating_pid
            grid_options:
              columns: full
              rows: auto

          # ── Climate controls row (2-up) ──
          - type: custom:button-card
            entity: light.a32_pro_a32_pro_dac_0
            name: Blower Fan
            icon: mdi:fan
            show_state: true
            state_display: |
              [[[
                if (entity.state === 'on') {
                  return Math.round((entity.attributes.brightness / 255) * 100) + '%';
                }
                return 'Off';
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              icon:
                - color: |
                    [[[
                      return entity.state === 'on' ? 'var(--info-color)' : 'var(--disabled-text-color)';
                    ]]]
                - width: 24px
              name:
                - font-size: 13px
                - font-weight: 500
                - color: var(--primary-text-color)
              state:
                - font-size: 12px
                - color: var(--secondary-text-color)
            grid_options:
              columns: 6
              rows: 2

          - type: custom:button-card
            entity: switch.a32_pro_switch24_hydronic_heater
            name: Heater
            icon: mdi:radiator
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  icon:
                    - color: var(--warning-color)
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              icon:
                - width: 24px
              name:
                - font-size: 13px
                - font-weight: 500
                - color: var(--primary-text-color)
            grid_options:
              columns: 6
              rows: 2

          # ── Heating details (compact inline card) ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var coolant = states['sensor.a32_pro_s5140_channel_34_temperature_blower_coolant'];
                var blowerAir = states['sensor.a32_pro_s5140_channel_35_temperature_blower_air'];

                var coolVal = coolant ? parseFloat(coolant.state).toFixed(1) : '—';
                var blowerVal = blowerAir ? parseFloat(blowerAir.state).toFixed(1) : '—';

                return `<div style="display:flex; gap:24px; justify-content:center; align-items:center;">
                  <div style="display:flex; align-items:center; gap:6px;">
                    <ha-icon icon="mdi:coolant-temperature" style="--mdc-icon-size:16px; color:var(--info-color);"></ha-icon>
                    <span style="font-size:12px;">Coolant ${coolVal}°C</span>
                  </div>
                  <div style="display:flex; align-items:center; gap:6px;">
                    <ha-icon icon="mdi:air-filter" style="--mdc-icon-size:16px; color:var(--info-color);"></ha-icon>
                    <span style="font-size:12px;">Blower Air ${blowerVal}°C</span>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 10px 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 12px
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Scheduler ──
          - type: custom:scheduler-card
            include:
              - climate.a32_pro_van_hydronic_heating_pid
            grid_options:
              columns: full
              rows: auto

      # ═══════════════════════════════════════════
      #  SECTION 2: Battery & Power
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          # ── Battery status hero card ──
          - type: custom:button-card
            entity: sensor.olins_van_bms_battery
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var soc = parseFloat(states['sensor.olins_van_bms_battery'].state);
                var current = parseFloat(states['sensor.olins_van_bms_current'].state);
                var voltage = parseFloat(states['sensor.olins_van_bms_voltage'].state);
                var power = parseFloat(states['sensor.olins_van_bms_power'].state);
                var stored = parseFloat(states['sensor.olins_van_bms_stored_energy'].state);
                var temp = parseFloat(states['sensor.olins_van_bms_temperature'].state);

                var socColor = soc < 30 ? 'var(--error-color)' : soc < 65 ? 'var(--warning-color)' : 'var(--success-color)';
                var status = current > 0.5 ? 'Charging' : current < -0.5 ? 'Discharging' : 'Idle';
                var statusColor = current > 0.5 ? 'var(--success-color)' : current < -0.5 ? 'var(--warning-color)' : 'var(--secondary-text-color)';

                // Time estimate
                var timeStr = '';
                if (current > 0.5) {
                  var whRemaining = 8700 - stored;
                  var hours = whRemaining / Math.abs(power);
                  if (hours < 48) {
                    var h = Math.floor(hours);
                    var m = Math.round((hours - h) * 60);
                    timeStr = h + 'h ' + m + 'm to full';
                  }
                } else if (current < -0.5) {
                  var hours = stored / Math.abs(power);
                  if (hours < 48) {
                    var h = Math.floor(hours);
                    var m = Math.round((hours - h) * 60);
                    timeStr = h + 'h ' + m + 'm remaining';
                  }
                }

                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:8px;">
                    <span style="font-size:36px; font-weight:700; letter-spacing:-1px; color:${socColor};">${soc}%</span>
                    <span style="font-size:13px; font-weight:500; color:${statusColor};">${status}</span>
                  </div>
                  <div style="width:100%; height:6px; background:var(--divider-color); border-radius:3px; margin-bottom:12px; overflow:hidden;">
                    <div style="width:${soc}%; height:100%; background:${socColor}; border-radius:3px; transition:width 1s ease;"></div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Voltage</div>
                      <div style="font-size:15px; font-weight:600;">${voltage.toFixed(1)}V</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Current</div>
                      <div style="font-size:15px; font-weight:600;">${current.toFixed(1)}A</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Power</div>
                      <div style="font-size:15px; font-weight:600;">${Math.abs(power).toFixed(0)}W</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Stored</div>
                      <div style="font-size:15px; font-weight:600;">${(stored/1000).toFixed(1)} kWh</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Temp</div>
                      <div style="font-size:15px; font-weight:600;">${temp.toFixed(1)}°C</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Estimate</div>
                      <div style="font-size:15px; font-weight:600;">${timeStr || '—'}</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Solar status card ──
          - type: custom:button-card
            entity: sensor.total_mppt_pv_power
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var pv = parseFloat(states['sensor.total_mppt_pv_power'].state) || 0;
                var yield1 = parseFloat(states['sensor.a32_pro_mppt1_yield_today'].state) || 0;
                var yield2 = parseFloat(states['sensor.a32_pro_mppt2_yield_today'].state) || 0;
                var totalYield = ((yield1 + yield2) * 1000).toFixed(0);
                var pv1 = parseFloat(states['sensor.a32_pro_mppt1_pv_power'].state) || 0;
                var pv2 = parseFloat(states['sensor.a32_pro_mppt2_pv_power'].state) || 0;
                var pvColor = pv > 50 ? 'var(--success-color)' : 'var(--secondary-text-color)';

                return `<div style="padding:4px 0;">
                  <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <ha-icon icon="mdi:solar-power-variant" style="--mdc-icon-size:22px; color:${pvColor};"></ha-icon>
                    <div>
                      <div style="font-size:22px; font-weight:700; letter-spacing:-0.5px;">${pv}W</div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Solar Production</div>
                    </div>
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">MPPT 1</div>
                      <div style="font-size:14px; font-weight:600;">${pv1}W</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">MPPT 2</div>
                      <div style="font-size:14px; font-weight:600;">${pv2}W</div>
                    </div>
                    <div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Today</div>
                      <div style="font-size:14px; font-weight:600;">${totalYield} Wh</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Quick toggles row ──
          - type: custom:button-card
            entity: input_boolean.shore_power_charger_enabled
            name: Auto Shore Charger
            icon: mdi:ev-plug-type1
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  icon:
                    - color: var(--success-color)
                  card:
                    - border-color: var(--success-color)
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              icon:
                - width: 24px
              name:
                - font-size: 12px
                - font-weight: 500
                - color: var(--primary-text-color)
            grid_options:
              columns: 6
              rows: 1

          - type: custom:button-card
            entity: switch.a32_pro_switch06_grey_water_tank_valve
            name: Grey Valve
            icon: mdi:valve
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  icon:
                    - color: var(--info-color)
                  card:
                    - border-color: var(--info-color)
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              icon:
                - width: 24px
              name:
                - font-size: 12px
                - font-weight: 500
                - color: var(--primary-text-color)
            grid_options:
              columns: 6
              rows: 1

          # ── (Power flow moved to Power & Energy page) ──

      # ═══════════════════════════════════════════
      #  SECTION 3: Status, Weather & Controls
      # ═══════════════════════════════════════════
      - type: grid
        column_span: 2
        cards:
          # ── Mode toggles (fixed height row) ──
          - type: custom:button-card
            entity: input_boolean.power_saving_mode
            name: Power Saving
            icon: mdi:battery-heart-variant
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--success-color)
                    - border-color: var(--success-color)
                  icon:
                    - color: white
                  name:
                    - color: white
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 0
                - height: 68px
                - display: flex
                - flex-direction: column
                - align-items: center
                - justify-content: center
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
                - transition: all 0.2s ease
              icon:
                - width: 24px
                - margin-bottom: 4px
              name:
                - font-size: 12px
                - font-weight: 500
            grid_options:
              columns: 4
              rows: 1

          - type: custom:button-card
            entity: input_boolean.sleep_mode
            name: Sleep
            icon: mdi:sleep
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--info-color)
                    - border-color: var(--info-color)
                  icon:
                    - color: white
                  name:
                    - color: white
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 0
                - height: 68px
                - display: flex
                - flex-direction: column
                - align-items: center
                - justify-content: center
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
                - transition: all 0.2s ease
              icon:
                - width: 24px
                - margin-bottom: 4px
              name:
                - font-size: 12px
                - font-weight: 500
            grid_options:
              columns: 4
              rows: 1

          - type: custom:button-card
            entity: input_boolean.shower_mode
            name: Shower
            icon: mdi:shower-head
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--info-color)
                    - border-color: var(--info-color)
                  icon:
                    - color: white
                  name:
                    - color: white
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 0
                - height: 68px
                - display: flex
                - flex-direction: column
                - align-items: center
                - justify-content: center
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
                - transition: all 0.2s ease
              icon:
                - width: 24px
                - margin-bottom: 4px
              name:
                - font-size: 12px
                - font-weight: 500
            grid_options:
              columns: 4
              rows: 1

          # ── Presence & connectivity status (matching height) ──
          - type: custom:button-card
            entity: device_tracker.olin_andersons_iphone_16_pro_max
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var tracker = states['device_tracker.olin_andersons_iphone_16_pro_max'];
                var isHome = tracker.state === 'home';
                var dur = (Date.now() / 1000) - Date.parse(tracker.last_changed) / 1000;
                var m = Math.floor(dur / 60);
                var d = Math.floor(m / 1440);
                var h = Math.floor((m % 1440) / 60);
                var mm = m % 60;
                var timeStr = (d > 0 ? d + 'd ' : '') + (h > 0 ? h + 'h ' : '') + mm + 'm';

                var starlink = states['binary_sensor.starlink_ethernet_speeds'];
                var slOk = starlink && starlink.state === 'off';
                var radar = states['binary_sensor.apollo_msr_2_1731d8_radar_target'];
                var occupied = radar && radar.state === 'on';

                return `<div style="display:flex; gap:16px; align-items:center; justify-content:center; height:100%;">
                  <div style="display:flex; align-items:center; gap:5px;">
                    <ha-icon icon="${isHome ? 'mdi:home-account' : 'mdi:home-outline'}" style="--mdc-icon-size:18px; color:${isHome ? 'var(--success-color)' : 'var(--warning-color)'};"></ha-icon>
                    <span style="font-size:13px; font-weight:500;">${isHome ? 'Home' : 'Away'} ${timeStr}</span>
                  </div>
                  <div style="width:1px; height:18px; background:var(--divider-color);"></div>
                  <div style="display:flex; align-items:center; gap:5px;">
                    <ha-icon icon="mdi:motion-sensor" style="--mdc-icon-size:18px; color:${occupied ? 'var(--success-color)' : 'var(--secondary-text-color)'};"></ha-icon>
                    <span style="font-size:13px;">${occupied ? 'Occupied' : 'Empty'}</span>
                  </div>
                  <div style="width:1px; height:18px; background:var(--divider-color);"></div>
                  <div style="display:flex; align-items:center; gap:5px;">
                    <ha-icon icon="mdi:satellite-variant" style="--mdc-icon-size:18px; color:${slOk ? 'var(--success-color)' : 'var(--error-color)'};"></ha-icon>
                    <span style="font-size:13px;">Starlink</span>
                  </div>
                </div>`;
              ]]]
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 0 16px
                - height: 68px
                - display: flex
                - align-items: center
                - justify-content: center
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 13px
                - color: var(--primary-text-color)
                - width: 100%
            grid_options:
              columns: 9
              rows: 1

          # ── Speedtest badge (matching height) ──
          - type: custom:button-card
            entity: input_boolean.speedtest_running
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var running = entity.state === 'on';
                var dl = states['sensor.speedtest_download'] ? states['sensor.speedtest_download'].state : '—';
                var ul = states['sensor.speedtest_upload'] ? states['sensor.speedtest_upload'].state : '—';

                if (running) {
                  return `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                    <ha-icon icon="mdi:progress-clock" style="--mdc-icon-size:20px; color:var(--warning-color); margin-bottom:4px;"></ha-icon>
                    <span style="font-size:11px;">Testing…</span>
                  </div>`;
                }
                return `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                  <span style="font-size:13px; font-weight:600; letter-spacing:-0.3px;">↓${dl}</span>
                  <span style="font-size:13px; font-weight:600; letter-spacing:-0.3px;">↑${ul}</span>
                </div>`;
              ]]]
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.update_speedtest
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 0
                - height: 68px
                - display: flex
                - align-items: center
                - justify-content: center
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 13px
                - color: var(--primary-text-color)
                - width: 100%
            grid_options:
              columns: 3
              rows: 1

          # ── Location & Weather ──
          - type: custom:button-card
            entity: weather.pirateweather
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var w = states['weather.pirateweather'];
                if (!w || w.state === 'unavailable') return 'Weather unavailable';

                var a = w.attributes || {};
                var temp = parseFloat(a.temperature);
                var feelsLike = a.apparent_temperature != null ? parseFloat(a.apparent_temperature) : null;
                var humidity = a.humidity;
                var windSpd = a.wind_speed ? (parseFloat(a.wind_speed) * 1.60934).toFixed(0) : '—';
                var windBearing = a.wind_bearing != null ? parseFloat(a.wind_bearing) : null;
                var pressure = a.pressure ? parseFloat(a.pressure).toFixed(0) : null;
                var cond = w.state;

                // Wind direction from bearing
                var windDir = '';
                if (windBearing !== null) {
                  var dirs = ['N','NE','E','SE','S','SW','W','NW'];
                  windDir = dirs[Math.round(windBearing / 45) % 8] + ' ';
                }

                // Condition display name
                var condNames = {
                  'clear-night':'Clear','cloudy':'Cloudy','fog':'Foggy','hail':'Hail',
                  'lightning':'Lightning','lightning-rainy':'Thunderstorm',
                  'partlycloudy':'Partly Cloudy','pouring':'Heavy Rain','rainy':'Rain',
                  'snowy':'Snow','snowy-rainy':'Sleet','sunny':'Sunny',
                  'windy':'Windy','windy-variant':'Windy','exceptional':'Severe'
                };
                var condName = condNames[cond] || cond;

                // Weather icon
                var iconMap = {
                  'clear-night':'mdi:weather-night','cloudy':'mdi:weather-cloudy',
                  'fog':'mdi:weather-fog','hail':'mdi:weather-hail',
                  'lightning':'mdi:weather-lightning','lightning-rainy':'mdi:weather-lightning-rainy',
                  'partlycloudy':'mdi:weather-partly-cloudy','pouring':'mdi:weather-pouring',
                  'rainy':'mdi:weather-rainy','snowy':'mdi:weather-snowy',
                  'snowy-rainy':'mdi:weather-snowy-rainy','sunny':'mdi:weather-sunny',
                  'windy':'mdi:weather-windy','windy-variant':'mdi:weather-windy-variant',
                  'exceptional':'mdi:weather-hurricane'
                };
                var icon = iconMap[cond] || 'mdi:weather-cloudy';

                // Natural language summary
                var tempWord = temp <= -10 ? 'frigid' : temp <= 0 ? 'freezing' : temp <= 8 ? 'cold' : temp <= 15 ? 'cool' : temp <= 22 ? 'mild' : temp <= 28 ? 'warm' : 'hot';
                var summary = condName + ' and ' + tempWord;

                // Location
                var geo = states['sensor.olin_andersons_iphone_geocoded_location'];
                var loc = '';
                if (geo && geo.state && geo.state !== 'unknown' && geo.state !== 'unavailable') {
                  var ga = geo.attributes || {};
                  var city = ga['Locality'] || ga['locality'] || '';
                  var region = ga['AdministrativeArea'] || ga['administrative_area'] || '';
                  loc = city && region ? city + ', ' + region : city || region || geo.state;
                }
                if (!loc) loc = 'Location unavailable';

                // Last updated
                var lastChanged = new Date(w.last_updated || w.last_changed);
                var now = new Date();
                var diffMin = Math.round((now - lastChanged) / 60000);
                var updatedStr = diffMin < 1 ? 'just now' : diffMin < 60 ? diffMin + ' min ago' : Math.floor(diffMin/60) + 'h ' + (diffMin%60) + 'm ago';

                // Feels like string
                var feelsStr = feelsLike !== null ? 'Feels like ' + feelsLike.toFixed(0) + '°' : '';

                return `<div style="padding:2px 0;">
                  <div style="display:flex; align-items:center; gap:5px; margin-bottom:10px;">
                    <ha-icon icon="mdi:map-marker" style="--mdc-icon-size:15px; color:var(--primary-text-color);"></ha-icon>
                    <span style="font-size:15px; font-weight:600; color:var(--primary-text-color);">${loc}</span>
                  </div>

                  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
                    <div style="display:flex; align-items:center; gap:12px;">
                      <ha-icon icon="${icon}" style="--mdc-icon-size:48px; color:var(--info-color); opacity:0.7;"></ha-icon>
                      <div>
                        <div style="font-size:38px; font-weight:700; letter-spacing:-2px; line-height:1;">${temp.toFixed(0)}°<span style="font-size:16px; font-weight:400; letter-spacing:0; color:var(--secondary-text-color);">C</span></div>
                        ${feelsStr ? '<div style="font-size:12px; color:var(--secondary-text-color); margin-top:2px;">' + feelsStr + '</div>' : ''}
                      </div>
                    </div>
                  </div>

                  <div style="font-size:14px; font-weight:500; color:var(--primary-text-color); margin:8px 0 10px 0;">${summary}</div>

                  <div style="display:flex; gap:16px; flex-wrap:wrap;">
                    <div style="display:flex; align-items:center; gap:4px;">
                      <ha-icon icon="mdi:water-percent" style="--mdc-icon-size:15px; color:var(--secondary-text-color);"></ha-icon>
                      <span style="font-size:12px; color:var(--secondary-text-color);">${humidity}%</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px;">
                      <ha-icon icon="mdi:weather-windy" style="--mdc-icon-size:15px; color:var(--secondary-text-color);"></ha-icon>
                      <span style="font-size:12px; color:var(--secondary-text-color);">${windDir}${windSpd} km/h</span>
                    </div>
                    ${pressure ? '<div style="display:flex; align-items:center; gap:4px;"><ha-icon icon="mdi:gauge" style="--mdc-icon-size:15px; color:var(--secondary-text-color);"></ha-icon><span style="font-size:12px; color:var(--secondary-text-color);">' + pressure + ' hPa</span></div>' : ''}
                  </div>

                  <div style="font-size:11px; color:var(--disabled-text-color); margin-top:10px;">Updated ${updatedStr}</div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: auto

          # ── Weather daily forecast ──
          - type: custom:weather-chart-card
            entity: weather.pirateweather
            show_main: false
            show_temperature: true
            show_current_condition: false
            show_attributes: false
            show_time: true
            show_time_seconds: false
            show_day: true
            show_date: true
            show_humidity: true
            show_pressure: false
            show_wind_direction: true
            show_wind_speed: true
            show_sun: true
            show_feels_like: false
            show_dew_point: false
            show_wind_gust_speed: false
            show_visibility: false
            show_last_changed: false
            use_12hour_format: false
            icons_size: 25
            animated_icons: true
            icon_style: style1
            forecast:
              precipitation_type: rainfall
              show_probability: false
              labels_font_size: '11'
              precip_bar_size: '100'
              style: style2
              show_wind_forecast: true
              condition_icons: true
              round_temp: false
              type: daily
              number_of_forecasts: '0'
              disable_animation: false
            units:
              speed: km/h
              pressure: hPa
            grid_options:
              columns: full
              rows: auto

          # ── Weather hourly forecast ──
          - type: custom:weather-chart-card
            entity: weather.pirateweather
            show_main: false
            show_temperature: true
            show_current_condition: false
            show_attributes: false
            show_time: false
            show_day: true
            show_date: true
            show_humidity: false
            show_pressure: false
            show_wind_direction: true
            show_wind_speed: true
            show_sun: true
            show_feels_like: false
            show_dew_point: false
            show_wind_gust_speed: false
            show_visibility: false
            show_last_changed: false
            use_12hour_format: false
            icons_size: 25
            animated_icons: true
            icon_style: style1
            forecast:
              precipitation_type: rainfall
              show_probability: false
              labels_font_size: '11'
              precip_bar_size: '100'
              style: style2
              show_wind_forecast: true
              condition_icons: true
              round_temp: false
              type: hourly
              number_of_forecasts: '0'
              disable_animation: false
            units:
              speed: km/h
              pressure: hPa
            grid_options:
              columns: full
              rows: auto

          # ── Lighting section header ──
          - type: custom:button-card
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                return '<div style="font-size:13px; font-weight:600; margin-bottom:2px;">Lighting</div>';
              ]]]
            styles:
              card:
                - background: none
                - border: none
                - box-shadow: none
                - padding: 8px 4px 0 4px
              label:
                - color: var(--primary-text-color)
            grid_options:
              columns: full
              rows: 1

          # ── Light controls ──
          - type: custom:mushroom-light-card
            entity: light.led_controller_cct_1
            name: Main
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true
            grid_options:
              columns: 6
              rows: 1

          - type: custom:mushroom-light-card
            entity: light.led_controller_cct_2
            name: Under Cabinet
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true
            grid_options:
              columns: 6
              rows: 1

          - type: custom:mushroom-light-card
            entity: light.led_controller_sc_1
            name: Shower
            show_brightness_control: true
            collapsible_controls: true
            grid_options:
              columns: 6
              rows: 1

          - type: custom:mushroom-light-card
            entity: light.led_controller_sc_2
            name: Accent
            show_brightness_control: true
            collapsible_controls: true
            grid_options:
              columns: 6
              rows: 1

          # ── Roof Fan ──
          - type: custom:button-card
            entity: fan.ag_pro_roof_fan
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var fan = states['fan.ag_pro_roof_fan'];
                var lid = states['cover.ag_pro_roof_fan_lid'];
                var isOn = fan && fan.state === 'on';
                var speed = isOn ? fan.attributes.percentage || 0 : 0;
                var dir = states['sensor.roof_fan_direction'] ? states['sensor.roof_fan_direction'].state : 'Unknown';
                var lidState = lid ? lid.state : 'unknown';

                return `<div style="display:flex; justify-content:space-between; align-items:center;">
                  <div style="display:flex; align-items:center; gap:10px;">
                    <ha-icon icon="mdi:fan" style="--mdc-icon-size:22px; color:${isOn ? 'var(--info-color)' : 'var(--disabled-text-color)'};"></ha-icon>
                    <div>
                      <div style="font-size:14px; font-weight:600;">Roof Fan</div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">${isOn ? speed + '% · ' + dir : 'Off'} · Lid ${lidState}</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: more-info
              entity: fan.ag_pro_roof_fan
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: 1

          # ── Water system ──
          - type: custom:button-card
            entity: switch.a32_pro_water_system_master_switch
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                var master = entity.state === 'on';
                var fresh = states['sensor.a32_pro_fresh_water_tank_level'] ? states['sensor.a32_pro_fresh_water_tank_level'].state : '—';
                var grey = states['sensor.a32_pro_grey_water_tank_level'] ? states['sensor.a32_pro_grey_water_tank_level'].state : '—';

                return `<div style="display:flex; justify-content:space-between; align-items:center;">
                  <div style="display:flex; align-items:center; gap:10px;">
                    <ha-icon icon="${master ? 'mdi:water' : 'mdi:water-off'}" style="--mdc-icon-size:22px; color:${master ? 'var(--info-color)' : 'var(--disabled-text-color)'};"></ha-icon>
                    <div>
                      <div style="font-size:14px; font-weight:600;">Water ${master ? 'On' : 'Off'}</div>
                      <div style="font-size:11px; color:var(--secondary-text-color);">Fresh ${fresh}% · Grey ${grey}%</div>
                    </div>
                  </div>
                </div>`;
              ]]]
            tap_action:
              action: toggle
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 14px 16px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              label:
                - font-size: 14px
                - color: var(--primary-text-color)
                - text-align: left
            grid_options:
              columns: full
              rows: 1

          # ── Monitors ──
          - type: custom:button-card
            entity: switch.a32_pro_do8_switch06_top_monitor
            name: Top Monitor
            icon: mdi:monitor
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  icon:
                    - color: var(--info-color)
                  card:
                    - border-color: var(--info-color)
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              icon:
                - width: 24px
              name:
                - font-size: 12px
                - font-weight: 500
            grid_options:
              columns: 6
              rows: 1

          - type: custom:button-card
            entity: switch.a32_pro_do8_switch07_bottom_monitor
            name: Bottom Monitor
            icon: mdi:monitor
            show_state: false
            tap_action:
              action: toggle
            state:
              - value: 'on'
                styles:
                  icon:
                    - color: var(--info-color)
                  card:
                    - border-color: var(--info-color)
              - value: 'off'
                styles:
                  icon:
                    - color: var(--disabled-text-color)
            styles:
              card:
                - background: var(--card-background-color)
                - border: 1px solid var(--divider-color)
                - border-radius: 12px
                - padding: 12px
                - box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)
              icon:
                - width: 24px
              name:
                - font-size: 12px
                - font-weight: 500
            grid_options:
              columns: 6
              rows: 1

    cards: []
