set_fan_mode:
  alias: "Set Fan Mode"
  sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.coolant_blower_mode

update_speedtest:
  alias: "Update Speedtest"
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.speedtest_running
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.speedtest_download
          - sensor.speedtest_upload
          - sensor.speedtest_ping
    # Wait a few seconds for the new values to come in (adjust delay as needed)
    - delay: "00:00:05"
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.speedtest_running

all_lights_toggle:
  alias: "Toggle All Lights Based on Mixed State"
  sequence:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('light.led_controller_cct_1')|default('off') == 'on' and states('light.led_controller_cct_2')|default('off') == 'on' and states('light.led_controller_sc_1')|default('off') == 'on' and states('light.led_controller_sc_2')|default('off') == 'on' }}
          sequence:
            - action: light.turn_off
              target:
                entity_id:
                  - light.led_controller_cct_1
                  - light.led_controller_cct_2
                  - light.led_controller_sc_1
                  - light.led_controller_sc_2
        - conditions:
            - condition: template
              value_template: >
                {{ not (states('light.led_controller_cct_1')|default('off') == 'on' and states('light.led_controller_cct_2')|default('off') == 'on' and states('light.led_controller_sc_1')|default('off') == 'on' and states('light.led_controller_sc_2')|default('off') == 'on') }}
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.led_controller_cct_1
                  - light.led_controller_cct_2
                  - light.led_controller_sc_1
                  - light.led_controller_sc_2

roof_fan_toggle_direction:
  alias: Roof Fan ‑ Toggle Direction
  mode: single
  sequence:
    - action: fan.set_direction
      data:
        entity_id: fan.ag_pro_roof_fan
        direction: >
          {% if state_attr('fan.ag_pro_roof_fan', 'direction') == 'forward' %}
            reverse
          {% else %}
            forward
          {% endif %}

########################################################################
#  Cook Mode – snapshot current states, then prepare cooking            #
########################################################################
cook_mode:
  alias: Cook Mode
  mode: single
  sequence:
    # ❶ Snapshot everything we’re about to change
    - action: scene.create
      data:
        scene_id: pre_cook_mode
        snapshot_entities:
          - switch.a32_pro_switch16_lpg_valve
          - light.led_controller_cct_2
          - fan.ag_pro_roof_fan
          - cover.ag_pro_roof_fan_lid

    # ❷ Open the LPG valve
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_switch16_lpg_valve

    # ❸ Lights to 100 %
    - action: light.turn_on
      target:
        entity_id: light.led_controller_cct_2
      data:
        brightness_pct: 100

    # ❹ Roof lid open (needed for exhaust)
    - action: cover.open_cover
      target:
        entity_id: cover.ag_pro_roof_fan_lid

    # ❺ Roof fan → exhaust @ 60 %
    - action: fan.set_direction
      data:
        entity_id: fan.ag_pro_roof_fan
        direction: forward # “forward” = exhaust
    - action: fan.turn_on
      data:
        entity_id: fan.ag_pro_roof_fan
        percentage: 60

########################################################################
#  Cook Mode Off – restore snapshot & ensure LPG is closed             #
########################################################################
cook_mode_off:
  alias: Cook Mode Off
  mode: single
  sequence:
    # ❶ Restore everything we captured earlier
    - action: scene.turn_on
      target:
        entity_id: scene.pre_cook_mode

    # ❷ (Extra safety) be sure LPG valve is closed
    - action: switch.turn_off
      target:
        entity_id: switch.a32_pro_switch16_lpg_valve

########################################################################
#  Power Saving Mode ON - snapshot current states, then turn off       #
########################################################################
power_saving_mode_on:
  alias: Power Saving Mode ON
  mode: single
  sequence:
    # Turn off (most) lights – EXCLUDE shower lights
    - action: light.turn_off
      target:
        entity_id:
          - light.led_controller_cct_1
          - light.led_controller_cct_2
          # - light.led_controller_sc_1   # ← shower (left alone)
          - light.led_controller_sc_2

    # Turn off monitors
    - action: switch.turn_off
      target:
        entity_id:
          - switch.a32_pro_do8_switch06_top_monitor
          - switch.a32_pro_do8_switch07_bottom_monitor

    # Turn OFF water system while away (but NOT if shower mode is on)
    - if:
        - condition: state
          entity_id: input_boolean.shower_mode
          state: "off"
      then:
        - action: switch.turn_off
          target:
            entity_id: switch.a32_pro_water_system_master_switch

    # Mark as in power saving mode
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.power_saving_mode

########################################################################
#  Power Saving Mode OFF - restore snapshot                            #
########################################################################
power_saving_mode_off:
  alias: Power Saving Mode OFF
  mode: single
  sequence:
    # Ensure inverter is ON before restoring AC-dependent devices
    - action: script.inverter_ensure_on

    # Restore the last rolling snapshot captured while PS mode was OFF
    - action: scene.turn_on
      target:
        entity_id: scene.last_active_state

    # Mark as not in power saving mode
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.power_saving_mode

########################################################################
#  Power Saving Mode Toggle - smart toggle based on current state      #
########################################################################
power_saving_mode_toggle:
  alias: Power Saving Mode Toggle
  mode: single
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.power_saving_mode
              state: "off"
          sequence:
            - action: script.power_saving_mode_on
        - conditions:
            - condition: state
              entity_id: input_boolean.power_saving_mode
              state: "on"
          sequence:
            - action: script.power_saving_mode_off

inverter_toggle:
  alias: Inverter, press button + set pending
  mode: single
  sequence:
    - action: input_boolean.turn_on # show “loading”
      target: { entity_id: input_boolean.inverter_toggle_pending }
    - action: button.press # your real inverter toggle
      target: { entity_id: button.a32_pro_inverter_on_off_toggle }
    - delay: "00:00:15" # safety net in case Shelly never answers
    - action: input_boolean.turn_off
      target: { entity_id: input_boolean.inverter_toggle_pending }

inverter_ensure_on:
  alias: Inverter – Ensure ON (idempotent)
  mode: single
  sequence:
    - if:
        - condition: state
          entity_id: binary_sensor.192_168_10_174
          state: "off"
        - condition: state
          entity_id: input_boolean.inverter_toggle_pending
          state: "off"
      then:
        - action: script.inverter_toggle

########################################################################
#  Inverter – Ensure OFF (idempotent)                                   #
########################################################################
inverter_ensure_off:
  alias: Inverter – Ensure OFF (idempotent)
  mode: single
  sequence:
    - if:
        - condition: state
          entity_id: binary_sensor.192_168_10_174
          state: "on"
        - condition: state
          entity_id: input_boolean.inverter_toggle_pending
          state: "off"
      then:
        - action: script.inverter_toggle

########################################################################
#  Starlink – sleep start after 30 minutes (placeholder)                #
########################################################################
starlink_sleep_start_after_30m:
  alias: Starlink – Sleep start after 30 minutes
  mode: single
  sequence:
    # Set Starlink sleep start time to 30 minutes from now
    - action: time.set_value
      target:
        entity_id: time.starlink_sleep_start
      data:
        time: "{{ (now() + timedelta(minutes=30)).strftime('%H:%M:%S') }}"
    # Optional: notify for visibility (you can remove this)
    - action: logbook.log
      data:
        name: "Starlink"
        message: "Sleep start set to {{ (now() + timedelta(minutes=30)).strftime('%H:%M') }}"

########################################################################
#  Bedtime Routine                                                      #
#  - Water system: ON to Main                                           #
#  - Under-cabinet: 100% for 5 minutes                                  #
#  - Roof hatch lighting: 20% for 10 minutes                            #
#  - After 10 minutes: inverter OFF, water OFF, all lights OFF          #
#  - Starlink sleep start scheduled for +30 minutes                     #
########################################################################
bedtime_routine:
  alias: Bedtime Routine
  mode: single
  sequence:
    # Schedule Starlink sleep start (runs independently)
    - action: script.starlink_sleep_start_after_30m

    # Ensure water system is on and set to Main
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_water_system_master_switch
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_water_system_state_main

    # Lighting pre-bed
    - action: light.turn_on
      target:
        entity_id: light.under_cabinet_lighting_switch
      data:
        brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id: light.led_controller_cct_1  # use dimmer directly for roof hatch lighting
      data:
        brightness_pct: 20

    # Under-cabinet stays on for 5 minutes
    - delay: "00:05:00"
    - action: light.turn_off
      target:
        entity_id: light.under_cabinet_lighting_switch

    # After total of 10 minutes from start, do final shutdown
    - delay: "00:05:00"
    - action: script.inverter_ensure_off
    - action: switch.turn_off
      target:
        entity_id: switch.a32_pro_water_system_master_switch
    - action: light.turn_off
      target:
        entity_id:
          - light.led_controller_cct_1
          - light.led_controller_cct_2
          - light.led_controller_sc_1
          - light.led_controller_sc_2
          - light.main_lighting_switch
          - light.under_cabinet_lighting_switch

########################################################################
#  Sleep Mode ON / Good Night                                           #
########################################################################
sleep_mode_on:
  alias: Sleep Mode ON
  mode: single
  sequence:
    # Set the sleep flag (also useful to gate automations)
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.sleep_mode

    # Snapshot current LIGHT states so we can restore later
    - action: scene.create
      data:
        scene_id: pre_sleep_mode_lights
        snapshot_entities:
          - light.led_controller_cct_1
          - light.led_controller_cct_2
          - light.led_controller_sc_1
          - light.led_controller_sc_2
          - light.main_lighting_switch
          - light.under_cabinet_lighting_switch

    # Snapshot current monitor states so we can restore later
    - action: scene.create
      data:
        scene_id: pre_sleep_mode_monitors
        snapshot_entities:
          - switch.a32_pro_do8_switch06_top_monitor
          - switch.a32_pro_do8_switch07_bottom_monitor

    # Turn off both monitors while sleeping
    - action: switch.turn_off
      target:
        entity_id:
          - switch.a32_pro_do8_switch06_top_monitor
          - switch.a32_pro_do8_switch07_bottom_monitor

    # Turn off all house lights for sleep (restore on wake)
    - action: light.turn_off
      target:
        entity_id:
          - light.led_controller_cct_1
          - light.led_controller_cct_2
          - light.led_controller_sc_1
          - light.led_controller_sc_2
          - light.main_lighting_switch
          - light.under_cabinet_lighting_switch

    # Schedule Starlink sleep start (same behavior as before)
    - action: script.starlink_sleep_start_after_30m

    # Set Starlink sleep END to 08:15 MST equivalent in current local time
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states('time.starlink_sleep_end') != 'unknown' }}"
          sequence:
            - action: time.set_value
              target:
                entity_id: time.starlink_sleep_end
              data:
                time: >
                  {% set mst_offset = -7 %}  {# MST fixed UTC-7 #}
                  {% set local_offset = (now().utcoffset().total_seconds() / 3600) | int %}
                  {% set delta = local_offset - mst_offset %}
                  {% set hour = (8 + delta) % 24 %}
                  {{ '%02d:%02d:%02d' % (hour, 15, 0) }}

########################################################################
#  Wake Up / Good Morning – restore essentials                          #
########################################################################
wake_up_routine:
  alias: Wake Up Routine
  mode: single
  sequence:
    # Clear sleep flag first so presence automations can work again
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.sleep_mode

    # Ensure inverter is ON before restoring anything AC‑dependent
    - action: script.inverter_ensure_on

    # Restore pre-sleep LIGHT states
    - action: scene.turn_on
      target:
        entity_id: scene.pre_sleep_mode_lights

    # Turn water system back ON to Main
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_water_system_master_switch
    - action: switch.turn_on
      target:
        entity_id: switch.a32_pro_water_system_state_main

    # Restore monitors to their pre-sleep state
    - action: scene.turn_on
      target:
        entity_id: scene.pre_sleep_mode_monitors

    # Gentle lights: under‑cabinet to 30 % for a soft wake
    - action: light.turn_on
      target:
        entity_id: light.under_cabinet_lighting_switch
      data:
        brightness_pct: 30

    # Optionally restore your last active scene if you weren't in power‑saving
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.power_saving_mode
              state: "off"
          sequence:
            - action: scene.turn_on
              target:
                entity_id: scene.last_active_state

########################################################################
#  Shower Mode – simple toggle scripts                                   #
########################################################################
shower_mode_on:
  alias: Shower Mode ON
  mode: single
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.shower_mode

shower_mode_off:
  alias: Shower Mode OFF
  mode: single
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.shower_mode

# ============================================================
# Vanlife Tracker — Journal scripts
# ============================================================

vanlife_save_stop_edits:
  alias: "Vanlife: Save Stop Edits"
  description: "Reads the journal form inputs and calls vanlife_tracker.update_stop"
  mode: single
  sequence:
    - action: vanlife_tracker.update_stop
      data:
        stop_id: "{{ states('input_text.vanlife_stop_id') }}"
        name: "{{ states('input_text.vanlife_stop_name') }}"
        notes: "{{ states('input_text.vanlife_stop_notes') }}"
        rating: "{{ states('input_number.vanlife_stop_rating') | int(0) }}"
        category: "{{ states('input_select.vanlife_stop_category') }}"

vanlife_load_current_stop:
  alias: "Vanlife: Load Current Stop into Form"
  description: "Populates the journal form inputs from the current stop sensor"
  mode: single
  sequence:
    - action: input_text.set_value
      target:
        entity_id: input_text.vanlife_stop_id
      data:
        value: "{{ state_attr('sensor.vanlife_tracker_current_stop', 'stop_id') or '' }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.vanlife_stop_name
      data:
        value: "{{ state_attr('sensor.vanlife_tracker_current_stop', 'name') or '' }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.vanlife_stop_notes
      data:
        value: "{{ state_attr('sensor.vanlife_tracker_current_stop', 'notes') or '' }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.vanlife_stop_rating
      data:
        value: "{{ state_attr('sensor.vanlife_tracker_current_stop', 'rating') | int(0) }}"
    - action: input_select.select_option
      target:
        entity_id: input_select.vanlife_stop_category
      data:
        option: "{{ state_attr('sensor.vanlife_tracker_current_stop', 'category') or 'other' }}"

vanlife_quick_save_stop:
  alias: "Vanlife: Quick Save Stop"
  description: "Creates a stop at current location with the form name/notes/rating/category"
  mode: single
  sequence:
    - action: vanlife_tracker.create_stop
      data:
        name: "{{ states('input_text.vanlife_stop_name') if states('input_text.vanlife_stop_name') != '' else none }}"
        notes: "{{ states('input_text.vanlife_stop_notes') }}"
        rating: "{{ states('input_number.vanlife_stop_rating') | int(0) }}"
        category: "{{ states('input_select.vanlife_stop_category') }}"
    # Clear the form after saving
    - action: input_text.set_value
      target:
        entity_id: input_text.vanlife_stop_name
      data:
        value: ""
    - action: input_text.set_value
      target:
        entity_id: input_text.vanlife_stop_notes
      data:
        value: ""
    - action: input_number.set_value
      target:
        entity_id: input_number.vanlife_stop_rating
      data:
        value: 0

# ────────────────────────────────────────────────────────────────
# WiCAN OBD Diagnostic Scripts
# ────────────────────────────────────────────────────────────────

# Read stored DTCs (Mode 03) via raw CAN frame on MQTT
# Response arrives on wican/tx → sensor.wican_tx_raw_frame
# DTC format: response ID 0x7E8, service 0x43, then pairs of DTC bytes
wican_read_dtc:
  alias: "WiCAN • Read Stored DTCs"
  icon: mdi:car-wrench
  mode: single
  sequence:
    # Send OBD Mode 03 (Read Stored DTCs) to broadcast address 0x7DF
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"7DF","dlc":8,"rtr":false,"extd":false,"data":"01 03 00 00 00 00 00 00"}]}
    - action: system_log.write
      data:
        level: info
        logger: script.wican_read_dtc
        message: "Sent OBD Mode 03 (Read Stored DTCs) request → check sensor.wican_tx_raw_frame for response"
    - action: persistent_notification.create
      data:
        title: "WiCAN DTC Read"
        message: >
          Sent DTC read request. Check Developer Tools → States → sensor.wican_tx_raw_frame
          for the raw response. DTC count from PID 0x01: {{ states('sensor.wican_monitor_status_raw') | default('unknown') }}
        notification_id: wican_dtc_read

# Clear all DTCs and MIL (Mode 04) via raw CAN frame on MQTT
# WARNING: This clears ALL stored DTCs and turns off the check engine light.
wican_clear_dtc:
  alias: "WiCAN • Clear DTCs (Mode 04)"
  icon: mdi:eraser
  mode: single
  sequence:
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"7DF","dlc":8,"rtr":false,"extd":false,"data":"01 04 00 00 00 00 00 00"}]}
    - action: system_log.write
      data:
        level: warning
        logger: script.wican_clear_dtc
        message: "Sent OBD Mode 04 (Clear DTCs) — all stored codes and MIL cleared"
    - action: persistent_notification.create
      data:
        title: "WiCAN DTC Clear"
        message: "DTCs cleared. The check engine light should turn off. Monitor status will reset on next drive cycle."
        notification_id: wican_dtc_clear

# Read pending DTCs (Mode 07) — codes from current drive cycle
wican_read_pending_dtc:
  alias: "WiCAN • Read Pending DTCs"
  icon: mdi:car-wrench
  mode: single
  sequence:
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"7DF","dlc":8,"rtr":false,"extd":false,"data":"01 07 00 00 00 00 00 00"}]}
    - action: system_log.write
      data:
        level: info
        logger: script.wican_read_pending_dtc
        message: "Sent OBD Mode 07 (Read Pending DTCs) request"
    - action: persistent_notification.create
      data:
        title: "WiCAN Pending DTC Read"
        message: "Sent pending DTC read request. Check sensor.wican_tx_raw_frame for raw response."
        notification_id: wican_dtc_pending

# Manual tire pressure raw byte request — sends Mode 22 PIDs
# directly to the IPC module (0x726) for all 4 tires.
# Captures raw CAN response bytes on wican/tx for debugging
# the tire pressure expression ([B4:B5]/10 vs /2.036 etc.)
wican_raw_tire_pressure:
  alias: "WiCAN • Raw Tire Pressure Request"
  icon: mdi:car-tire-alert
  mode: single
  sequence:
    # Front-left (DID 0x2813, header 0x726 → response from 0x72E)
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"726","dlc":8,"rtr":false,"extd":false,"data":"03 22 28 13 00 00 00 00"}]}
    - delay: "00:00:01"
    # Front-right (DID 0x2814)
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"726","dlc":8,"rtr":false,"extd":false,"data":"03 22 28 14 00 00 00 00"}]}
    - delay: "00:00:01"
    # Rear-left (DID 0x2815)
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"726","dlc":8,"rtr":false,"extd":false,"data":"03 22 28 15 00 00 00 00"}]}
    - delay: "00:00:01"
    # Rear-right (DID 0x2816)
    - action: mqtt.publish
      data:
        topic: "wican/rx"
        payload: >
          {"bus":"0","type":"tx","ts":0,"frame":[{"id":"726","dlc":8,"rtr":false,"extd":false,"data":"03 22 28 16 00 00 00 00"}]}
    - action: system_log.write
      data:
        level: info
        logger: script.wican_raw_tire_pressure
        message: >
          Sent raw tire pressure requests for all 4 wheels (DIDs 0x2813-0x2816, header 0x726).
          Check sensor.wican_tx_raw_frame for raw CAN response bytes.
          Current parsed values — FL: {{ states('sensor.wican_tire_pressure_fl') }},
          FR: {{ states('sensor.wican_tire_pressure_fr') }},
          RL: {{ states('sensor.wican_tire_pressure_rl') }},
          RR: {{ states('sensor.wican_tire_pressure_rr') }}
    - action: persistent_notification.create
      data:
        title: "WiCAN Raw Tire Pressure"
        message: >
          Sent raw requests for all 4 tire pressure DIDs (0x2813–0x2816).
          Check sensor.wican_tx_raw_frame for raw CAN bytes.
          
          Current parsed values:
          FL: {{ states('sensor.wican_tire_pressure_fl') }} psi
          FR: {{ states('sensor.wican_tire_pressure_fr') }} psi
          RL: {{ states('sensor.wican_tire_pressure_rl') }} psi
          RR: {{ states('sensor.wican_tire_pressure_rr') }} psi
          
          Raw debug sensors:
          FL: {{ states('sensor.wican_raw_tire_pressure_fl') }}
          FR: {{ states('sensor.wican_raw_tire_pressure_fr') }}
          RL: {{ states('sensor.wican_raw_tire_pressure_rl') }}
          RR: {{ states('sensor.wican_raw_tire_pressure_rr') }}
        notification_id: wican_tire_raw
