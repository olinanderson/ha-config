# ================================
# template/triggered.yaml
# ================================
# Trigger-based template sensors that use trigger: blocks

# ───────────────────────────────────────────────
# Road grade from u-blox GPS (deg & % + label)
# ───────────────────────────────────────────────
- trigger:
    # Fire ONCE per GPS fix. The daemon republishes latitude/longitude/elevation
    # together in a single MQTT message, so watching all three attributes fired
    # this template up to 3× per fix and compounded the EMA (effective weight
    # 0.6³ instead of 0.6). Latitude changes on every moving fix (a ≥5 m step is
    # far larger than the 7-decimal rounding), so a single latitude trigger
    # captures each fix exactly once. from_state/to_state still carry all attrs.
    - trigger: state
      entity_id: device_tracker.ublox_gps
      attribute: latitude
  sensor:
    - name: "Road Grade (deg)"
      unique_id: road_grade_deg
      unit_of_measurement: "°"
      state_class: measurement
      state: >
        {% set f = trigger.from_state %}
        {% set t = trigger.to_state %}

        {# helper to return the last numeric value (or 0) #}
        {% macro last_numeric_or_zero(prev) -%}
          {%- if prev not in ['unknown','unavailable','none',''] -%}
            {{ prev }}
          {%- else -%}
            0
          {%- endif -%}
        {%- endmacro %}

        {# Only calculate grade when the vehicle is actually moving #}
        {# GPS drift while parked produces false non-zero grades #}
        {% if not is_state('binary_sensor.vehicle_is_moving', 'on') %}
          0
        {% elif f is none or t is none %}
          {{ last_numeric_or_zero(this.state) }}
        {% else %}
          {% set lat1 = (f.attributes.latitude  | float(0)) %}
          {% set lon1 = (f.attributes.longitude | float(0)) %}
          {% set alt1 = (f.attributes.get('elevation', f.attributes.get('altitude', 0)) | float(0)) %}
          {% set lat2 = (t.attributes.latitude  | float(0)) %}
          {% set lon2 = (t.attributes.longitude | float(0)) %}
          {% set alt2 = (t.attributes.get('elevation', t.attributes.get('altitude', 0)) | float(0)) %}
          {% set acc1 = (f.attributes.get('gps_accuracy', 999) | float(999)) %}
          {% set acc2 = (t.attributes.get('gps_accuracy', 999) | float(999)) %}

          {# reject junk fixes: poor accuracy or identical points #}
          {% if acc1 > 30 or acc2 > 30 or (lat1==lat2 and lon1==lon2) %}
            {{ last_numeric_or_zero(this.state) }}
          {% else %}
            {# haversine horizontal distance (meters) #}
            {% set R = 6371000.0 %}
            {% set phi1 = lat1 * pi/180 %}
            {% set phi2 = lat2 * pi/180 %}
            {% set dphi = (lat2-lat1) * pi/180 %}
            {% set dlmb = (lon2-lon1) * pi/180 %}
            {% set a  = sin(dphi/2)**2 + cos(phi1)*cos(phi2)*sin(dlmb/2)**2 %}
            {% set c  = 2*atan2(sqrt(a), sqrt(1-a)) %}
            {% set d  = R * c %}         {# horizontal meters #}
            {% set dz = (alt2 - alt1) %} {# meters #}

            {# Require a longer horizontal run before trusting a grade. The
               accuracy gate above is HORIZONTAL only; GPS vertical error is
               larger, so a longer run dilutes fixed altitude noise. #}
            {% if d < 10 %}
              {{ last_numeric_or_zero(this.state) }}
            {% else %}
              {% set raw_deg = atan2(dz, d) * 180 / pi %}
              {# Reject road-implausible spikes (>20° ≈ 36% grade). Almost no
                 drivable road exceeds this, so a spike here is vertical GPS
                 noise (e.g. a momentary altitude glitch) — hold the last value. #}
              {% if raw_deg | abs > 20 %}
                {{ last_numeric_or_zero(this.state) }}
              {% elif this.state not in ['unknown','unavailable','none',''] %}
                {# light smoothing: EMA 60/40 with previous value if present #}
                {{ (0.6*(this.state | float) + 0.4*raw_deg) | round(2) }}
              {% else %}
                {{ raw_deg | round(2) }}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endif %}
      availability: "true"

    - name: "Road Grade (%)"
      unique_id: road_grade_percent
      unit_of_measurement: "%"
      state_class: measurement
      state: >
        {# helper to return last numeric or 0 #}
        {% macro last_numeric_or_zero(prev) -%}
          {%- if prev not in ['unknown','unavailable','none',''] -%}
            {{ prev }}
          {%- else -%}
            0
          {%- endif -%}
        {%- endmacro %}

        {% set deg = states('sensor.road_grade_deg') %}
        {% if deg in ['unknown','unavailable','none',''] %}
          {{ last_numeric_or_zero(this.state) }}
        {% else %}
          {{ (tan((deg | float) * pi/180) * 100) | round(2) }}
        {% endif %}
      availability: "true"

    - name: "Hill Aggression"
      unique_id: hill_aggression
      state: >
        {% set g = states('sensor.road_grade_deg') | float(0) %}
        {% set a = g | abs %}
        {% if a < 1.0 %} Flat
        {% elif a < 3.0 %} Gentle {{ 'up' if g>0 else 'down' }}
        {% elif a < 6.0 %} Moderate {{ 'up' if g>0 else 'down' }}
        {% elif a < 10.0 %} Steep {{ 'up' if g>0 else 'down' }}
        {% else %} Very steep {{ 'up' if g>0 else 'down' }}
        {% endif %}
      icon: >
        {% set g = states('sensor.road_grade_deg') | float(0) %}
        {% if g >= 6 %} mdi:terrain
        {% elif g >= 3 %} mdi:triangle
        {% elif g <= -6 %} mdi:terrain
        {% elif g <= -3 %} mdi:triangle-outline
        {% else %} mdi:minus
        {% endif %}

# ─── Vehicle Acceleration (triggered, km/h per second) ───────────────────────
# Fires on every OBD speed update and computes (Δspeed / Δt).
# Positive = accelerating, negative = braking. Falls back to 0 on stale data.
- trigger:
    - trigger: state
      entity_id: sensor.192_168_10_90_0d_vehiclespeed
  sensor:
    - name: "Vehicle Acceleration"
      unique_id: vehicle_acceleration
      unit_of_measurement: "km/h/s"
      state_class: measurement
      icon: mdi:speedometer
      state: >
        {% set prev = trigger.from_state.state | float(-1) %}
        {% set curr = trigger.to_state.state | float(-1) %}
        {% if prev < 0 or curr < 0
              or trigger.from_state.state in ['unknown','unavailable']
              or trigger.to_state.state   in ['unknown','unavailable'] %}
          {{ this.state if this.state not in ['unknown','unavailable'] else 0 }}
        {% else %}
          {% set dt = (trigger.to_state.last_updated - trigger.from_state.last_updated).total_seconds() %}
          {% if dt > 0 and dt < 30 %}
            {{ ((curr - prev) / dt) | round(2) }}
          {% else %}
            0
          {% endif %}
        {% endif %}
      availability: "true"

# ─── Stable Fuel Level (grade + acceleration gated) ──────────────────────────
# Only latches a new OBD fuel reading when:
#   • The raw OBD value has been unchanged for 3 seconds  (no rapid sloshing)
#   • Road grade ≤ 1.5° absolute              (no gravity-driven tilt)
#   • |acceleration| ≤ stability threshold   (no inertial slosh from braking/accel)
# Also refreshes every 10 minutes as a keep-alive while conditions are already met.
- trigger:
    - trigger: state
      entity_id: sensor.192_168_10_90_2f_fueltanklevel
      for: "00:00:03"
    - trigger: time_pattern
      minutes: "/10"
  sensor:
    - name: Stable Fuel Level
      unique_id: stable_fuel_level
      unit_of_measurement: "%"
      state_class: measurement
      state: >
        {% set raw = states('sensor.192_168_10_90_2f_fueltanklevel') | float(-1) %}
        {% set wican_ok = states('sensor.192_168_10_90_2f_fueltanklevel')
                          not in ['unknown','unavailable'] %}
        {% set grade  = states('sensor.road_grade_deg') | float(0) | abs %}
        {% set accel  = states('sensor.vehicle_acceleration') | float(0) | abs %}
        {% set thresh = states('input_number.acceleration_stability_threshold') | float(1.0) %}
        {% set stable = grade <= 1.5 and accel <= thresh %}
        {% set prev = this.state | float(-1) %}
        {% set fillup = raw - prev > 10 and prev > 0 %}
        {% if wican_ok and (stable or fillup) %}
          {{ raw | round(2) }}
        {% else %}
          {{ this.state if this.state not in ['unknown', 'unavailable'] else 0 }}
        {% endif %}
      availability: "true"
