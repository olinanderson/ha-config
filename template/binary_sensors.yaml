# ================================
# template/binary_sensors.yaml
# ================================

# ─── Vehicle movement detection ───
- binary_sensor:
    - name: "Vehicle Is Moving"
      unique_id: vehicle_is_moving
      device_class: moving
      state: >
        {% set speed = states('sensor.192_168_10_90_0d_vehiclespeed') | float(0) %}
        {% set speed_threshold = states('input_number.vehicle_stopped_threshold') | float(2) %}
        {% set wican_available = is_state('binary_sensor.engine_is_running', 'on') %}
        {{ wican_available and speed > speed_threshold and speed < 255 }}
      icon: >
        {% if is_state('binary_sensor.vehicle_is_moving', 'on') %}
          mdi:car
        {% else %}
          mdi:car-brake-parking
        {% endif %}

    - name: "Vehicle Is Stable"
      unique_id: vehicle_is_stable
      device_class: moving
      state: >
        {% set acceleration = states('sensor.vehicle_acceleration') | float(0) | abs %}
        {% set accel_threshold = states('input_number.acceleration_stability_threshold') | float(0.5) %}
        {% set engine_running = is_state('binary_sensor.engine_is_running', 'on') %}
        {{ engine_running and acceleration <= accel_threshold }}
      icon: >
        {% if is_state('binary_sensor.vehicle_is_stable', 'on') %}
          mdi:check-circle
        {% else %}
          mdi:car-speed-limiter
        {% endif %}

    - name: "Engine Is Running"
      unique_id: engine_is_running
      device_class: running
      state: >
        {% set rpm_entity = states.sensor['192_168_10_90_0c_enginerpm'] %}
        {% set rpm_state = rpm_entity.state if rpm_entity else 'unavailable' %}
        {% if rpm_state in ['unknown', 'unavailable'] %}
          false
        {% else %}
          {% set age = (now() - rpm_entity.last_updated).total_seconds() %}
          {{ rpm_state | float(0) > 0 and age < 120 }}
        {% endif %}
      icon: >
        {% if is_state('binary_sensor.engine_is_running', 'on') %}
          mdi:engine
        {% else %}
          mdi:engine-off
        {% endif %}

# ─── Inverter reachability ───
- binary_sensor:
    - name: "Inverter On"
      unique_id: inverter_on
      device_class: power
      state: >
        {{ states('sensor.shellyem_c4d8d500789a_channel_1_voltage') | float(0) > 0 }}

# ─── TPMS low pressure alert ───
- binary_sensor:
    - name: "Low Tire Pressure"
      unique_id: low_tire_pressure
      device_class: problem
      icon: mdi:car-tire-alert
      state: >
        {% set fl = states('sensor.192_168_10_90_tyre_p_fl') | float(0) %}
        {% set fr = states('sensor.192_168_10_90_tyre_p_fr') | float(0) %}
        {% set rl = states('sensor.192_168_10_90_tyre_p_rl') | float(0) %}
        {% set rr = states('sensor.192_168_10_90_tyre_p_rr') | float(0) %}
        {% set threshold = 35 %}
        {% set pressures = [fl, fr, rl, rr] | select('gt', 0) | reject('gt', 200) | list %}
        {{ pressures | select('lt', threshold) | list | length > 0 if pressures | length > 0 else false }}
      attributes:
        fl_psi: "{{ states('sensor.192_168_10_90_tyre_p_fl') | float(0) | round(1) }}"
        fr_psi: "{{ states('sensor.192_168_10_90_tyre_p_fr') | float(0) | round(1) }}"
        rl_psi: "{{ states('sensor.192_168_10_90_tyre_p_rl') | float(0) | round(1) }}"
        rr_psi: "{{ states('sensor.192_168_10_90_tyre_p_rr') | float(0) | round(1) }}"

# ─── Check Engine Light (MIL from PID 0x01) ───
- binary_sensor:
    - name: "Check Engine Light"
      unique_id: check_engine_light
      device_class: problem
      icon: mdi:engine
      state: >
        {{ states('sensor.192_168_10_90_01_monitorstatus') | int(0) >= 128 }}
      attributes:
        dtc_count: "{{ states('sensor.dtc_count') }}"
