# ================================
# template/sensors.yaml
# ================================
# Regular (polling) template sensors

- sensor:
    # ─── Last-good value caching ───
    - name: "Ambient Air Temp (last good)"
      unique_id: ambient_air_temp_last
      unit_of_measurement: "°C"
      state: >
        {% if states('sensor.192_168_10_90_46_ambientairtemp') not in ['unknown','unavailable'] %}
          {{ states('sensor.192_168_10_90_46_ambientairtemp') }}
        {% else %}
          {{ this.state if this.state not in ['unknown','unavailable'] else '0' }}
        {% endif %}

    - name: "Coolant Temp (last good)"
      unique_id: coolant_temp_last
      unit_of_measurement: "°C"
      state: >
        {% set v = states('sensor.192_168_10_90_05_enginecoolanttemp') %}
        {% if v not in ['unknown','unavailable'] and v | float(-99) > -39 %}
          {{ v }}
        {% else %}
          {{ this.state if this.state not in ['unknown','unavailable'] else '0' }}
        {% endif %}

    - name: "Road Grade % (last good)"
      unique_id: road_grade_percent_last
      unit_of_measurement: "%"
      state: >
        {% if states('sensor.road_grade_percent') not in ['unknown','unavailable'] %}
          {{ states('sensor.road_grade_percent') }}
        {% else %}
          {{ this.state if this.state not in ['unknown','unavailable'] else '0' }}
        {% endif %}

    # ─── Battery charging / discharging split ───
    - name: "Battery Charging"
      unit_of_measurement: "W"
      state: >
        {% set power = states('sensor.olins_van_bms_power') | float(0) %}
        {{ power if power > 0 else 0 }}

    - name: "Battery Discharging"
      unit_of_measurement: "W"
      state: >
        {% set power = states('sensor.olins_van_bms_power') | float(0) %}
        {{ (power * -1) if power < 0 else 0 }}

    # ─── Starlink throughput (human-readable) ───
    - name: "Starlink Downlink Throughput (Mbps)"
      unique_id: starlink_downlink_throughput_mbps
      unit_of_measurement: "Mbps"
      state: >
        {{ (states('sensor.starlink_downlink_throughput') | float(0) / 1000000) | round(2) }}

    - name: "Starlink Uplink Throughput (Mbps)"
      unique_id: starlink_uplink_throughput_mbps
      unit_of_measurement: "Mbps"
      state: >
        {{ (states('sensor.starlink_uplink_throughput') | float(0) / 1000000) | round(2) }}

    # ─── MPPT solar aggregates ───
    - name: "Total MPPT PV Power"
      unique_id: total_mppt_pv_power
      unit_of_measurement: "W"
      state: >
        {{ (states('sensor.a32_pro_mppt1_pv_power')|float(0) +
            states('sensor.a32_pro_mppt2_pv_power')|float(0))|round(2) }}

    - name: "Average MPPT Output Voltage"
      unique_id: average_mppt_output_voltage
      unit_of_measurement: "V"
      state: >
        {{ ((states('sensor.a32_pro_mppt1_output_voltage')|float(0) +
             states('sensor.a32_pro_mppt2_output_voltage')|float(0)) / 2)|round(2) }}

    - name: "Total MPPT Output Current"
      unique_id: total_mppt_output_current
      unit_of_measurement: "A"
      state: >
        {{ (states('sensor.a32_pro_mppt1_output_current')|float(0) +
            states('sensor.a32_pro_mppt2_output_current')|float(0))|round(2) }}

    - name: "Total MPPT Yield Today"
      unique_id: total_mppt_yield_today
      unit_of_measurement: Wh
      state: >
        {% set mppt1_kwh = states('sensor.a32_pro_mppt1_yield_today')|float(0) %}
        {% set mppt2_kwh = states('sensor.a32_pro_mppt2_yield_today')|float(0) %}
        {{ ((mppt1_kwh + mppt2_kwh) * 1000) | round(2) }}

    # ─── Propane tank calculations ───
    # Standard 20 lb BBQ propane tank with 2:1 ellipsoidal heads
    # Mopeka Pro Check F317 ultrasonic sensor on tank bottom
    # Sensor reports liquid height in mm (HA integration applies propane medium coefficient)
    - name: Propane Tank Percentage
      unique_id: propane_tank_percentage
      unit_of_measurement: "%"
      state: >
        {% set R      = 149.2 %}
        {% set Ec     = R / 2 %}
        {% set side   = 203.0 %}
        {% set H      = side + 2*Ec %}
        {% set d_raw = states('sensor.pro_check_f317_tank_level') | float(0) %}
        {% set h_liq = [ [ d_raw, 0 ] | max, H ] | min %}
        {% set V_cap  = (2/3) * pi * R**2 * Ec %}
        {% set V_cyl  = side * pi * R**2 %}
        {% set V_max  = 2*V_cap + V_cyl %}
        {% if h_liq <= Ec %}
          {% set V_liq = pi*R**2 * (h_liq**2/Ec - h_liq**3/(3*Ec**2)) %}
        {% elif h_liq <= Ec + side %}
          {% set V_liq = V_cap + (h_liq - Ec)*pi*R**2 %}
        {% else %}
          {% set h2 = h_liq - (Ec + side) %}
          {% set V_liq = V_cap + V_cyl +
                          pi*R**2 * (h2**2/Ec - h2**3/(3*Ec**2)) %}
        {% endif %}
        {{ [ (100 * V_liq / (0.8 * V_max)) | round(1), 100 ] | min }}

    - name: "Propane – Raw Distance"
      unit_of_measurement: mm
      state: "{{ states('sensor.pro_check_f317_tank_level') | float(0) }}"

    - name: "Propane – Liquid Depth"
      unit_of_measurement: mm
      state: "{{ states('sensor.pro_check_f317_tank_level') | float(0) }}"

    - name: "Propane – Liquid Volume"
      unit_of_measurement: L
      state: >
        {% set pct = states('sensor.propane_tank_percentage') | float(0) %}
        {% set R = 149.2 %}
        {% set Ec = R / 2 %}
        {% set side = 203.0 %}
        {% set V_cap = (2/3) * pi * R**2 * Ec %}
        {% set V_cyl = side * pi * R**2 %}
        {% set V_max = 2*V_cap + V_cyl %}
        {{ (pct / 100 * 0.8 * V_max / 1000000) | round(2) }}

    # ─── Power sensors (24V / 12V) ───
    - name: "Air Conditioning Power (24V)"
      unique_id: air_conditioning_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_4_current_24v_air_conditioning')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "All 24V Devices Power (24V)"
      unique_id: all_24v_devices_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_5_current_24v_24v_devices')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "All 12V Devices Power (24V)"
      unique_id: all_12v_devices_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_6_current_24v_12v_devices')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "Inverter Power (24V)"
      unique_id: inverter_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_7_current_24v_inverter')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "Alternator Charger Power (24V)"
      unique_id: alternator_charger_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_8_current_24v_alternator_charger')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "Battery Heater Power (12V)"
      unique_id: battery_heater_power_12v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_13_current_12v_battery_heater')|float(0) %}
        {% set voltage = states('sensor.a32_pro_smart_battery_sense_12v_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "Roof Fan Power (12V)"
      unique_id: roof_fan_power_12v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_14_current_12v_roof_fan')|float(0) %}
        {% set voltage = states('sensor.a32_pro_smart_battery_sense_12v_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "Bed Motor Power (24V)"
      unique_id: bed_motor_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_15_current_24v_bed_motor')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: "Shore Power Charger Power (24V)"
      unique_id: shore_power_charger_power_24v
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set current = states('sensor.a32_pro_s5140_channel_16_current_24v_shore_power_charger')|float(0) %}
        {% set voltage = states('sensor.olins_van_bms_voltage')|float(0) %}
        {{ ((current | abs) * voltage)|round(2) }}

    - name: Roof Fan Direction
      state: >
        {% set d = state_attr('fan.ag_pro_roof_fan','direction') %}
        {{ 'Exhaust' if d == 'forward' else 'Intake' if d == 'reverse' else 'Unknown' }}

    # ─── Ford-specific computed sensors (WiCAN Pro native integration) ───

    - name: "Transmission Temp (last good)"
      unique_id: trans_temp_last
      unit_of_measurement: "°C"
      icon: mdi:car-cog
      state: >
        {% if states('sensor.192_168_10_90_tran_f_temp') not in ['unknown','unavailable'] %}
          {{ states('sensor.192_168_10_90_tran_f_temp') }}
        {% else %}
          {{ this.state if this.state not in ['unknown','unavailable'] else '0' }}
        {% endif %}

    - name: "Gear Display"
      unique_id: wican_gear_display
      icon: mdi:car-shift-pattern
      state: >
        {% set g = states('sensor.192_168_10_90_gear') | int(-1) %}
        {% if g == 0 %}Park
        {% elif g == 255 %}Reverse
        {% elif g >= 1 and g <= 6 %}{{ g }}
        {% elif g == 15 %}Neutral
        {% else %}--
        {% endif %}

    - name: "Tire Pressure Min"
      unique_id: wican_tyre_pressure_min
      unit_of_measurement: "psi"
      icon: mdi:car-tire-alert
      state: >
        {% set fl = (states('sensor.192_168_10_90_tyre_p_fl') | float(0)) * 0.0725190 %}
        {% set fr = (states('sensor.192_168_10_90_tyre_p_fr') | float(0)) * 0.0725190 %}
        {% set rl = (states('sensor.192_168_10_90_tyre_p_rl') | float(0)) * 0.0725190 %}
        {% set rr = (states('sensor.192_168_10_90_tyre_p_rr') | float(0)) * 0.0725190 %}
        {% set pressures = [fl, fr, rl, rr] | select('gt', 0) | reject('gt', 200) | list %}
        {{ pressures | min | round(1) if pressures | length > 0 else 0 }}

    # ─── Check Engine Light / MIL (from PID 0x01 Monitor Status) ───

    - name: "DTC Count"
      unique_id: wican_dtc_count
      icon: mdi:car-wrench
      state_class: measurement
      state: >
        {{ states('sensor.192_168_10_90_01_monitorstatus') | int(0) % 128 }}

    # ─── Fuel Consumption (Speed-Density from MAP + RPM + IAT) ───
    #
    # Formula: MAF = ρ_air × Vd × RPM/120 × VE
    #          fuel_gs = MAF / AFR
    #          fuel_Lh = fuel_gs × 3600 / 750
    #
    # MAP entity appears only when engine is running (WiCAN webhook).
    # VE correction factor adjustable via input_number.fuel_ve_correction.
    # Default VE=0.55 — calibrate via fill-to-fill measurements.

    - name: "Estimated Fuel Rate"
      unique_id: estimated_fuel_rate
      icon: mdi:gas-station
      unit_of_measurement: "L/h"
      state_class: measurement
      state: >
        {% set map_kpa = states('sensor.192_168_10_90_map') | float(0) %}
        {% set rpm = states('sensor.192_168_10_90_0c_enginerpm') | float(0) %}
        {% set iat_c = states('sensor.192_168_10_90_0f_intakeairtemperature') | float(20) %}
        {% set ve = states('input_number.fuel_ve_correction') | float(0.55) %}
        {% if map_kpa > 0 and rpm > 0 %}
          {% set t_k = iat_c + 273.15 %}
          {% set air_density = (map_kpa * 1000) / (287 * t_k) %}
          {% set maf_gs = (air_density * 0.0035 * rpm * ve * 1000) / 120 %}
          {% set fuel_gs = maf_gs / 14.7 %}
          {{ ((fuel_gs * 3600) / 750) | round(2) }}
        {% else %}
          0
        {% endif %}
      attributes:
        map_kpa: "{{ states('sensor.192_168_10_90_map') }}"
        ve_factor: "{{ states('input_number.fuel_ve_correction') }}"

    - name: "Estimated Fuel Consumption"
      unique_id: estimated_fuel_consumption
      icon: mdi:gas-station
      unit_of_measurement: "L/100km"
      state_class: measurement
      state: >
        {% set fuel_lh = states('sensor.estimated_fuel_rate') | float(0) %}
        {% set speed = states('sensor.192_168_10_90_0d_vehiclespeed') | float(0) %}
        {% if fuel_lh > 0 and speed > 5 %}
          {{ ((fuel_lh / speed) * 100) | round(1) }}
        {% else %}
          0
        {% endif %}
